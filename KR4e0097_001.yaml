取匠斧那能施秖被風雨厄流棄荒江湄兹焉遇賞識可喜亦可悲真山自足翫假山亦奚為羡子久成癖而我昧未知意欲架穹窿入窓影參差酒狂喝羣山端拱於庭墀送魏克讓除陜西憲府經厯魏侯秉清心有若五弦琴能諧太古調中含至和音一彈别鶴舞再彈離鸞吟自可賡白雪何煩鑄黄金寥寥師曠耳悠悠虞舜心廟堂歌南風為洗吳哇淫暇日同鄭以孝遊定光庵坐志喜亭上以池清龜出曝松暝鶴飛回為韻各賦十首用紀一時之清興云登臨試輕步及此凉風時怪石􅍥危砌幽泉下深池山銜落日短鳥度遥天遲俯仰一長笑嗒然遂忘疲又髙城獻雉堞淨地鄰市聲雲含竹隂冷天浸池光晴崕腰怪藤絡石罅香藑生流矚景何限詩成冩吾情又亭髙煥華扁依山闢新基瓦排脊峨獸碑立趺蹲龜美哉嘉禾頌允矣甘棠詩遺恩久不冺千載長在兹又空寮積塵生僧病縳禪律槖空飢䑕跳衲破饕蝨出險崖石可梯荒井水堪繘我欲叩心宗此理待誰詰又叢林占清幽恍訝古天竺風虎抱雲眠雨禽迎日曝竹瘇瘦根長栢病危枝秃何時借藤床坐讀傳燈錄又危亭帶近郭虛窓納羣峰蛇涎滑勁竹龍骨蛻怪松東山想謝傅厯下傳李邕起我懷古興憑髙豁心胸又芒屩澁行蹤踈雨不滑徑石泉洒雪凉野樹栖烟暝香消歇殘經風微度幽磬老衲坐蒲團禪心初入定又乘興造禪關清游景堪樂鉢飰施飢禽函經䕶馴鶴嵐光眼底浮雲景手中落蒼蒼天四維連峰瘦於削又倚闌興未盡坐久心忘歸樹逺硋雲出鴉回背日飛地接市喧近境留塵迹稀朗吟下山去松風凉葛衣又天開兠率境何殊雨花䑓山鬼受經去癯龍聴講回卭竹青活雨禪龕紫封苔他年棄俗慮避世心悠哉古風大道常不冺萬古如日新却笑秦始皇六經飛埃塵徒有桀紂暴豈識唐虞仁親序屬父子爵位分君臣雖滅古聖書不能亂彜倫平生爭戰苦二世空沈淪又玉環傾國姿胎禍亂中土明皇開元初徳政稱仁主後來恣貪歡白日送歌舞煙塵起漁陽神京滿􅎏鼓幸頼肅宗賢扶危復唐祚明皇亦何心却被顔色誤嗟哉去已逺遺恨流千古又日落依舊出花落還再開如何人委棄一去不復回達賢每知道適興銜金杯讀書窺徃事立功圖雲䑓憫彼名未成聚散輕烟埃思之五情熱咄咄堪悲哀又蘇秦古辯士特生戰國時欲説萬乘君豈肯甘賤卑憶初志未遂憔悴衆所欺有妻不停織有嫂不為炊骨肉尚如此他人更奚疑又不慕身後名但戀生前酒酒傾愁不來果是掃愁帚彭祖夀最多一去千載後鄧通富銅山餓死復何有二子豈解飲秪知富與夀未若我達道得酒肯置口東風昨夜來揺蕩庭前栁出門一長吁茫然但搔首又劬書析理義讀史窺成敗我生未成名亹亹嵗月邁嗟我井底蛙識見真狹隘跳踉尺寸間豈知天壤大又乾坤大磅礴豈乏千里駒柰無伯樂顧空受駑駘欺如何掩下乘蹭蹬筋力疲一朝欣所遇毛骨稱拳竒洗刷泥滓淨展歩如飈馳芻豆尚不飽敢賜金鞍騎又我有太阿劔磨淬利鋒鋩憶昔豐城獄氣射牛斗傍儻無張華識埋没吁可傷千年土不蝕寳匣生光芒風塵久澒洞此物寧敢藏節婦吕嘉貞人生如石火倐忽無停光來者日以續徃者日以忘隂陽自不息死生固其常悠悠就泯滅有志當悲傷所以貴自立卓然振頽綱男兒慕勲業才髙萬夫良女子守貞節秉心百煉鋼一生雖云短萬世亦以長齪齪茍無譽弱草栖秋霜云何吕家女薄俗能激昻喧啾衆鳥羣劃見孤鳳凰白刄不辭苦青春謝紅妝大義既已著委順名益彰香魂掩幽壤髙墳多白楊餘芳垂竹帛肯愧紀述詳黄山鎻愁靄濕翠空蒼蒼林泉歸隠圖為王悦中賦大隠與小隠城市異山林豈徒貴隠迹并得隠者心心迹既髙尚不受塵土侵若人抱姱節早已抽華簮泉石閟幽趣於焉事追尋霜松落踈影暝鶴有遺音刈秫作美酒適興成孤斟悠然任天性手弄焦桐琴紫雲近接眼晴空露微岑結廬何必廣出處計已深吁嗟慕彭澤髙風古猶今送羅生伯達升國學梧桐生髙岡綠葉何葳㽔所託既得地暢茂諒亦宜醴泉溉其根甘露濡其枝鳯凰鳴噦噦朝陽影離離諧和五音具孕材良且竒神靈不敢惜哲匠頻顧之斵成美琴瑟登歌清廟時羅生秀而整有若碧梧姿持此欲安徃倀倀求所知論心必有遇世豈無鍾期何當獻天子再歌南薰詩銅駝巷古巷乃隘陋猶説銅駝名想當炎漢日冶工鑄始成首山化金氣棠谿泄金精紅爐氣磅礴烈燄光晶熒煽鞴神力助鈐椎鬼魄驚拱衛擊五雷呵䕶煩六丁猙獰異獸出繚繞長虹縈千年鎮厚地留兹洛陽城摩挲幾嘆息㑹見荆棘生山海有傾竭陵谷多變更詩人重紀述感激傷吾情茫茫付陳迹餘憤何由平澗水在城西十里偃師縣與伊洛瀍四水合流入黄河伊洛與瀍澗四水名尚存當時周室盛營此王城尊環繞壯洛邑朝東入河原疆塲臨關塞源流接藩垣九里餘澤潤萬古狂流奔浮汨涵太虛沉浸奠乾坤霜寒洲渚縮雨暖波濤翻下通黄河流終古何渾渾乘槎訪支機河浩隔天孫影徹漢津逺氣蒸星斗昬嗟我倦行役老景傷精魂沉吟興未己落日傾金盆題東園道人晩釣圖槐池湛晴波日光斂餘照樂彼池上人乘閒晚垂釣悠悠七里灘髙風許同調爾祖昔釣鰲金門曽待詔亦有孫子賢事業逺堪紹不泛窮河槎當鼓濟川櫂豈有終隠淪長才處廊廟尚父心已許巢父首猶掉鬱鬱喬木陰濃翠供吟眺固無羨魚志投竿發清嘯自知天所與不為人所料矯首吳天髙紫烟横逺嶠詠棋書堂春晝永閒拂文楸枰沉思出神妙握機布縱横後粘勢已緩先著心尤精或踈而致宻或危以求生勝算如張良竒計猶陳平厄比馬陵道嚴於細栁營俄然收偉績凱奏銘功成遺圖尚留迹靈經久傳名但能謹始終何須較輸贏動靜各有辨竒正還相傾千年八陣法石漾江流清隆中老諸葛長吟寄深情又大聖有唐堯創法何明智妙測鬼神機巧泄隂陽秘子圓訝布星局方疑象地三百六十路億兆萬千義相對試手談所得在心計要識生死關當知動靜勢㸃白既已難拈黑亦不易自經下著遲遽失加倍利靈變通仙術謀畧豈兒戲如環乃無端似屏而有倚首尾常山蛇竒駿滎河驥洪濤縱巨鱗秋空横獨鷙或疑偏將軍或居大元帥堂堂列營陣正正張旗幟嚴整猶合隊紛糾若離次衝突左右車游擊前後騎出險喜獲安升髙慮將墜困圍每堅壁示敵從緩轡減竈佯退怯伏弩潜夙備就粘必可待投刼尚堪致始疑倐終信逺諜俄近惎輔漢陳曲逆救秦田無忌勇躁久用挑飢貪怠吞餌敵愾急擒首修睦誠委質氣餒應俟養鋒鋭欲少避守關恃其隘背水定其志撞斗嗟范増奉槃快毛遂棊經古攸同兵法今奚異是以博識人察此精㣲意晷刻弗暫忘閒適乃能置竹院每聞聲玉堂常近侍瀛洲風日好巴園嵗月駛沸鼎茶香清拂枰槐影翠承恩諭賦詩效愚敬題字愧乏杜老才陋匪栁公記斐然成短章㝠搜五經笥詠琴古琴縆音亘亦作㮓七弦而能諧五音寥寥白鶴唳杳杳蒼龍吟相傳南薫操應念虞舜心民物乃康阜解愠恩徳深諸葛孔明王道既以熄霸業亦就隳秦起居閏位漢興承帝基綿延四百載炎祚徳日衰當塗轉兇悖挾威神器危天心有所托挈歸大耳兒為求匡輔任夢卜何人宜誰識隆中叟道合司馬知卧龍自偃蹇肯學忘世為三顧煩枉駕幡然出無疑欲纘東都緒便把西蜀麾諸將敵萬人桓桓熊虎姿讒説莫能惑魚水情怡怡益郡遂欵附荆州從政施經營事征伐吳魏相奔馳竟成鼎足勢山河壯藩維袖中出師表快讀涕淚垂祈連路寂寞褒斜谷險巇流光將星墮憤激巾幗遺大厦窘風雨一木誠難支千年八陣磧長江漾寒漪驍將天賦驍勇姿世稱萬人敵猛奮拔山勢健伸扛鼎力叱咤聲如雷羣馬皆辟易出没聲若風獨鷙自搏擊古將應難儔今人更無匹伏弩發馬陵烈熖熾赤壁怒瞋目流電威震鬚森㦸鎮國矻長城戍邉窮異域報㨗書露布奏凱馳羽檄能踵衛霍功可繼關張績臨陣設兵機忠君效臣職㑹當圖雲䑓千載名烜赫喜雨皇天久不雨一雨成嵗功君心妙孚感膏澤施無窮遂令封域内禾黍咸芃芃物物皆滋潤幸兹和氣同天道日以昭君徳日以隆至誠格上下惠政敷西東舟車達四境耕鑿居三農太平臻盛治民俗如豳風從今書大有擊壤歌時雍六月二日王御東閣揮洒睿翰之暇適有青鳥飛集于前馴狎而鳴似依人而托得其所者因命畫工為圖以紀其異臣聞唐太宗臨幸太液池見青鳥裴回容與欣然適意急宣閻立本圖之今臣等獲覩兹事與昔相類謹各賦詩以進翩翩有青鳥飛集東閣前不食瓊田粟自帶瑶池煙暮辭海南雨朝翔冀北天為銜雲錦書禎祥兆延年奉賦禎祥詩有序恭惟賢王欽奉皇上勅命留守北京翊贊聖謨敷施仁徳四年於兹上有以宣朝廷之恩下有以安邦域之大瑞麥獻於闕廷嘉禾産於禁苑甘雨時足卿雲日呈元龜黒質而金紋靈兎白毫而瓊體誠所謂天不愛道地不愛寳發祥効禎而有開必先者也謹詳述為歌詩以獻聖皇御正統恩德洽萬方上膺天命集下纉帝業昌一舉天戈揮再舉龍旗揚仁風息溟渤妖星掃欃槍朝野歸清肅奸諛歛披猖功成邁湯武治浹同虞唐南服交阯夷西讋隂山𦍑萬年保宗社九州奠封疆玉冊啟大國璽節尊親王勅命出留守北京居帝鄉四年宣政化王澤日以􅗈明時遇隆盛和氣感禎祥甘雨自沾足卿雲亦飄翔珍禽時下集翠衿雜明璫仙鶴每馴舞縞衣間𤣥裳瑞麥穗含秀嘉禾實吹香靈兎潔瓊質元龜耀金章神拱霞炫爛神龍雨騰驤天花亦繽紛毫光何煒煌自兹諸福物萃此世太康誠心一以著孝徳久彌彰盛事傳不泯史冊長流芳欲効歌頌美當書紀述詳詞臣愧才菲白髪凝秋霜寸心􅅹忠赤千載永弗忘再奉賦喜雨詩皇天少甘澤禾苗就枯槁何以慰三農攄誠事祈禱賢王啟睿𠂻封章達窮昊上帝潜感孚炎埃急除掃雷驅雨濛濛風走雲浩浩乾池滀聚水平陸注行潦登塲已收麥被畛方茂稻畎畆潤黍菽村疃榮桑棗鼔舞喜兒童歌謡樂耆老徭役蠲免多賦税供輸早寛恤沐深恩仰載荷洪造應書大有年秋成登萬寳梧岡集巻一

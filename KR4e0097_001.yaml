body:
  text: 梧岡集巻一明唐文鳳撰五言古詩宿江口舟中見月扁舟宿江口露下夜初永菰蒲獵獵聲葉颭風不靜缺月出未髙微波翻碎影王事有程期無寐自深省又舟行帆飛駛夜泊橈暫停月出湖水白雲開野山青沙平集下鷺風廽約流螢迢迢鄉心切漁笛聲難聽又辭家日已逺到縣程將近是身如蓬梗飄泊何由定石鬭浪聲齊月摹人影正江神願乞靈明朝風力順四月二日因公出詣城隍廟行香同髙判簿鄭長司黄廣文及儒士鍾子常坐廟門之下觀一邑境内之溪山喜而有作我來宰斯邑倐忽十月餘縣庭紛聚訟好懷那得舒自春已踰夏光景過隙駒人生百年間何為事區區今晨偶公出廟門坐斯須山光列圖畫樹聲雜笙竽欣然樂閒適不受凡俗拘吟眸豁無際羣峰環四隅愧匪廊廟器亦非山澤臞自甘牛刀試民瘼何由蘇所期嵗豐稔憂時嗟術踈終當化淳俗擊壤歌唐虞又偶坐古廟垣趂此公事餘因得雅懷適更喜吟眸舒遐思山谷士皎皎同白駒形迹脫物外聲名播中區自知志有在凡欲無所須肯立齊王門所好異瑟竽㝠鴻不可弋馳馬不受拘何為書咄咄謀拙守一隅機深計非左嗜淺形自臞當今聖明君蒼生望來蘇沾濡徳澤廣寛大法網踈願皷南薫絃至治如有虞初七日道經上馮坑肩輿曉伊軋嶺峻不可度崖隂草未春雲暗天欲暮人家駕險居農舍梯空住森森雪竹林垂垂雨㯶樹我來詢民俗遺老多物故頑澆可還淳為政慎舉措過九曲嶺峻嶺何岧嶤羊腸紆九曲澗沙水漾金石壁泉㵼玉行人若蟻縁巢居同鳥宿石欹疑觸頭路窄不容足民生樂康阜為政賴守牧當今堯舜君終化頑嚚俗留方坑兹行滯積雨連日留方坑棕櫚每多茂鷓鴣時自鳴山深氣猶冷雲暝嵐不晴年饑艱米食尊空少醪傾嚴刑禁侵漁何由慰民情應慚居撫字報政當稱平初度日有感憶昔少年日父母俱在堂二弟娛戲彩怡怡稱夀觴此樂不可得此景不可常情深風木感隕涕空悲傷每懷鞠育恩有志苦未償今年踰知命髩髪已半蒼微名誤舉保出宰山水鄉妻孥應念我逺在天一方旅思何鬰鬰暌離慘中腸無為兒女態氣節當慨慷願言施政成居民化循良焚香重載拜白鶴方南翔八月一日寓衣錦鄉祖印院今為衣錦遊未遂衣錦歸每憐江山是自嘆人民非道路榛莽塞田疇禾黍稀經行詢土俗故老情依依劇談昔日政貪肆同封豨懷奸比設阱嬰禍類發機幸遇聖明朝民安家已肥嗟我叨邑宰才踈名更微願言竭愚𠂻清慎志不違治平二三䇿何當達京畿寸心已淵淪餘事猶塵飛投簮蚤税駕清風舊漁磯祖印院荒廢無僧僅有道人焚脩屋宇漏損予命工瓦以覆之垣以繚之惟存孤松雙栢蒼然凌雲感而有作無僧禪寺古門關少人來於焉聊小憇兩廡取次開脩垣去榛棘掃地除莓苔像設已漫漶檐隅亦傾頽孤燈媚禪龕濁酒湛客杯俗嚚治難化民疲心可哀蹇予施政拙牧馭非良才耿介自獨立肯受庸衆咍顧瞻此庭戺佇立空徘徊惟餘松與栢風雨不可摧夭矯虬龍姿偃蹇梁棟材丁寜勿翦伐留護晴雲堆登鑊嶺朝登鑊嶺巔午下鑊嶺趾山脉自兹分水源由此始衍散千萬支逆流十五里滔汨螺灘平瀬淺石露齒開豁錦里寛地夷樹攅薺我來詢遺老施政尚徳禮人心險於湍王道坦如砥當脱鼎鑊危應習衣冠美禾黍被郊原牛羊散汀沚昔年謝征南功業傳國史至今祠廟存祀饗薦芳芷慨古懷斯人九原呼不起過葛聖公祠按平川志漢末有葛姥來自交廣避黄巾之亂遂留衣錦鄉家貲鉅萬有僮僕數千築城以居西京志有葛姥城是也没後鄉人祠以祀之凡遇疾疫水旱禱之輙應宋朝屢加勅封錦水聖公至今猶存石像山形似飛鵝下浴碧潯水波光湛潭心沙痕露洲觜龍井神物藏禱旱致霖雨地靈鍾石神林深嘯山鬼思昔炎漢末黄巾徧寰宇負乘敢竊攘稔惡肆奸宄葛姥亦何賢辟地來兹處至今千載餘厚徳人所與松風響哀絃天籟咽悲語鄉民重遺愛祠廟俯溪渚春秋嚴祠饗揭䖍奠芳醑雲散山青青神遊向何許經大嶺山經行大嶺山登陟路危險鳥道凌千尋羊腸紆九轉擔摩肩血頳屨嚙足皮蠒人家俯欹崖農屋梯層巘舂碓水傾槽饌厨泉注筧床折支青松礎壊蝕蒼蘚在昔事游刼嘯聚俗汙染而今沐聖化頑獷漸消遣嗟我職牧民才踈自慚靦一念懐慈仁寸心抱忠蹇涵濡徳未融施設政猶淺三年極撫綏㓙邪期脱免望蓮花山峩峩蓮花山萬仭髙崔嵬田形級階梯峰勢層樓䑓四時風雨暝半日雲霧開昔年遭廣冦民屋俱炎埃田疇已荒穢垣墻半蒿萊皇威赫斯怒令行速奔雷大將禡旗纛天兵自南來殺戮遺孽盡鬼哭聲哀哀膏血塗宿莽髑髏蝕蒼苔至今十載後寜謐毋驚猜嗟予膺寵命治邑慚非才勞心勤撫字民物何康哉訪鄒公寨衣錦鄉郎團大坑山亡宋奉御鄒公澤丞相文公天祥屯兵營寨於此累石為寨門隘塞三層至今猶存故迹是時二公召募義勇勤王開都督行府禡旗之際天色晦暝一夕雷風去其牌額府字只留三字都督行識者己知宋之不競也未幾與元兵合首戰于中洲不利中洲云相傳在衣錦鄉下土里再戰于空坑又不利空坑吉安府永豐縣地名文公兵潰夜遁後騎追逼有石峨峙山麓公與母太夫人脱身走石忽仆橫道擁其後以故追者阻不得進今尚呼相公石時公妻歐陽氏妾黃氏子一人佛生女二人栁娘環娘俱被執公至廣東潮陽為兵所獲由是北行矣險隘郎團里迢逓大坑山可怜興王地不在深谷間平生文丞相報君寸心丹同行鄒奉御總戎石為關禡旗召義勇朔風吹雪寒天心厭瀆亂國歩遭艱難元兵威破竹列郡無一完居然就執縛北上何當還日月雖云逺天地應更寛安能著此憤血淚不可乾汗青忠臣傳千載永弗刋我來訪遺跡故壘雲漫漫重脩安湖書院有引有宋咸淳十年臨川何時任興國縣令以衣錦鄉僻逺在萬山間去縣治百餘里常頑獷瀆亂邦經號稱難治惕然憂之思變其習俗迺建安湖書院於洩龍之地置師生以訓迪其鄉民始知學距今百五十年殿庭廊廡俱就傾頽洪武庚辰秋八月予因撫安人民至是以學校之興廢迺守令之責為教化之源所當先務也遂命工重脩經始于是月之十有一日以俟落成感而有作崇岡若盤龍兹地極髙爽何令臨是鄉政教昔攸掌周逥廊廡成宏深殿庭敞搆屋鳩良材買田收沃壤訓迪師有方教育士有養朝夕勤絃歌春秋嚴祀享皇恩雨露多聖道日星朗迄今百年餘隳廢盈草莽我來重謁拜遺像愧瞻仰碑碣載雄文絲竹留餘響識此風化源六經期再講矢言力興脩述詩告吾黨謁先賢祠興國雖僻逺先賢昔所治有宋程太中遺澤常在兹二子隨侍宦義方訓書詩猗歟周元公天挺賢哲姿大道晦復明元氣淳化漓平生懸冰鑑一見深相知授受斯有託繼絶百世師至今過化地濂洛留專祠何公任興剏嵗久日月馳荒廢行復理終當還舊規嗟我重謁拜薦芳酒盈巵髙山頻仰止悠悠起遐思讀蛟峰文山碑安湖書院有方狀元蛟峰文丞相文山二碑石猶存何令與二公同登第何年剏書院在昔咸淳時固識教化首經營闢新基狀元飽經術丞相工文辭名聯龍虎榜身居鳯凰池令尹亦登第同折仙桂枝相知書偉績鑿鑿鐫穹碑忠義千古在光燄萬丈垂竒音鏗金石美奏諧塤虎嗟哉去已逺遺愛民猶思自慚踵公後施政甫及期願言再興脩逺大以為期摩挲頻細讀懷古空漣洏過獅子灘朝發龍王祠暮過獅子灘怪蹲石磊磊細潄波潺潺形疑鬼工鑿跡類神斧剜我今問風俗黎庶當撫安慨兹水勢險漕運良獨難移檄召丁夫分流殺奔湍架木以成梁隘石以為關從兹獲寜順扁舟輕徃還既無覆溺患亦無負荷艱民生喜粗給公租幸早完催科慚政拙沗竊居微官老臣肯負國効職輸寸丹憇廣法院院在中洲中洲有古刹亭午聊小憇禪龕暎苔痕佛衣濕嵐翠燈灺乏油滋香炷無火試尊者十八人現世恁遊戲了了性自靈如如形更異當年方廣寺天台竒勝地石橋夜月光赤城朝霞氣我來恣流觀懷古念興廢惟餘老孤衲欲問西來意聾耳寂無言野狀著芒屨歸舟不可留一篙秋水駛明朝回縣庭沙際迎候吏洪武辛巳閏三月初九之吉陪同守郭公遊靈山徘徊厯覽山水之勝可娛心目承命賦詩謾成古體一首錄藁奉呈惟冀采覽峩峩空同山巨鎮峙江右岌嶪凌穹蒼磅礴踞坤垕靈山在平川突起峰巒秀何年構禪宫金碧絢晴晝深淵每潜龍空巖疑伏獸鐵石噓凉雲珠泉㵼寒溜連林竹影移滿道松隂覆澗流響琴筑岫勢列籩豆木客聽講經山鬼伏施呪萬景自森羅百靈誰領袖今逢三月春草木正芳茂奉陪賢别駕幸尾車塵後遊覽謾徘徊唫哦應逗遛小酌酒味醇初煮茶香透我侯徳政傳十邑期借冦何當拜丹墀鴻臚為敷奏題水石古松圖髙松未化龍僵立古澗旁飛泉落天外懸流千丈强勢來蒼石峽六月灑雪霜滔滔朝宗意入海瀦汪洋嗤彼采藥兒一葦何由航曷若長在山觸石鏘琳琅猶疑水樂洞常居白雲鄉誰人胷次濶㸃染歸毫芒淺波飢鶴立渟淵蟄蛟藏瀟瀟雜風雨靈根茯苓香我欲問羣仙乞我辟榖方大材當愛䕶留待作棟梁題古木懸流圖蒼峰萬仭髙古木蟠危根下有深澗壑歕波懸流奔紆縈百千折渟淵杳無垠雪花亂飛洒雲氣互吐吞峭崖束為峽兩山開作亹太古凍冰積四時寒霧昏枝僵蛟龍骨皮皴苔蘚痕棟梁不見取匠石誰與論獨留鎮空谷嵗月常永存精神㑹元氣長養資厚坤豈知鄧林産而有遺材尊滔滔東逝水朝宗念君恩考滿舟經十八灘因分各灘名賦詩鼈灘兹灘試初程崖分色如鐵中流僅容舠怪石何嶻嶪大者類黿鼉小者狀龜鼈胡為取其名戒險天所設春波㵼綠雲寒沫飛白雪勢急篙弗支力雄纜俄絶所以經行人念之情内熱撼地怒雷奔旋颷急電掣左手掖豐隆右手招列缺勿遺毫髪差性命輕一撇皇天念老臣豈忍微軀㓕區區忠信心終當保明哲古鏡灘一灘復一灘如何名古鏡豈非水澂清寒碧淨而瑩鑑此鬢眉真燭此形容正質柔隂氣凝性靜金精孕不鑄首山銅不浮泗濵磬匣空游塵昏月冷妖蟇屏輕㠶那可張每畏風力勁雨波春更狂冰澌寒未凝綆耎宜牽長石很敢鬬硬呼酒酹江神薦芳致予敬衰年存節操全彼天賦命花縣復歸來更勤恤民政天柱灘斯名本髙峰移之托灘水潺湲聲肯停春波學龍語源口百尺流山中一夜雨沙痕自齧蝕石勢尤齟齬地隘有涯岸水束無洲渚舟楫濟不通制器聖所取如何逢險艱利物功弗與我欲問禹王楚粤未經歩遺此䟽鑿功斯民尚罹苦迺無巨靈掌亦欠五丁斧願繼清獻公萬夫力如虎㑹當阻阨平永除號天柱小湖灘水瀦小湖水石積危灘石石巨相犄角水駛自激射欲度尋丈險迺望咫尺隔愧昧縮地法恨無登天翼如馬戒舟航飛鳬輕履舄我今值考滿三年課書績小船窄於斗篷底何局蹐凌晨此經過渉深鯨波碧隮西雨暈虹向東風退鷁毋肆以弗虞每慎而自慄迫晩獲平安至喜情尤適雞酒賽神歸隔烟聽漁笛狗跡灘巖岈露昂頭石滑印餘跡何年天狗下䑛血變成碧逐兎遺其蹤獲豕失其蹢至今灘得名圖誌忘紀實淵深自沈沈水湛亦湜湜浮青荇帶牽暈翠苔錢蝕戢翼雙鴛鴦浴毛數鸂鶒於兹設天險濟涉費人力河伯願息怒陽侯已効職助順徼神靈清漲滿三尺穏送下東流布㠶颺風急自慚拙催科當考陽城績石人灘石出如人長灘名以兹顯蘿衣緑乍紉苔髪翠初剪雲凝身覆裸雨零淚流泫影浸浪紋揺足踏波痕淺至今屹以立不逐流波轉有時氣鬰蒸隂火炊甑甗有時風濆淪神力旋磑碾我買西江船三月涉危險潭空巨魚潜沙㙲饞蛟逺陵谷永不遷桑海何曽變考績膺清裁幸與天官選平生撫字心施政當力勉貉獺灘貉為山狐種獺乃水畜類云胡一灘中異性豈同聚今始知其然有石髙贔屭朝夕相舂撞千古流不去聚腋難為裘得魚豈能祭百川俱朝宗到海已東逝我來治花封懷徠念民事當為忠謇臣肯負清白吏羞澁錢留囊光怪詩盈笥三年朝帝京扁舟風水駛父老有深期臨岐忍揮淚旋艫當再經浩蕩波聲注銅盤灘黄帝昔製鼎鼎象神姦懼尚遺首山金斯盤幾時鑄天地為爐燃隂陽為炭聚龍伯來鼓燄海若出傾注器成不敢用真宰愁應訴一叱留兹灘墮波激餘怒羣石驚起立詭狀自呈露罔象逺潜遁神靈每扶䕶從此絶艱虞舟楫通濟渡妥帖濤浪息有若履平路而我述勝概欲去仍返顧悠悠章貢江千古同永固清洲灘湯湯清洲灘泛溢波不殺兩厓屹相向峽束若關隘源瀦庾嶺流支接章江𣲖餘勢尚洶湧狂聲自滂湃終日雲氣屯六月雪花洒燃犀照水族温嶠應好怪具服呼石丈米芾曽下拜篙師力不齊怒目何睚眦世人意不合細故多蔕芥嗟我才弗長老氣猶豪邁賦命從數竒清神飲沆瀣益重吾民思甘棠歌勿敗梁灘危灘石作梁横截中流壯滔汨向東逝逞怒不得放砥柱迴狂瀾百川此其障波神有餘憤氣驕猶張王我欲就安妥投檄相誚讓爾心亦豈忍急為收洪漲勿湧九江濤勿奔三峽浪我有寸許膠息渾一千丈爾當守澂清肯逐濁涇蕩江山必有神司宰任忠諒行當率吾民牲醴嚴祀饗願言沛惠澤千秋永毋忘昆侖灘昆侖在西極山水皆所祖渾渾黄河源九泉元氣吐泄此天漢津狂流萬萬古睠兹衣帶水亂石激其怒大聲殷晴空闐闐震雷鼓青林飢鳥號白晝饞蛟舞驚湍起旋風濺沫洒飛雨來徃具舟航常哀覆溺苦欲填精衛石欲射夫差弩安得黄帽郎膂力健於虎柔櫓頻咿軋長篙闕撑拄脱險一瞬間安流有神祜曉灘曉灘迺危峻暮灘亦隘陋中通一線波如注泰山溜風鏃急難攅石鋒利莫鬬舟行一失勢糜碎不可救我欲訴天君降勅責川后妖孽汝當驅黎庶汝當祐胡為不汝職尸居手空袖天吳有九頭風鵝多大咮饞蛟自可啄飢鰐亦堪蹂効順宜拊循竭忠能左右有徳所當酬有功所當奏海晏黄河清吾皇萬萬夀鐵索灘鐵索浪得名隨波不可繫自從開闢來鴻荒知幾世質生資於天氣行注於地四海浩難極五湖𣺌無際蕞爾兹小灘怒流亦何駛浩浩復湯湯洶洶仍濞濞前舟既已行後舟亦云至危若薄冰陷慄若深淵墜須㬰性命輕俄頃魂魄褫茍能慎所持蹈險徳可企欲知利渉戒當明大易義寄語江湖人風波宜早避小蓼灘小蓼灘居前大蓼灘在後岐而羣𣲖分匯而衆流湊源頭混混傾石罅潺潺漱我行泛孤舟正值陽春候晴光滿溪山和氣暄宇宙王事有程期赴闕難逗遛雲隨征斾飛雨浥輕衫透嗟我老侵尋髪秃面逾皺報政當考績鴻臚名為奏承恩復任回鬰鬰棠隂茂訟簡民自淳琴堂閒白晝江神徳不忘祭饗答靈祐大蓼灘大蓼與小蓼兩灘豈云逺湖湘壯關隘嶺海設樞鍵滔滔萬里流東去何時轉回盤接碧灣迢遥隔蒼巘嚢沙沙自擁叱石石皆偃長年用力齊揵疾如熊健舟行穏不欹厄險幸脱免蛟藏伏蜿蜒龍歸潜蜓蝘風順獲安流江神著靈顯隄栁緑烟凝溪桃紅露泫我來治山邑光隂猶指撚撫綏政不苛花村無吠犬錦津灘西蜀錦江津相去萬里隔此灘名相符終古那可易不盈十丈許湛湛漾寒碧飲虹蒸曉氣浴蟾浸秋魄射工每伺人鵂鶹或呼客栁子記惡溪陶令卧醒石今古非同時出處亦異跡而我莫諧俗迺有書傳癖豈敢辭驅馳當盡臣子職鯨波肯憚險拏舟快所厯遥遥紫金山在望猶咫尺明發不能寐㠶開早潮白漂神灘厯盡十八灘石惡水尤惡槳盪退不前舟移碍乃閣窺深若井投注髙疑空落自省神每漂旁觀心更愕忠貞固可仗性命抑奚托履險徳在躬䝉恩秩命爵臣心敢怠遑天意自昭灼我欲移沃焦漏泄使之涸我欲呼巨靈擘裂用之鑿願言見安流怒濤息歕薄丹𠂻死即休白首窮亦樂何須歎乘桴孔聖不堪作惶恐灘灘以惶恐稱訛傳黄公號昔年曽開鑿平治功已效千金貲棄捐萬夫聲呌噪遺愛人是思厚徳天所報深淵宅蛟蜃怪石蹲虎豹走浪風若颶激波雨如雹壞舟𦵏魚腹哀溺有誰弔至今無此患賴公力能導民貨遷有無國賦通運漕徃來絶阻艱利渉恁嬉笑青青歡喜山行人且停櫂至兹心始夷泠然發清嘯挽蕭正固先生詩五十韻慟哭宇宙間典刑日淪落來者已可期徃者不堪作若匪資前修何由啓後覺滔滔東逝波砥柱莫逥薄忽忽西飛烏長繩難縶縳不有大化功孰尸混沌樸欲俾斯道傳庶許伊人託平生蕭正固碩學號該博諸史鈎𤣥微六經剔穿鑿道統望洙泗理源遡濂洛韓栁咀英華朱張遵矩矱晶熒日星明潤潔江漢濯下帷工著述執筆事刪削所以大江西儒林仰喬嶽譬彼剸犀兕光拭青萍鍔譬彼制咸韶音動黄鐘龠聞望愈尊隆才猷更昭灼朝廷詔徴賢三聘起巖壑治本具敷陳髙談帝王畧便民十篇書直言何謇諤枯槁蘇甘霖疲癃瘥良藥帝曰汝布衣丹𠂻亦誠慤錫汝以嘉宴旌汝以好爵迺職王府佐陛辭甘退却飄飄紫塞鴻戛戛青田鶴豈料震天威左謫無愧怍賜環召歸旋舟艤龍河泊綸音日宣明堅志弗驚愕仍許陪班行顧問須寵渥俄然拜恩除關陜司教鐸委分居芹宫無心慕芸閣諸生服講説課試嚴條約誘掖袪愚䝉鼓舞振孱弱若求杞梓材工師斧攸斵若治瑚璉器玉人石為錯化雨時沾濡文風日磅礴得請喜遂初壁房老蓀葯早賦二宜休晚節全至樂龎眉白於霜體健猶矍鑠遣興哦佳詩怡情動清酌支笻歩東阡躡屩訪南郭徑松偃舊枝籬菊綻疎萼優游飽看山嵐光逗簾箔吁嗟疾纒綿二豎潜搆惡痛失少微星寒芒殞天末有子克承家敦厚謹然諾仕途車發軔藝圃弓滿彍作賔觀國光輔導任謀度遺澤猶生存千古宛如昨載歌蒿里辭悲思滿寥廓送蕭用道長史之桂林長風吹征衣白日照穹顥朝辭金陵城暮向桂林道
body:
  text: 梧岡集卷九明唐文鳯撰贊傳銘賦祭文唐公子善小像贊夢中作煌煌隴西燁燁晉昌移根接李奕葉歸唐猗歟我公紹述遺芳乃祖乃父虎躍蛟驤厥昆厥季鴻飛鴈翔靈椿先老摧於秋霜幸存慈母晚節康强以全孝養福壽延長公之少也金玉其相公之老也松柏其蒼式瞻遺像精神洋洋餘慶不泯厚澤猶滂游魂雖逝英氣未亡我作贊語虹吐夜光傳家永久百世不忘望雲思親圖贊有序望雲圖者都事朱公為思親而作也公世為霍邱人蓋因親以寄意於雲非因雲而致思於親也贊曰白雲孤飛起於天末人子思親因雲是託所思伊何具慶在堂溫凊莫待甘旨未嘗大行之山霍邱之地人則同心時乃異世親年有限雲氣無常以聚以散俾夀俾康仁傑顯唐夀昌名宋孝行逺聞勳業逾重肅肅蓮幕峨峨薇垣贊治揚譽洽于大藩大藩所蒞惟邑惟府或勸或懲或字或撫移孝為忠于子于臣非忠非君非孝無親斯圖是徵斯贊是述惟公孝思有永無斁題李原哲小像贊貌清氣腴德醇行孚身居五獻之晴湖神遊八極之太虛其山澤之臞乎其列仙之儒乎非斯人也吾誰為徒題陳子衡春日行樂小像贊春服之襜如其來于于春日之煦如其行徐徐經南江之滸望北堂之居念陽和之德澤知寸草之春暉慨王事之靡盬奈陟屺而未歸聊尚羊以自適斯樂也何如斯樂也何如吁鄭氏雙節傳鄭國英婦王氏以節見舉於鄉人將申請間仇家誣以不實於御史臺御史陜右韓公重其事即日帥郡守八閩黃公教授天台江公躬詣其鄉拘集鄉里髙年知識厯言其節如出一口因詣其家但見中有元史忠義傳懸於壁末有其妻聞之君茍死吾其相從地下矣之句愕然嘆曰節孝世家併以鄭玉婦何氏守節之情上聞雙旌其門按王氏名禪歙人也何氏名萱浙人也王於國英何於子美皆側室國英子美堂兄弟友愛惇睦先後繼卒值時荒歉干戈日尋征科日倍負孤農圃計日紡績三十餘年貞操無瑕回視其世母鄭昌齡妻孀居六十一年壽享九十有六始終一節者大有光也君子謂王何年相若同門同苦於始同榮其終婦道之冠姆儀之尊因小人之誣引君子之敬不特聨美柏舟之詩又將得乎拔茅連茹之易邪鮑節婦傳節婦姓宋氏名禮玉歙北寧泰鄉人也世以資雄鄉里節婦幼在室専於女紅性朴而淳不尚華靡在父母側愈愈無疾言厲色以孝謹聞擇配名族年十有九始歸於鮑尚褧鮑為儒宦宗家庭肅睦凡婦入門必遵禮服勤節婦事舅姑以孝相夫以敬撫育前室子相以慈愛尚褧能詩文工書精歐陽體篆𨽻亦可觀洪武初郡太守王公以賢良舉一時翰苑名流推轂授翰林院典籖尋除編修升修撰蒞職甫三載出為耀州同知在任未考滿俄以事株連不幸物故而節婦惸惸弔影抱其所生子長安馳馬至京師收其夫遺骸還鄉辛苦萬狀道路見者莫不哀之舅老而姑病悼其子死非辜怏怏觖望節婦去脂澤躬儉約經紀其家政終喪舅姑相繼卒葬祭合宜不五年子長安亦天遇相不異已出娶婦抱孫克底成立今年踰五十有一矣康强無恙蓋天之報施而祐其苦節邪先是節婦歸父憫其年幼子喪欲奪其志婦泣而告曰曩與吾夫於耀州官廨月下謂曰設若不幸罹禍汝肯守志乎婦具以實心對夫喜曰汝若是吾無憾矣既已許之豈可以死生而異其心乎奉老恤幼以迓續餘休庶無負吾夫也父語塞而止其子相事之如所生母恐其名不傳乃屬豫傳其事豫與尚褧篤斯文友誼故不辭而書之以俟觀民風者采焉唐先生曰豫嘗讀宋史知鮑氏父子爭相死事而以慈孝稱前元江婦守節自誓郡邑白于省部將旌表其門不幸壬辰俶擾而止今宋婦亦能厲志以踵江後可謂能繼美矣嗚呼父之慈子之孝婦之貞何獨見於鮑氏之一門豈非觀感而然歟嗚呼賢哉許孝女刲股傳孝女姓許氏名淑𤣥城東故家許伯玉女也自幼警悟縫紉烹飪無不精絶稍長能書算名數論語孝經列女傳母孺人李氏口授輒成誦年十七伯玉病羸弱食飲不進百藥弗效孝女依依侍側憂戚若不能生者或言刲股可療孝女聞之乃齊沐祝天持刀入私室刲左股肉和麋以進伯玉聞香氣盡啜之疾頓愈舉家嗟異閭里姻戚咸稱為孝女後二載伯玉疾復作孝女更欲為之未及而伯玉卒孝女悲號終喪不輟年二十一始為上路張以信妻詩禮家也孝女入門事上撫下不少遺禮法不幸舅姑先沒太祖介玉翁在堂孝女奉事尤謹脯饈酒漿及老人所宜用者靡不備具咸稱為賢婦鄉先生江文興為述其事甚詳既沒其孫惟達特以示豫請為傳論曰三代以前未聞刲股之說後世醫書載人肉能愈痼疾孝子爭趍之至有剖脅取肝以為孝者豈欲矜其名而為之哉父子天性也親病在牀巫藥無功危在旦夕為人子者迫切至情不惜肌膚剚于刀刃以期萬一之幸非孝誠之至能如是乎蓋於斯時知有其親不知有其身故也若淑𤣥真可謂孝女矣孝誠根於心孰勸之然哉彼進食怒罵臨死不顧者聞孝女之風可以少愧矣朱節婦傳節婦姓鎦名妙真贛人也夫族為宋孝子朱夀昌之裔其先居南徐世以儒宦顯因仕寓贛族大以蕃父以道任鹽課提舉弟彥才擢昭信校尉節婦幼在室事父母以孝謹聞年十六歸朱崇文事舅姑以敬慎稱承祀以誠理家以儉相夫以順甫二十八嵗而崇文卒室若懸磬一子顯始周嵗節婦辛勤萬狀以長以教卒底于成顯率訓知學肄業黌宫才名籍甚將試于用洪武庚辰按察僉憲裴公行部亷察民風以婦名聞僉憲吕公核實無異得請㫖旌其門閭蠲其賦役云論曰天道𤣥默人謂難諶然報施之理無毫髮爽夀昌孝行卓著炎宋天以名宦報之非特施其身而及於後裔猶未巳也復以節婦承之則天道之報施豈難諶哉嗚呼自古忠孝節義史不多見世或得其一二史臣必謹書而備録之蓋重人紀扶世教以為激勸地也歐陽公傳五代史載一李氏謂當時士大夫之所不若其抑揚豫奪何如哉今節婦全貞保孤旌寵自至俾人婦皆心其心則世教豈不植哉天道豈不明哉嗚呼若節婦者抑可謂賢矣孤雲處士傳孤雲處士者不知其世系一日得其鄉先達前太常司丞吕君仲善所撰其兄文郁墓志銘始知其出於歐陽氏世居廬陵之富田乃文忠公裔父本立樂平川山水之勝卜居城之西山迄今三世處士名文質生平無他嗜好性恬靜不樂奔兢而心思精巧専攻丹青篆刻能致其妙理於山水得其幽深寬間之趣於神鬼得其變化竒詭之狀於圖書得其篆籕體製之古於傳神得其顔貌態度之肖於雕鎪得其字畫式格之精是以人皆愛譽之然其心跡不滯於物不屑於利遇適興或研朱吮墨或鑱石弄筆頃刻而成人或以工藝目之輒搖手弗應惜未嘗有以家學語之而僅施其巧如是而已每與人言曰吾浮沈於世如孤雲無定蹤故咸稱為孤雲處士云論曰大朴未散人文未滋及乎末運朴散文滋日趨乎巧則人心之天已離矣然而四民之業各有其所専殆不可以兼也為士者何事曰尚志志之所存有其大者矣志於游藝亦聖人之所與但有先後之序耳孤雲處士不用其巧於機械變詐而用之以成執藝之名蓋猶善於用巧者抑亦非大巧歟嘗讀韓栁文雖圬者梓人亦為立傳以傳不朽蓋托之警世也雄辭雅論煒耀今古豫作孤雲處士傳豈敢上與韓栁之傳圬梓例視哉然孤雲之名則自將不泯於天壤間也必矣敬跋濂溪書屋銘濓溪書屋者周啓宗氏修讀之所也屋在廬山之下昔宋周茂叔家於舂陵而老於廬阜因取故里之號以名其川水為濂溪其水發源於蓮花峯下潔清紺寒下合於湓江而築書堂於其上今其遺址去九江郡治之南十里久荒茀不治至淳熙丙申郡守潘慈明通守吕勝已復作堂其處仍揭以舊名而祠以祀之太史黃魯直嘗為之序云茂叔人品甚髙胸中灑落如光風霽月酷愛濓溪退居乞身而老于是二程每游從而問道焉明道曰吾再見周茂叔吟風玩月而歸得吾與㸃也之意伊川曰吾再見周茂叔論道遂厭科舉之習此周子之道得二程子傳之而益振後又得張子朱子紹之其道大明於天下後世至今餘風遺韻沾溉未泯則斯道之所寄有在矣今啓宗為其緒𦙍構書屋而揭書堂之舊名俾其子孫知有其祖景行而不忘也歟豫既為記之矣而啓宗復徴豫以言遂為叙而銘之銘曰道喪千載孔孟失傳五星聚奎篤生大賢周子起矣程子紹焉大道復明如日行天繼以張朱人文昭宣德貫今古學開後先峩峩廬阜峯濯青蓮舂陵水名移于兹川湯湯其流涓涓其泉濓溪是扁棟宇飛騫山川如昨人世幾遷聞孫踵武後四百年乃建書屋經史精研道探其微理鈎其𤣥遺編青簡舊物青氊繩繩弗泯惟爾勉旃我作銘詩篆刻華璇有嚴對越終日乾乾家山一覽圖賦西江之廬陵大郡也為唐廬陵王所封之地故以名郡當趙宋時稱四忠一節之鄉文章行義為世儒宗非他郡比其地南接贑城北竟贑水東控臨川西連長沙咽喉荆廣唇齒淮浙扼庾嶺之衝抵汀衡之界而江山映帶一覽而在眉宇之間真勝概竒觀也康君彥民家西昌之銅莊在郡上游據大江之右而宅其中攬清挹秀攄幽發粹而乾坤之淑氣蜿蟺扶輿鍾於人焉是以篤生賢才若彥民氏其亦才而賢者歟君以明經第進士淹留宦途踰二十載不得翺翔容與於其間上邱隴而尋釣游每一追思未嘗不嘆息流涕而戚懷動心也乃命畫史繪為家山一覽圖庶以慰心目而釋羇思豫愧吳蠶老不作繭而抽思弗長也勉為賦之其辭曰惟衡嶽之奠位兮乃鎮服於南荒氣磅礴以冲融兮形蜿蟺而延長蟠踞於數十州兮綿亘於數千里欲髙昻以低伏兮倏馳突而留止既峯巒而巖壑兮又邱垤以陂陀勢捲滄江之雲濤兮狀湧瀛海之風波分支走脈於八埏兮旋轉迂回於四域歷髙廣而荆楚兮何㠝岏以崱屴峙九疑以贑吉兮駐西昌而銅莊乾坤一元之氣兮生人才之賢良遇聖朝之樂育兮喜榮登於科第履仕途之往復兮去鄉國之迢遰淹日月之悠久兮竟侵尋於嵗紀青原之峯屹屹兮文江之水茫茫眷祖宗之邱隴兮慨如斧而如堂想父母之第宅兮念姻戚之里巷違老幼之談笑兮疏友朋之論講每馳思於夢寐兮或騁目於登臨嗟從政之留滯兮嘆蹤跡之浮沈追童稚之釣遊兮悲壯年之離别逺舊業以難忘兮慘中情而不悅豈效彭澤之賦歸兮肯慕神武之挂冠方致身以委質兮當報國而輸丹將何以釋衷素兮托圖畫於毫楮體御風而弗輕兮恨豫臂之不羽指家山而一覽兮慰鬱結之深思辨雲山之稠疊兮睇烟樹之參差武姥之蒼翠沾衣兮天心之危峰卓筆惟康氏之世家兮耀文星於奎璧羌若人之賢才兮能尊主以庇民傳奕葉以流芳兮道愈隆而德愈新篤天倫而義居兮尚統系以㑹譜志學優以出仕兮挽淳風於復古朝耕犂於畎畝兮晚牧放於郊原力務本於稼穡兮以勵業而名軒緬懷四忠之令譽兮景行一節之大義偉精忠直節之無窮兮振古今而塞天地期若人之繼踵兮當配立於綱常明君臣之禮道兮名彌久而彌彰著勳業於史册兮勒功績於彛鼎厯百世而益長兮逾千載以不泯誶曰美哉一覽之家山兮縱達人之大觀移景物於圖畫兮妙吮墨而研丹認依稀之故境兮胡不夷猶而容與籬菊疏而松徑荒兮攀桂枝以延佇清泉白石以同盟兮猿驚鶴怨而增吁矢豫心以逺大兮永書紳而弗渝祭考妣文惟我考妣積德深厚如水益深如木益茂以培其本以濬其源本天者全源理者蕃天符德著德協理正以引以延協于義命李唐之裔嗣續晉昌惟宗攸熾惟世有光暨于小子承後弗力莫紹徽音曷纘丕績自膺朝命授職治民作宰五年政化維新改除王官輔導斯試才愚學疏寧不懷愧惟考惟妣英靈冥冥錫我默相明德惟馨扈從北行弗克省墓松楸鬱然戚于衷素敬遣家禎含哀瀝誠肴微以薄醴甘以清白雲在山明月在水魂飛遙遙血淚如雨祭大尹見山先生何公文惟公出宰兹邑牛刀小試衣錦之鄉壤接荒裔弗肄詩書弗間禮義乃設學宫有嚴歆祀師徒弦誦風俗淳懿鄒魯攸同荆楚豈異蛟峯雄文文山偉記照耀千載深探奧理奈何厄基文獻墜地道無古今時有興廢嗟我非才後公百祀載瞻載慕是憂是愧裴回殿庭草莾荒穢誓言修葺政化攸係兹陳薄奠醴酒殽胾公其默相尚冀竣事江山不改還復佳氣重修安湖書院祭先聖文王化聖道治教並行無間遐邇日星昭明教道攸重治化斯興為帝之則為國之經平川萬室弦誦輟聲衣錦邊僻俗尚鬬爭有宋何令稽古是程乃創書院訟理政成以變民風以導民情今踰百祀棟宇摧傾同寅協力矢言經營以堂以廡以户以扄庖湢式具倉庾式盈竣事畢工勒石紀名兹焉告祀少瀝衷誠牲醴維潔黍稷維馨對越在天陟降在庭文教誕敷洋洋炳靈重修安湖書院祭先賢文惟我元公紹述道統引微綴絶萬鈞斯重不有先覺伊誰其傳道之顯晦實係于天惟我太中知人則哲二子受學六籍探頥如星拱極如水朝宗門立暮雪座挹春風卓哉何侯興創書院身任政教風俗丕變文山死節耿耿孤忠覺軒計議鳩材庀工成兹偉績傳于後世百五十年竟就隳廢承乏興修萬瓦鱗萃祀享有祠像設有位景慕先賢揭䖍薦芳殽實于爼酒崇于觴尚期來格以康祀事以澤我民以祐我士祭何知縣文惟公顯于咸淳仕于興國文教率敷丕變民俗乃建書院衣錦之鄉吾民有歸吾道有光迄今年久廢弛弗治舊尹所作新尹攸繼茲陳薄奠肴潔酒冽名垂穹碑千載不滅安湖書院祭先賢祠惟我諸賢道明濓洛啓沃後進實賴先覺師友淵源父子家學纘承統緒有志述作六經精華諸子糟粕入海求珠剖石得璞紫陽髙風江漢洗濯文山大節日星昭焯文教振興魯齊是若開基成構覺軒是託衣冠環珮步趨唯諾聚于一堂丰姿如作元氣之㑹鳯翥龍躍式當仲冬肴亷酒薄鑒兹來饗神歸寥廓祭先賢祠惟我諸賢倡明道學後於關閩先於濓洛惟師惟友乃繼乃承儒林鳯棲學海蛟騰惟父惟子以嗣以續滄海遺珠藍田雙玉紫陽紹統文山輸忠理明而精節立而雄下逮覺軒協力興創舊跡猶存髙風已往兹陳薄奠牲醴瘠醨鑒兹來饗魂游何之祭何知縣祠惟公生而有位歿而有祠厯世雖逺遺愛猶思詠棠召伯種花潘郎恩融德洽衣錦之鄉書院斯建教民興學啓迪後進追蹤先覺兹臨是邑巋然靈光耳聞絃歌目覩羹牆式薦蘋藻瞻仰起敬民俗以淳文風益盛梧岡集卷九

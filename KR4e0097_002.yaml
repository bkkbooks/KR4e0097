耳仙人濕羽衣當年醉熟瓊花觀練溪朝雲新安之溪流濬源于楊之水直㵼數十里望之如練帶然昔人有千尋練帶新安水之句故稱曰練溪每春曉雨止白雲橫溪雲水相連影搖素練真奇觀也欲吟咏之恨無謝眺驚人語耳溪流素練三千尺寒光搖曳朝雲濕風驅勃勃海濤翻瀰漫欲浸天宇碧帆歸衝斷半溪分扶桑日照收氤氲數聲漁唱破清曉沙際驚飛鷗鷺羣紫陽夜讀紫陽山勢若飛鳳昔我徽文公寓閩南猶以是山名其讀書之樓以表其不忘桑梓之意後之學者面山構書院以為講學地宋穆陵賜紫陽書院四大字刻於貞珉至今猶存兵燹餘再遷于東城縣學之旁新安講學尊紫陽書堂夜永聲琅琅穆陵宸翰鸞鳳翥奎璧下貫晴虹光上探孔孟繼濂洛道重泰山與喬嶽神遊故國想歸來月明應化遼天鶴烏聊曉鐘唐越國汪公華保禦六州嘗屯兵于是山遂營州治焉公識機慕化而歸于有唐不失臣禮錫以旌節鄉人德之立祠以祀山冠以危樓環以雉堞懸以禁鐘昕夕叩之鏗鍧聲徹數十里烏聊山頭殘曉月光射落星蒼石裂當年故壘埋劍刀至今猶帶英雄血華鯨吼散秋空雲六街車馬何紛紛一百八聲聲更徹直恐夢驚天上聞漁梁夕照漁梁俗傳宋太守袁公所作也在表城門之南練溪之下流以南離火盛故堰水以厭勝之空其中以通舟楫之往來日欲晡歸帆渺渺落雁翩翩行人若蟻緣營營然不息登髙下視之則夕陽在鴉背天然畫本也欲落不落晚日黃歸雁寫遍遙天長數聲漁笛起何許孤舟下瀨如龍驤漠漠煙橫溪萬頃鴉背斜陽駐餘景叩舷歌斷蘋花風殘酒半銷幽夢醒古巖晴嵐古巖去歙西三十里山形如覆盂甚童而無草木傃南有石巖空洞下可容數百肘僧結廬居之而棟宇半接于巖前庋佛像其中遇春曉則晴嵐冉冉耕夫牧子出沒於隴畝煙靄之際亦可愛也天遣六丁來下鑿紺宇參差出樓閣空巖不見椎斧痕毋乃混沌元氣朴嵐光林影迷煙霏輕浮翠雨涼沾衣樵歌未起行人少山僧飛錫朝來歸黃山霽雪黃山舊名黟山唐天寶六年勑改黃山世傳黃帝與容成子浮丘公講道於是今藥罏丹竈具存有朱砂泉隂火潛燃氣如饙餾有竒峰三十六每當積雪收霽日光倒射諸峰聨絡玲瓏勢若削玉善畫者不能殫其巧焉三十六峰青作朵朱砂泉香煮隂火澗鳴流碎瓊瑶英崖空積遍珠璣顆日光倒射玉芙蓉羣仙問道來崆洞臨風環珮儻可挹便欲飛身騎白龍白水寒蟾白水在歙城之南二里許山勢外周固而內寬平地湧泉一泓瀦為小池冬夏不枯泉色甚白如石髓玉乳融液動蕩每夜永寒蟾流輝微風揚之光漾不定有若走汞池之旁構梵宇宏麗以是榜其額云小池湛湛玉色泉直疑下有白龍眠山靈擘破石髓溢一泓空碧涵漪漣幽人和月掬在手笑吸清輝當春酒酒酣大呌問山靈千年誰是知心友七言古體詩一章共二十四韻不揣蕪陋録送鄭彥彬赴王駙馬都尉館時兄彥昭亦寓閩中聖皇六飛渡江水義旗所向羣姦弭金陵龍虎挹神京鬱蔥王氣衝天紫攀鱗附翼俱英雄文武赫若和陽公榮膺國戚聨肺腑秀育星斗羅心胸憶昨董師臨古歙招賢喜遇詞章伯賈誼聲華擅獨竒鄭虔才思推三絶去年移戍當會稽絳帳戎幕相追隨乞假歸來養慈母豈意淚著堂萱萎今年又喜鎮閩海走幣遙遙千里外誰言坐冷客無氈懸榻塵凝久相待於焉判袂不可留青山緑水增離愁槖金曽為陸賈贐蠻音椎結今南州氣候炎蒸異中土嚴霜虐雪何曾覩椰子酒殘焚鷓鴣荔支雨歇啼鸚鵡主賔相見情愈深洗盡别來慕藺心有時覔句月窺户幾度談經風滿林君家難兄代希有喪亂升沈十年久昔時青馬卸雕韀今日酡顔成皓首吁嗟世事何必論開懷且倒玻璃尊萍蓬得聚海上國猿鶴入夢江南村賔主弟兄真四美此樂人間果難擬機雲孝友出彛倫管鮑交情忘爾汝願言嵗晚罷功名歸與谷口堪娛情好披襏襫立煙雨數聲布榖催春耕十八學士卷隋亡晉陽啓唐祚錦帆未返江都路野鳥為鸞人肆欺天心厭亂誰能訴一朝裴寂成深謀家國轉變汝所由白旄黃鉞兩京定四海晏然無所憂功髙德厚稱神武太子齊王安足數忠臣猛將任股肱寵異宏開天䇿府當時賢俊十八人嘉謨直道情相親可否獻替陳至理何曽宛轉全天倫瀛洲茫茫近蓬島逈隔塵寰風日好如綸如綍出王言戒逸戒奢針大寶或稱博學行祕書或稱忠鯁智有餘隂陽大化任調燮經籍奧義煩分區殷勤疇咨當世務司勳記室并主簿考功祭酒博士倫著作參軍典簽數是中諸子皆良才十七可尊一可猜如何驍騰衆龍媒著彼碌碌真駑駘豈知詒謀傳後禍雨露才沾鬢雲妥此獠空憐頭血流斛麥諛言無不可清風環珮聲珊珊摳趨進退意氣間龍眠居士有佳趣好事寫入畫圖間我今展卷起深想千古神交見神像一時陳迹付逝波肻信流芳在天壤只今幸際休明時虞舜至治應無為羣賢畢集玉堂署咫尺瀛洲端可期聖朝豈無此學士我亦趨朝拜丹陛古今人物許同儔留取聲名繼青史董宣廟湖陽公主國懿親白日故縱奴殺人臣為赤縣清輦塵殺人者死法用伸奔車入奏主勿嗔主欺國法非欺民民可濫殺焉用臣臣如有罪死楓宸臣如無罪何屈身當時回天力萬鈞震懾貴戚動九垠生為郎官死勾陳忠必獲報神必靈宜其廟貌髙麒麟題李營邱枯木圖營邱枯木天下無筆端造化何榮枯想當盤礡欲畫際天為助興神為驅鄧林已化防風骨滄海乍出珊瑚株良材何異徂徠産大用不值明堂需自憐形質赦斤斧豈嘆薪㸑供樵蘇萬牛回首力未許獨匠指顧心難圖空遺偃蹇蔽村野白石鑿鑿泉嗚嗚枯梢似挂瘦蛇影亂葉恍茁乖龍鬚我生本是山澤叟隱居林樾同凡夫昻霄聳壑日在望號雨呼風時與俱只今廊廟重締構楩楠杞梓當貯儲按圖工師儻所取意營目盼增嗟吁梧岡集卷二

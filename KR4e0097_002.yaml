body:
  text: 梧岡集卷二明唐文鳳撰七言古詩遊東龕巖賦十景詩女媧煉遺補天石六丁下鑿開巖室山靈閟護不敢居留與令公讀經籍至今猶聽吾伊聲剛風吹度淵龍驚白雲千古封故迹汗青不朽傳清名右讀書巖東龕古剎寄巖麓令公讀書有遺躅瑟瑟風語龍髯松瀟瀟雨敲鳳尾竹流傳香火將千秋晨鐘暮鼓雲悠悠鸞笙鶴駕碧霄逺神歸故國應來遊右東龕寺無帆無楫空類舫不經江漲波濤漾當年已辦濟川功留得遺形巖石上縱令百丈那可牽髙歌擊節時叩舷雲流如水疑欲泛滄海桑田多變遷右石舫空潭形圓小於甕寒泉注滿波翻永秋蟾落影如明珠夜永驪龍應起弄若能變作葡萄醅酣飲吏部應時來當年令公日咽潄青山猿鶴無驚猜右甕潭雨沐蓮峰青孕孕移來宜付中書卧東溟為硯雲如箋寫遍長天愁欲破令公手擕登玉堂鳳池波浸山蒼蒼龍蛇鸞鵠有神助九霄夜貫晴虹光右筆架峰怪石兩分自中斷形勢巍峩色璀璨令公試劔劔有神應讖他年平內難鋒鋩不鈍耀雪霜匣藏三尺紫電光若教砥礪剸犀兕空使李廣彎弧長右試劒石放生湖中有金鯉身帶銅環弄清泚年多變態神化龍三十六鱗雲氣起已能濟世成甘霖令公涵育恩澤深白波茫茫不復見千年空負琴髙心右銅環鯉百尺飛泉如瀑布直㵼懸崖幾朝暮氣迷雲縷鮫綃垂光射冰簾月鈎露當年為唤錦袍仙好詠銀河落九天令公名同流不竭千古界破蒼山煙右瀑布泉尖石森然疑筍出恰類龍孫啓雷蟄草如籜解春雨香樹若枝凝曉雲濕山鬼忍饞不敢鋤頭角放倚青天孤何年成竹結丹實鳯凰飛來銜瑞圖右石筍兩股寒泉五交絡圍繞山腰遭束縛金鎖朝垂鐵石懸玉繩夜浸銀河落當時曽縶內難凶至今千古流無窮我來滌筆寫竒句一條噴雪飛晴空右索泉題顔輝寫吕洞賔像洞庭渺渺秋波濶袖中三尺青蛇活朗吟飛度天宇清黃鶴樓寒桂香發一聲鐵笛月色新葫蘆酒熟純陽春豈知誤落顔輝筆千載風流前後身題番人出獵圖塞北天髙風蚤寒將軍出獵原野寬皂旗半捲鷹未放忍使潛逃狐兔殘左鞬右櫜意氣滿駿馬翩翩嘶顧影酒酣夢熟氍毹春月轉穹廬夜初永駕鵝東飛天宇髙馬鳴曠野風蕭蕭將軍自是射雕手憑陵志氣何太驕一駿烏雲一駿雪四蹄踏遍天山月酒酣時聽刺刺歌蒲萄杯深和瓊屑驕驄旋轉如驚龍手挽一石烏號弓笑撚銀箭遙指點背身射落孤飛鴻駿龍前行猶返顧日暮歸來足狐兔醉中慢撥琵琶春漢月流光濕寒露青絲手控拳毛騧邊庭雪冷多風沙錦袍繡鞍貂帽暖女姬暈酒顔如花塞下雪飛大於席掣電追風去無迹明朝獻獲單于歡炙肉行觴酪漿碧題李息齋雙竹圖雙龍已化葛陂水兩鳳初集丹山羽虞廷既逺費仙歸留得瀟瀟雜風雨老聃文孫神思竒筆吐元氣何淋滿一天秋興收不得踈影散作青瑶枝舟泊吳城山龍王祠吳城之山若拳小吳城之水深如沼上留遺廟久妥靈下有潛宫更幽渺東湖西湖波合流望窮浩蕩天盡頭雨滋岸栁春色淺煙凝渚樹朝光浮昨暮天昏風簌簌停橈夜泊祠下宿羈懷磊塊不可降強飲一尊村酒緑山川有神能福人和風瑞氣海宇春興周已起渭濵老但願白首稱良臣過左蠡滙澤龍王祠長江渺渺天際來東滙大澤地勢開狂流播風噴寒雪怒浪捲霧奔晴雷下有龍淵深莫測黑入太隂雲雨積水府寬幽宫闕多虛明知是龍君宅龍君護國常顯靈河清海晏波濤寧曽傳禹貢載篇籍每讀酈生窮水經我來祠下顧瞻久羞牲膾鯉酹春酒逺渚青青已出蒲平沙漠漠初搖栁神靈有喜蚤乞晴百里一瞬如鏡平蛟鼉帖伏蜃氣散風駛若馬孤帆輕老臣白髮心猶鐵自慚下考蒙恩澤當思補報恤疲民遙望五雲時戀闕鞋山大姑輕移蓮步搖脫却宫鞋浮晚潮湘妃亦失凌波襪香魂千古恨未消五老為媒笑踈拙曽嫁彭郎怨離别雲凝眉黛不勝愁心逐寒磯夜深月大孤山大孤山前波浪急蒲帆髙張飽風力篙師酹酒為乞靈一舸中流如箭疾龍王祠下鐘鼓聲江天曉日生新晴五雲縹渺在何許紫金王氣浮神京送金仲逺調遷大同衛掾龍灣江頭聞踏歌送行將奈離愁何離愁自深酒力淺情比楊花飛雪多楊花飛雪雨初洗離人欲去行復止大同遙遙西北天邉塵不驚嚴虎壘戍屯知有張將軍將軍猛氣凌秋雲去年坐鎮滁陽衛今年承恩威逺聞幕府金郎總才彥婉畫竒勳刀筆健人生要在心相知青眼相看忘貴賤太行渺渺千里途鴈門關西黃草枯番兒曉咽銀觱篥羌女夜暖紅氍毹栁營肅令常鎮靜霜冷月明角弓徑他時考績赴銓曹報最應能贊軍政我留子去休遲遲丈夫豈學兒女悲秋鴻歸飛有寄字為言别後長相思格山隱居八景詩八章為休陽胡希永賦古木蘢蓯髙倚天皮皴幹老知幾年喬枝上經鸞鳳宿蟠根下有蛟虯眠三月春風日吹拂葉幄團團拭新緑每思世澤久栽培滿地清隂覆華屋右古木春風嶄然五石如人長蒼蘚點身雲補裳氤氲天外恁舒卷曉日欲吐生砑光須臾變態淡無迹雲石常存千古碧思親遙睇總關情孤鶴飛來破秋色右五石朝雲盈尖山髙雲勒齊樵人采薪費攀躋斧聲響畣遞清唱驚起一箇幽禽啼空林煙暝日將暮荷擔行行覔歸路平生幾曲太平歌不識宫商有遺譜右盈尖樵唱閔口渡頭春水深漁舟間繫垂栁隂有時鼓枻起清唱聽來自是滄浪吟緑蓑為衣青箬笠九陌黃塵不留迹鱖魚肥美酒新篘醉卧滿溪沙月白右閔渡漁歌小溪溪上危橋橫影落長虹波底明風翻水漾勢夭矯晚日回光秋雨晴不見隮西成五彩鳥鵲未來石填海行人搖兀度雲空忽聽漁歌聲欸乃右溪橋虹影神人揮鞭馬不驚四蹄踣鐵無留行至今石磴印遺迹玉寒隱約雲氣生忠烈功成封越國千古英靈猶不沒嘶風幾度耀金戈汗血當年稱駿骨右石磴馬迹越國神祠人乞靈鏗鍧鐘響風前聽華鯨吼處月在戶驚破幽居塵夢醒聲聲咽秋幾昏暮村叟溪童趂歸路遙知敲斷故鄉心渺渺關山隔煙霧右神祠晚鐘蓮堂夜靜秋氣清翻經坐對山月明流光滿地如走汞南飛繞樹鳥鵲驚去年見月歸故里今年見月留客邸隂晴圓缺許誰知天香桂子涼風起右蓮堂秋月題百馬圖戴君胸中著金馬拂拭生絹恣揮灑雄姿百匹吐毫端藝精肯在韓幹下驍騰八尺俄成龍宛在同州沙苑中豐草青青飰暖雨長空漠漠嘶寒風或怒交蹄如虎搏或喜昂身同雀躍低頭已卸白玉鞍逸氣肯受黃金絡倦餘搶地衮輕塵落花亂點雪滿身掠尾梳鬃浴江水張唇浮鼻吞河津方瞳燁燁紫電掣逺道奔馳汗凝血有時揩樹烏啄瘡危梢影動黃昏月子母回顧恰有恩攙先退後咸超羣十十五五工異態出沒隱見何紛紜君不見八龍九逸難再得白兔飛黃有誰識遙憐教舞解銜杯尚詫開元太平日左驂右驂無復施四間五間隨所宜渥窪異種不復有千金市骨將奚為當今聖朝逢至治衛霍窮兵事邉鄙蒲萄苜蓿朔雲深按圖一一獻天子鶴歎衛公愛鶴久成癖曽置祿位乘君軒千年丹熟頂留暈六月積雪衣無痕低鳴曉飲璚池水舞影夜棲琪樹園子晉不歸緱氏嶺令威未語城東門可憐仙質落塵網竟與凡鳥同爭喧當時憐寵意已極遂令士卒空銜寃一朝狄難有誰禦俯首無聲難報恩沉吟為爾發浩歎遙天月墮煙生昏仙鹿空山白雲護隂石鹿過深苔印行迹春風長茸暖猶淺蒼雪點身寒未濕應歸蓬島羣仙家日永恣慵眠彩霞自向瓊田飽芝草肯來禁苑偷竒花誰言一金汝無用駿馬千金增價重長遭鏖戰驚塵沙何如緩駕飛雲車題汪康民耕雲堂時奉使歸自瓜哇國回星源鱅溪有客有客頎而長短髭漆黑雙瞳光東門邂逅喜覿面問之桑梓應同鄉昨朝叩門特相訪屐齒齧碎殘花香自言家住鱅溪上結屋為扁耕雲堂昔年勤力事稼穡驅牛暝踏山雨涼朝耕西疇雲撲帽夜歸北隴雲沾裳春煙染成秀苖緑秋風吹熟嘉實黃去年隨雲向閩粵薦剡已銓薇省郎如何奉使不憚逺仙槎泛海波茫茫今年攜雲返故里翻思舊業將就荒雲歸巖岫人在野願欲居隱歌時康徐稚東湖有髙躅子真谷口流遺芳古今人物儻可並悠悠千載遙相望和紫金庵曉上人韻髙僧結茆住空山懸棧絶磴愁躋攀苦心鍊行息百慮能悟幻泡如是觀人間但覺嵗月速物外始識天地寬清香馥郁皆薝蔔密影搖曳惟旃檀黑虎聽經伏層石蒼龍護法循危欄定學隱峰飛杖錫何須子晉騎鳳鸞佛燈媚夜燃雲暖衲衣生蘚侵肌寒半生枯坐骨格瘦幾度談空舌本乾風光模寫入眼底才思紬繹抽毫端竹床秋爽卧不醒石室日髙吟未安而今羡子興瀟散十年離亂良可歎城郭煙埃驚滿眼生民殺戮痛刻肝嗟豫苦被憂患縛何由握手博一歡常思逺公約元亮結盟何事攢眉難他時西林作三笑雙鳬定許凌風翰題孫以仁楓林挾彈小像孫君皎然冰雪顔翩翩白馬錦覆鞍曉來秋雨濕逺山楓林點染霜葉丹微酡潮臉酒半酣輕衫似怯風力寒手中時拈金彈丸弓影微開月半彎何人貌取畫圖裏瀟灑丰神人莫比既非長楊羽獵士亦非細栁將軍子自是清賔居幕底怪得風流有如此局促簿書良可恥才全文武能兼美萬里功名從此始題煙梅圖老蛟何年蛻竒骨化作枯梅在空谷根回微暖欲漏春風織煙絲裂輕縠仙姿疑隔雲母簾欲露不露誰敢覘洗髓直求銀漢水飄香肯向含章簷至今留得明月影誤寄芳魂呼未醒却思深雪在江南羅襪生塵寒夜永廣平心腸鐵石頑無情空對冰玉顔青鳥來遲碧天濶夢飛不到羅浮山鄭居貞自閩歸歙往迎母因賦此餞别書巢先生豪傑士出自康成通德里平生顯宦傾時流聲名勃勃秋濤起吁嗟時異事亦殊而今老去將何如舊境蕭條鞠荒草夢魂常戀長林居季子歸來問松菊有意誅求結茅屋白雲在望碧山髙願學耕田在空谷當年小隱留武夷讀書奉母情愈怡文章久詫韓侍御贈言貴比珊瑚枝斕斑綵衣耀晴日皎皎照人冰雪質潘輿逺導千里途陟屺何須憚行役願言早見登歸程故園景物關幽情竹林有約久相待煮茶空聽松風聲雞鳴臺和劉通判韻劉項共築雞鳴臺嵯峨百尺應危哉隆凖寬仁有大度重瞳慓悍非良才劍光電飛大蛇死天心已歸赤帝子雲起芒碭五色竒咸陽王氣清如水君不見楚歌已絶荒雞鳴悲鳳瀟瀟號五陵千古興亡只如此感歎空令愁思增題祁門陳友章十景卷飛龍曉日金烏啼破扶桑瞑凌晨刷羽飛龍頂海雲絢綵萬丈紅青山都散晴霞影白頭凝睇咸池東浴光竟屬何人功羲和緩轡且停馭負暄欲獻輸微忠厯山逺漢雨痕洗淨秋容碧翠潑晴嵐曉凝濕山髙不硋河漢流冷風吹送行雲急登髙望逺何茫茫欲弔虞舜思時康沉吟未盡懷古興鳳飛不到青天長紫溪桃浪芳春已破三月中桃花參差吹暖紅膩香漲雨紫溪濶霞翻晴浪搖青空漁郎已去漁舟在白髮避秦秦世改中流變化神鯉多日夜朝宗向東海芳草煙樹殘虹閣住微雨收晴光倒射芳草洲嫩緑扶春上溪樹樹繞翠煙如水流涼隂垂垂映漁舫葉幄搴風疑步陳碧雲不斷楚天低昏昏暝色迷人望鼓樓晝晴曉角吹散行雲飛扶桑枝頭日弄輝晴山凝春得春色嵐光作雨翠撲衣樓頭塵壓鼓聲靜燕子窺人春晝永欄干十二轉東風自捲踈簾看花影藻潭夜月石潭淵澄小於沼汞液飛光㵼晴昊蟾娘洗頭濕翠雲亂髮梳殘化文藻鏡波帖帖寒影孤皎然清冰凝玉壺馮夷夢愕夜起舞手中奪得驪龍珠峽山朝雲青山冒頂雲作巢兩峯勢挾同峽髙曉風急雨忽吹散滿地勃勃翻雲濤白衣蒼狗變化速從龍伴鶴無拘束卷舒怡悅隱者心不似襄王誇宋玉西峰暮雨西山山頭欲頽日隂雲作昏山已失子龍翼母歸澄湫秋風捲地波濤立銀竹插空雨腳來倚欄縱觀簾半開天河疑漏勢轉急洗盡埃氛遍九垓滄溪晚
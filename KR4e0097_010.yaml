body:
  text: 梧岡集巻十明唐文鳯撰頌疏箴書騶虞頌臣聞天不愛道地不愛寳二氣絪緼委和降精産為非常之物而得天地之氣恒多故聖人在位迺見於世所以符運㑹之休徵協禎祥之吉兆其來尚矣欽惟我朝聖天子御寶厯永樂之二年至仁洽於品物至信敷於烝黎道髙徃古功冠前王以故神人懽戴乾坤清寧諸福之物莫不畢至維秋九月之吉周王進獻騶虞羣臣百官上表稱賀臣考載籍騶虞似虎白質黒文尾長於身不踐生芻不食生物日行千里君有至信之徳則見而召南之詩謂仁如騶虞以見王道之盛也於戲昔詠於周世今獲於周郊於以見皇上之徳施及王國邁周文之治御于家邦至于兄弟因心則友葢周王不自以為瑞而獻之於皇上皇上亦不自以為徳而歸之於皇祖考薦之郊廟播之聲詩臣文鳯躬逢盛典職黍詞臣自愧才學疎陋不足以鋪張休烈以繼風雅而區區芹曝之誠亦少効揄揚之萬一謹稽首頓首而獻頌曰惟我皇明繼天承統九五龍飛雲蒸霧滃攘剔羣雄奄有四方君德以正帝道以昌寰宇乂安垂拱而治大國小邦奉琛納賮四十餘載風雨順調烝民熈樂年穀豐饒欽惟聖皇誕膺天命朝野肅清神明恊應惟臣惟鄰惟庶惟民迺洽至信迺歸至仁天地之氣世運所聚泰和至順千載攸遇精英斯降和粹斯鍾佐我文明物類之豐惟物伊何見彼異質生芻弗踐生物弗食有白其軀有黒其文渴則泉竭饑則肉醺觸之不怒性無噬齧迫之不驚心無奔越皇仁所被皇信所孚惟皇德廣來兹騶虞産于王國獻于天子載書彤管載彰青史式昭祖考聖德益宏休光令聞奕世是程白狼興周素麟紀魯示祥効禎粤萬萬古惟皇撫運纉武之功惟皇致治興文之隆禎祥至矣福祿萃矣本支百世炎祚著矣小臣作詩上徹宸聰以雅以南用播國風寶石神龜頌欽惟太祖髙皇帝龍飛淮甸提三尺芟羣雄天命攸集人心所歸四方臣順八蠻賓服啟萬世之洪基承百王之正統武威逺震雷迅電飛文教誕敷風行草偃神祗恊應民庶懽忻而四十餘年乾坤清寧河海順晏雨暘時若物類咸豐臻政治之雍熈變風俗之淳厚是以聖德神功配天饗帝巍巍蕩蕩髙深難名厯代君天下者未有若我朝之隆盛也猗歟休哉惟我皇上繼志述事膺命承符神器有歸皇圖克紹御寶厯之初念創業之不易思纉緒之攸難爰命詞臣纂修實録敬上尊號所以極采輯之勞竭褒崇之美猶未足以致聖孝也惟孝陵之御碑未立特發玉音勑翰林譔文諭工部選工相擇碑材於紫金山之隂龍潭之地斧錐効力琢鑿山骨取材既具復取碑趺而得巨石大與材稱贔屭以髙萬夫奏功於石罅見一寶石其色蒼紺形類神龜圓徑尺餘首昻而前顧尾妥而左蟠足縮而肘露背隆而甲伏雖倕般之巧不能致也况兹渾然天成不假雕鎪豈非天地儲精山川獻竒而致禎祥以彰聖孝也孝陵衞監工指揮臣某敬捧以進皇上若曰朕惟皇考之德所感召天地神祗所黙相故兹瑞呈現以對揚皇考之休命以慰朕繼嗣丕烈之心也宣文武羣臣百官於奉天門拜觀莫不欣躍謹上表稱賀臣聞馬圖出河龜書呈洛銀甕湧地器車在山此皆聖王之瑞也唐太宗朝獲靈龜化為白石遂以為受命之符自開闢以來未嘗遇兹盛典然天地之氣鍾英孕靈陽凝隂聚堅則為石稟少陽之精成少剛之質而融結其形成此神龜者葢有以知皇上孝思之無斁聖德之無窮而又以徴諸聖夀於萬斯年也臣文鳳叨侍清班自慙愚昧謹拜手稽首而獻頌曰於赫聖皇孝德格天山川獻靈神祗致䖍天不愛道地不愛寶式昭皇心尊崇皇考勒碑琢石有龜其趺取此山骨蛟龍所都坤珍効靈乾符顯瑞億萬斯年精英攸萃爰有寶石形類于龜當䕶慶雲當生神蓍托質石中豈能食息其形圓長其色紺碧尾蟠而妥首仰而昻背隆甲伏肘露足藏二氣所凝匪資人力渾然天成無斤斧跡五總之聚十朋之多矧兹祥物孰與同科皇明大朝惟聖繼聖以承帝統以膺天命峩峩孝陵祥光貫虹聖德煒煌御碑穹窿㣲臣作頌以賛休美用比洛書永錫繁祉進軌範録疏臣聞經所以載道史所以載事窮經則精於道而有以識夫理義考史則熟於事而有以得夫政治是以古帝王之學未嘗不探六籍而閲諸史也易曰君子多識前言往行以蓄其德書曰王人求多聞時惟建事學于古訓乃有獲此之謂也然天地之道古今之事非融而㑹之紬而繹之則不足以獲于訓蓄于德矣致知乎理義力行乎政治莫匪識前言往行求多聞古訓而得之也敬惟殿下以天縱之資日新之德聰明剛果仁孝禮恭建國封藩衍本支之盛礪山帶河固盤石之安威名播於宇内深恩溢於域中羣黎仰慕莫不歡切念臣文鳯才疎學陋愧無知識欽䝉特㫖授以紀善自領職以來雖承顧問日淺然夙夜祗懼思竭補報輔導之誠以忠殿下之職分度無所用其心力迺採擇經史有闗於理義政治之言切要簡當易知易行合于聖賢之道者謹繕寫成帙裝潢上進乞於軍國機務之暇宴閒講説之餘留心睿覽庶可以少裨多聞蓄徳之萬一臣忘其愚朴冒昧威嚴不勝戰慄之至縣令箴周官縣正則惟其名升自里都五鄙是稱秦立郡縣漢制令長丞尉以佐教化攸掌唐制六等宋用朝臣慎重其選親臨於民上應列宿出宰百里俾無愁嘆政平訟理欲成其政先修其身當恤於民毋負於君正爾之心鑒空衡平勵爾之操蘖苦冰清毋墮庸庸毋過察察毋苛刻而殘毋邪媚而狎同寅協恭庶務理集弗譽以喜弗謗以惕戰戰兢兢執玉捧盈凡百在位敢告斯箴上劉知縣重修紫陽書院書嘗聞堯舜禹湯文武之道得孔子而後傳周孔顔曽思孟之道得朱子而後明葢孔子集羣聖之大成而朱子集諸儒之大成前庚戌而孔子生于東遷後庚戌而朱子生於南渡嗚呼聖賢之生闗乎氣運之盛衰教道之顯晦豈偶然哉故能為天地立心為生民立命為往聖繼絶學為萬世開太平則聖賢之道在天下如菽粟布帛民生不可一日無也道之所漸被教之所陶鈞無一物不沾其化無一民不䝉其澤玩其詩讀其書不知其人可乎新安為朱子父母之邦猶魯之闕里也自朱子歿後將二百有餘載學者即桑梓之地為尸祝之所以致其崇德尊賢之意宋朝丙午間穆陵賜以紫陽書院四大字刻於真珉至今尚存書院凡三燬三復一燬於水再燬於兵當我朝之初於用武之際首創書院於學宫之旁部使黄公德芳知府魏公均祥恊力經營而我先人白雲翁委職祠吏辛勤三載始克落成距今三十五年凡居牧民之寄者或謾爾修葺或畧不加意兩廡傾圯三門朽腐椽瓦蠧缺風雨震凌生徒學士過之徬徨太息仰惟閣下以明敏之識超卓之才滎膺寵渥作宰於歙民親之如父母敬之如師保將有以蘇其凋敝樂其安静政之所施教之所被百里之間熙熙皥皥無愧於古循吏下車未久百廢就舉其於興崇學校一遵朝廷之典而先賢之祠亦所當興復捐已俸募民力頥指之頃不日而成惟閣下少留意焉區區窮鄉晚進言不足以取信於人學不足以見用於世特以先人苦心致力之勤將就隳廢是以惻然動念祈閣下之振作斯文主張吾道俾祠宇一新則吾朱子在天之靈臨睨故宫徘徊於風泉雲壑之間而知賢令尹之徳也傳曰君子學道則愛人又曰魯無君子斯焉取斯觀於是而益信然則風化所繫人心所重政教所闗豈迂濶琑屑之事哉干瀆高明悚息悚息與弟子才書自向果郵亭之别又閲兩載去夏六月七日之任一向獨員署事諸務就理劣兄他無所長不過推平日所學而行之耳以清介守已仁恕存心以故吏民相安於無事又且同僚恊恭推服欽慕凡前之為政有不利於民者反之田野開闢流逋回復學校興舉詞訟簡息賑飢荒恤鰥寡安撫邊氓均平差役奏罷船夫理决滯獄申寃直枉革奸去弊抑强扶弱禁貪治頑民心傾向時譽頗歸凡上司按臨於稠人中必諄諄推許勉勵不置劣兄在任不過如斯始終一念精白一心不為利欲所誘不為禍患所怵守法而行據理而為處繁劇而不憚煩遇艱險而不避畏其於禍福死生漠然無所動於其中幸不幸一委之於天而已他毋足為吾弟道聞太守公今冬復任劣兄既䝉舉薦彦禎姪亦荷奬愛吾弟又沐勉之以學資之以俸其作興斯文之意為何如也巖溪子彰賢弟近况清適闔庭内外安好伯和兄年老强健有子登科榮躋顯仕以膺長民之寄有光於吾門矣子善兄又喜彦昭回鄉曽附書至興國吾弟既荷太守勸戒期於成才經史之言心惟口誦夜以繼日勇往而進庶無負此公之盛心也諸族中弟姪煩一一致意楮短心長言弗能盡不具又今春彦昭姪便中得書備知二弟俱各安好良慰老懐吾弟青年方春當悉心於學以迓續祖父之遺風吾儒事業大有所當著力處付之悠悠則不能成其所有以致流光坐棄誠為可惜以吾弟為學知所嚮方宜加鞭辟譬如北適燕南走呉車航不具豈堪致逺中途而止徒勞人耳望吾弟充其問學大其心胸涉於事周於理則可以成其才而推於用豈可僅僅守兔園冊也此劣兄之至望吾弟勉旃勉旃劣兄自己夘夏六月初七日到任不過以理存心以亷律已勤力於民効忠於國他無寸長攄平生之志推昔日之學凡百世人之所榮所慕者無一念之萌守清貧安澹泊晏如也伯和兄晚節康强白髪紅顔諸子孝養彦禎登科亦授縣正可謂顯榮矣辱彦武書方得其詳欣羨欣羨本縣佐貳幕司給由但劣兄獨員署事黄冊須知皆當究心是以忙逼不得少暇小兒禎夏末歸家先遣德聚回乞知及未審太守曾復任否不果専奉字族中長幼煩一一致意交游中兩學及城府諸公俱道此忱寸心千里楮墨難盡不一一與弟子彰書嘗思吾家自始祖承昈公隨蹕渡江留家於歙大有公厚貲隂德至庭瑞公兄弟五人聨輝科第事業文學延於吾祖筠軒翁雄詞鉅筆著書明道為學者宗師吾先人白雲翁詩文瑰偉卓冠時流而吾五兄弟者繼承其後長兄江安丞不幸兩考物故劣兄蚤居邑庠修業未竟引身而退自謂終老山林得遂所願豈意為虚名所累薦章交達叨承國恩授以牧民之寄膺命以來夙夜祗懼思圖報效在職不過盡公竭忠以身徇國以理恤民其於私欲無一毫萌於念慮間澹如泊如而不知宦海之風波也府司部使上官亷察俱荷推與庶得少舒其志氣而展其問學幸不負吾矣凡天下之務不能更厯則不知其故以劣兄之處於田里戚屬相㑹昆弟相親朋友相昵不知其為難遇今則各天一方巖溪之往迴方塘之隐處何可暫得然後始知為難遇也别來聞添丁剏屋祖宗餘慶子孫傳業誠為可喜又聞營夀蔵何太早計吕家林文光燭天矣劣兄縻職數千里外吾二弟之才豈宜終隠必當見用於時宜充其所藴廣其所見以光大吾家德聚至領手劄披誦感慰今因回便復此楮以盡欲言草率不具又老兄留京甫及二載中間數得手書如對面也近聞續絃得人諸幼姪庶不失撫愛而家務亦不必嬰心少慰目前膠擾甚幸甚幸老兄年近六旬不獲投閒置散而處清要之地撫心愧恧但思守職効忠雖無涓埃之補而操觚染翰日近清光以盡吾分而已近奉㫖侍講青宫開經筵以論道為聖朝之盛事而老兄摳趍殿庭之下亦預僚屬之才屢䝉賜饌恩數寵加復回王府進講日以為例自秋初以來准擬扈從北行心旌搖搖靡有定止非冬深啓行必來春也吾弟守先人之邱隴居舊業之田園讀書訓子以傳家學其視老兄汨沒宦海者為何如哉相去日逺何由㑹合候至北京居處稍寧當給假還鄉祭祖以盡契濶之懐臨書惘惘不及詳悉祈心照不具備奉伯和兄書今年夏五月彦禎姪到京繼而彦武來叔姪弟兄得遂㑹合良不易也且審夀體康强子孫侍養猶如曩昔但劣弟從仕於外侵尋七載不得侍左右以盡友于之樂又喜彦禎復任而劣弟愚拙如故沗在王府日侍清光近䝉聖恩得陪講春宫𢎞開經筵迺朝廷盛典而日趍文華殿屢䝉恩錫饌醴劣弟何幸身親見之邇者有㫖扈從北行但路途遙遙不得序契濶也良用怏怏未涯侍奉惟冀保愛以膺耆福不具備與姪彦武書自令弟祁陽尹考績便道歸省而吾妷篤念手足之誼不逺途路而得面㑹良慰老懐癡叔今年六十逺寓北京羈棲厯落侍傍無人柰何柰何近聞和齋尊兄遽棄榮養何天之降割于吾家不少延也追思尊兄自幼隨侍伯父宦寓南北厯練世故自能顯揚以致祿仕晚而投閑故里優老林泉諸嗣幹蠱一子登科於人理無少慊也今而夀踰古稀亦可謂無憾矣而吾妷愛親之心為無窮也良可痛悼老懐徒増悲咽身隔四千里弔不得哭位殮不得撫棺葬不得執紼但引領南雲失聲長號而已哀當柰何痛當柰何今因宏德鄉友便附此以代往唁謾有俸鈔二錠少致瓣香煩為於靈几前焚白緬惟大孝彊加􅊡粥節哀保體承家續緒惟吾妷是望言不及悉不一一與彭必俊訓導書記曰玉不琢不成器人不學不知道葢玉之未琢與瓦礫同幸而遇良工焉則圭瓚瑴璧瑚璉琖斚各適於用而器成矣人之未學與愚庸同幸而遇良師焉則天經地義民彛物則咸究其精而道明矣是玉之成器必待於工人之知道必待於師工有益於玉而師有益於人也大矣哉洪惟我朝建學立師内而胄監外而郡縣置師弟子員服方領習矩步蔵修㳺息周旋揖遜誾誾秩秩人才所萃猶羣玉之府也藍田之英昆岡之選旁蒐逺採靡不具焉予以碔砆之質韜彩晦迹㡬為抵鵲之供矣一旦欽承玉音出宰平川臨政先務必以學校為首思教鐸之益振慨師席之久虚博詢慎訪俱以足下姓名對遐想玉人不我瑕棄必將翻玉海之波瀾以演溢其文學聳玉山之標格以嚴整其模範豈終於懐瑾握瑜而私善其身哉今特遣劉生齎禮幣至足下隠居之廬以請儻幡然而起玉振乎始終之學玉執乎始終之敬以玉成乎玉立之諸生則待價而沽將聨玉笋班於玉階方寸地矣矧予鳴琴之暇揮麈而聴霏屑之談不啻飲金莖之露以清肺腑也何其幸歟草草奉楮不盡所懐惟冀為吾道自玉不具答謝惟髙司訓書自去春龍潭餞别流光怱怱又隔兩紀厯矣區區深愧非才臨政之暇必旁求儒雅相與講明正學議舉時政何兹邑寂寥無可語者足下歸自京師一見之頃心已識之方幸資以相朂豈意為職任所迫不得久於盍簮良可慨嘆去秋得手劄寓諄切顧予何足以取信於足下也然以足下之才之學得振教鐸為士子之矜式以明聖賢之道其責任豈輕哉足下當研精覃思究精一執中之㫖盡修齊治平之方以裕於已以淑諸人俾人才輩出庶不負國家樂育菁莪之盛意此予之所望而足下之所任也區區撫字心勞催科政拙誠有如陽城之考下下也無足為斯文道今因便翔羾此尺楮以為興居􅀈近於政餘有拙作詩文數百篇無暇録藁奉去儻有順風雄文佳什無惜見教以開老懐之茅塞㑹晤未涯惟冀為吾道梁棟重不備答謝子方司訓書區區幼讀父書粗承家學年踰弱冠叨居教職中獲投閑豈意為虚名所累舉授縣正私竊喜幸以謂江右之地在昔宗工鉅儒挺挺相望意我文明之時文章道德之士師表一代者必有其人也或可承顔接辭得以質正舊學厯任三載已及𤓰期前之所陳何寂寥耶獨聞先生老成重望為時推崇久居講席屢司文衡而所謂道德文章師表者在是矣職守所縻毎恨弗得親拜絇履為欠耳邑民邱子成蕭文郁輩累求大筆雄文辱不鄙奬譽過情聨篇積簡愈出愈竒如入武庫戈矛劒㦸羅列森聚鋒鋩頴鍔光采炫燿可喜可愕使人讀之久不厭倦誠獨步也自顧區區才薄學謬拊心益愧而律已治民不過攄平昔所藴其於設施初無嵬目澒耳之蹟殆平平耳先生與進之心勉勵彌勤敭許太甚此昌黎所謂不敢當不敢當也今因髙第劉曾二友便翔羾此楮以寄繾綣餘俟買舟朝京専造易菴講下以傾倒所懐㑹晤有期惟冀為吾道棟梁重不具備與劉凝節訓導書嘗聞馬不值伯樂低首帖耳伏於櫪下玉不遭卞和埋光韞彩混於石中及其受知而伯樂以為駿卞和以為寶則人皆知貴之矣士君子之見知亦猶是也予以學校為育材之地加意興舉主教者有黄廣文而兩齋司訓虛席已久去春訪求英碩禮聘彭君必俊試於天官領劄就職而西齋猶缺未得其人毎究予𠂻兹以考滿赴京舊友蕭君讓敬授金川同知邂逅胥㑹相與話及學校之政迺語予曰吉水劉凝節氏年茂而質美學贍而才優與彭君生同鄉學同道俾之同任吾興邑儒學師道藝足以相長學術足以相規而造就後進必有可觀矣且遊於翰林侍讀學士解公縉紳之門公以佳士待之品題推挽不遺餘力當道嘗薦其才而用之凝節以母老辭謝而歸興國與吉水鄰封相邇得職便養凝節必幡然而起吾當與吾令合辭請予聞而欣喜葢士君子之出處去就一蹈於禮茍不先之以禮則凝節豈肯屑就焉故婚姻不備則貞女不行禮樂不備則賢者不處此古之道也予當寓情於言致禮於幣以將予之敬而讓敬為予具書先焉惟凝節以吾道自慎其必為予而來也當令諸生汛掃齋館設臯比以俟予雖非伯樂卞和而凝節則誠千里之驥連城之璧也幸毋固拒以孤予之望焉草草奉楮伏祈亮察不備答主簿髙泰銘書自白澗灘相㑹泊舟艤岸夜宿江天剪燭引觴乆坐劇談怱怱取别又將一載然思慕之懐無刻不在平川公庭雙樹之側静念人生出處聚散如浮雲斷梗巻舒漂泊何有定蹤昔未知同心之難今始識違顔之惨然參商之星常自相背馬牛之風毎不相及事之所遇屢如是也祖行多沐厚愛足見僚友之情至今感愧交集聞抵縣不久遽爾抱恙老懐惻然慮乏親子弟侍湯藥未審近况何似黄以和來得雲翰知病勢退減喜慰喜慰尤望善加調養力疾理政勾稽匡輔以成美治則庶可以瘳民瘼而慰來蘇也然區區去後之惓惓者葢不以世俗之論待吾民彼之好惡在人而此之憂恤在已詩云我躬不閲遑恤我後非我心也黄冊之數清荒田之粮實如斯皆當同寅恊恭究心致力則上不負於國下不累於民可謂盡職矣原發至手巻候便人附去詩文登巻但恐蕪陋之言秪塵汚耳詢知誠忠劉大尹踏田舊治兹邑民人蒙恵亦煩申再四之意人回草草奉答伏祈心照不具備答縣丞魏尚質書自去嵗攝政㑹昌怱迫取别今春離平川不得一見至今怏怏拙作榕軒讀易記族譜叙想已目入長司回曾附小詩以致區區仰慕之忱今黄以和至又沐手劄佳章良感不忘之盛心聞今嵗同僚抱患公出新大尹未到獨員署事劬勞冗劇誠不易易歩韻成絶句五音少答意雅硃匣之貺感惠永供晴窻勘讐經史之用客邸乏物報瓊謾有黄山春茗一裹奉寄政餘汲葛洪丹井之泉瀹之以助清話人旋草潦奉復乞亮詧不具與大尹黄彪書近者秦淮旅邸邂逅㑹遇連牀夜話琅然清韻猶殷于耳拙文俚詩繕寫成軸以寓嚮仰之情諒不我鄙也别來逺想琴堂晝永政成訟簡良可為平川之遺民賀也然民俗雖頑嚚而以明敏之識英斷之才處之猶庖丁之解牛耳又當以仁恕存心以勤慎莅事則恩徳普而治績彰矣區區不能善始而欲求終不能植前而欲振後殆若乞醯於鄰不免笑訕也兹因鴻便草率奉字伏干照察不具備與鍾民敬秀才書老拙在平川三載所與共談者賴有鍾子常及吾民敬二人而已舍斯文外無干預於公務是以始終依依之情不能忘於懷自春首相别日月走丸又將嵗暮矣長司來得足下手書諄諄之意溢於辭語之外曽附小詩致忱想已達近日黄以和至悉知體候安好良慰懸渴小孫留講下多荷用心訓迪感徳罙深非篤念平昔契愛何能臻此但區區客中乏物將意勿責勿訝尤望始終造就以成其學業庶毋負也後有便風附午塘清隱文至人回舟駛羾此草率不一答鍾子常書近揚存徳至辱諸文友書劄兼侑土宜祗受惶悚又寵惠梧岡幽趣高文新詩妙翰佳畫捧玩不忍釋手雖紙弊墨渝猶置懷袖間追惟老拙為時樗材强顔效職尸素四載幸遂終考然無善政及民遺恩傳逺不加以唾詈亦云可矣豈料諸文友溺愛過情誦之以文聲之以詩情意繾綣乆而不忘果何以得此也感歎感歎同僚伴讀鍾啟晦先任贛邑司訓後調南雄今改除於此系出越國公裔自平川分居西昌其家譜近因舟經鄱湖遇風喪失再四致意子常於鍾幼安順曙二老儒先處借舊譜凂鍾素昂劉以常抄録似本示下為感區區同一佩德也予常龕嵓樵隠區區有記啟晦有叙候謄録諸作完備别日附去怱怱復意不䖍祈照亮不具與方季善書伏自己夘嵗夏初拜别一向留贛舊年春正月考績改除寓京每遙晜故鄉靈山蒼翠未嘗不冉冉在目也去冬次兒來得雲翰沐委譔生塋文久墮稽皋未遑録去葢公平生律身行已大概述之無遺明白詳贍庶可傳久篆額書丹又得當年名士之筆刻之琬琰毋貽林谷之羞而光輝煥發於山川後人觀之知為靜軒處士之塋過者必起敬也裝褫成冊奉納中間世次諱名某某不能詳記恐有訛舛訂正録副本用大紙比碑石様發來重冩正本摹刻為妙草率奉字伏乞情察不具備與薛推府書伏自喬遷憲府至今十載不得趨下風而望餘光令人景仰寸心懸懸如水東注近聞復職新安之民漸濡治化滌瑕湔垢改過遷善庶聖代無寃滯也幸甚幸甚區區粗守家學才疎能謭不意微猥姓名交章保薦濫叨職任僅僅以精白持心期無負也侵尋嵗月已厯兩任但當忠勤以圖報效耳他毋足為知已道因便附此尺楮以為興居􅀈客居荒落乏物侑緘㑹晤未卜惟兾保愛以膺寵渥不具備與醫士程養民書區區强勉從仕才無寸長學無尺進今吾猶故吾也自南京怱怱㑹面不得各罄所懐至今愧負逺想日來肘後方書籠中參苓活人為念深積隂功優游城府盤桓丘園奉親理家其樂何如也芝蘭玉樹森秀階庭但當浚橘井之泉種杏林之春省心以俟耳康節之有伯温未為晩也今因宏德鄉友回便附此以致逺想之意會晤未涯惟兾保攝以膺光大不具與道友程惟中書别後嵗月荏苒倐經十年每想萬山脩竹蒼翠爐香茗盌逍遙静樂溪山一覽如出人寰何時復得吟咏於其間也逺惟日來坐環餘暇拈弄筆劄新湧妙思深探奥道當紹羽流之遐躅也紀績碑七星石詩文尚無恙否今因江宏徳便中附此以訊動履徐沈二尊師及諸道友同此一一致敬相㑹未涯惟兾保練不一梧岡集巻十

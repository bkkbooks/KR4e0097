body:
  text: 梧岡集卷四明唐文鳳撰七言絶句題太常寺丞吕仲善寄弟仲鉉雙雀圖啾啾雙雀曉風寒花到酴醿春事闌應似鴒原急難意蕭條不是紇干山題無心道人墨竹一江踈雨翠煙迷愁結寒雲楚甸低猶憶泊舟蒼石岸黃陵廟下鷓鴣啼鐵網何年出海波玉根此日迸江莎重華不返蒼梧逺愁絶天寒雙翠娥題孤鴈圖當年曽讀鮑當詠此日欣觀崔白圖紫塞月寒憐影暗黃蘆風急想聲孤題東坡赤壁圖堪笑黃州秃髮翁江山詞賦兩爭雄至今千載留圖畫良夜扁舟一鶴東題畫牛圖二首圖有翰林滕王霄留題三年出宰勸勤耕䆉稏西風秋雨晴從此牛間飽豐草可無留犢慰民情犢飽眠雲倦不行平沙過雨草初榮玉堂亦有歸耕志牛背青山一笛橫題太常寺丞吕仲善寄弟仲鉉雙鴈圖黃蘆葉颭晚風輕何事離羣獨自鳴雲濶天髙行已斷江湖遙憶弟兄情題道士王貞白小像碧水丹山物外春瓊樓玉宇絶埃塵不隨跨鶴吹笙去猶作華陽洞裏人題墨梅嫩條枯幹著疏華曽訪林逋處士家放鶴孤山秋夜永娟娟明月照江沙題馬驎桃竹圖翠竹緋桃近水濵杖藜應是避秦人緝熙殿上春光永豈識青城月色新題懸崖蘭竹木石圖懸崖石罅托孤叢冉冉幽香拂晚風忽灑一枝湘雨濕平生心事喜相同九畹如何不託根却從孤石寄香魂鳳歸來啄琅玕實留得青山月一痕平生不肻汗秦鞭來伴湘江二女仙千古忠魂向何處御風紉佩尚泠然題玉堂學士圖硯池波暖墨蛟腥睡起揮毫手不停天上玉堂春晝永明朝宣旨寫蘭亭題梅竹圖翡翠煙迷葉底寒瓊瑶雪積樹頭乾小橋流水人何在猶照孤山月一團題層巒積翠圖疊巘重巒翠欲流雲藏古剎倚巖幽上方鐘罷僧歸晚古木寒泉十里秋題林下讀書圖林下風流老隱居心間謾讀數篇書催科政拙何能了野鶴孤雲愧不如奉題徽宗御筆十八鶴圖仙姿何事擬登瀛不戒乘軒百感生千古青城空月色可憐無復九臯鳴題烏騅圖黑雲不散護龍身墜地房星夜有神只恐健兒羈未得瀟瀟風雨欲生鱗題畫馬手控柔韁洗刷闌曽經渴飲九河乾太平無事邉塵靜好入君王十二間鬃振蹄奔勢欲馳齕餘豐草搶頭低平坡樹影涼如洗却憶瑶池月下嘶題折梅花墨沼移春春不知却將玄色换仙姿小橋流水孤山路呼鶴歸來月上遲寒風吹入硯池波疏影清涵春意多月白羅浮香夢醒飛來青鳥夜如何送金仲逺調大同衛掾三月東風吹雨晴龍灣江上看潮生潮生潮落自朝暮不盡鄉人離别情我留子去意悽悽匹馬長途獨向西若到鴈門關外望故鄉回首白雲低寄縣丞魏尚質一緘書寄見真情令我相思雪髮生語寂空庭間白晝滿簾槐影日微明溪上青山城上樓相思雲樹意悠悠西風鴈呌江湖逺明月蘆花千里秋寄主簿髙泰銘髙適能詩五十過文孫才德藹春和三年小試勾稽簿處處桑麻雨露多寄龍南知縣劉誠忠平生特達劉公幹老去栖遲唐子西三載情懷若膠漆一時蹤迹異雲泥艤棹相逢鐵索灘沙頭風雨一樽寒别離幾度思君切倚遍重樓十二闌謝平川耆民鍾尚義寄鮓味如膾雪色如霞逺寄包封道路賖酒醒夢回涼雨過不知身世在京華真情不減孟宗寄廉譽何須羊續懸萍雨荷風生酒興夜闌飛夢到平川芼以辛薑添美味沃之苦酒吐竒光冰盤碎切飛霞片采石樽深入醉鄉甕潭昔有銅環鯉何事而今碎雪鱗慰我老叨尚能賦詩瓢酒杓細分春彈鋏王門食有魚寄來磁甕更鮮腴謝詩愧非裹鮓帖贈逺當傳雙鯉書寄孝子吕叔素相傳禮樂太常家市隱城南靜不譁兄弟怡怡自和輯春風庭院紫荆花廬墓三年孝行全姓名已達九重天蓼莪應念劬勞德彤管當書史一編教子傳家守一經百年文獻舊氊青雄辭妙畫南金價磨石當鐫太史銘寄生員徐永德明倫堂下竹疏疏枝葉蕭森涼雨餘滿目塵囂俱洗盡夜深吹燭照殘書寄鍾子常文學紫髯才俊總超羣筆底春生五色雲千里相思共良夜東龕巗畔月紛紛龍潭酌别惜擕分酒濕淋漓白練裙何日相逢共傾蓋寸心長繞瀲江雲天上宏開白玉堂老臣侍讀沐恩光拔茅連茹思才俊東野雲龍願頡頏妙畫清詩才思新笑談頓使座生春白頭愧我鵷鸞侣青眼思君鷗鷺羣陽山東望起朝霞富貴功勳越國家秋色可憐今寂寞獨留黃菊一枝花寄秀才羅季翔劉德明劉志用陳克讓王達禮方文興鄧子民楊汝誠我來子去各東西蹤迹何殊鴻印泥座上春風誰許挹滿庭棠影鳥空啼師席長虛知幾年雨寒塵暗廣文氊揚雄已老侯芭去寂寞何人守太玄寄徐復本主簿白髮臞翁特寫真風霜骨格雪精神鶯花故國十年雨鸞枳當時百里春寄楊南夀關西夫子道尤尊清白傳家到耳孫幾度相思程水路白沙翠竹月當門僦居近住古城邉大隱如何在市廛雲散西山青似洗踈疏涼雨灑簾前寄黃子成每愛西江雙井黃食蓮念母寸心長東鄰舅氏年將老相見何煩憶渭陽載酒龕巖飲石坡危橋搖兀步難過至今夢想何由到心逐春風繞薜蘿題墨梅前村昨夜雪晴時春到寒花第一枝錯認孤山小橋路月移踈影鶴歸遲東風吹春到南枝三花五蕊香參差幽禽戴雪頭已白月明忍凍應多時題紅梅春沁南枝雨未乾東風吹暖已消寒何人點染胭脂裹疑是嫦娥絳雪丹題畫斷磯石罅兩舟艤繁木雲邉孤館藏有客讀書忘俗慮緑楊風軟日初長落落長松蒼幹古深深幽館碧窗虛階除近水鳬鷖集知是山中曉雨餘題宋李綱帳緑亭詩後狡童已沮勤王志老檜猶貪蔽日隂帳緑春深風雨橫一生空負老臣心環珮重來軒為槐塘程文實賦當時丞相七絃琴尚有髙山流水音今日猶能存手澤祖孫相繼百年心何年斫就嶧陽桐律吕音諧指下工相業當時勤燮理心同虞舜鼓南風相業相傳祖澤存至今厚德説髙門遙知府第多清思三弄梅花月一痕敬蒙書賜梧岡二大字伏覩八法精妙超入神品寵榮所及不勝喜慶十襲珍藏永為家寶謹賦詩謝恩頒賜梧岡翰墨香錦箋字字響琳琅山林若候藏書處午夜晴虹貫月光詠睿筆畫蜂報衙課蜜日飛忙競採羣芳浥露香睿筆寫生同化育上林隨處駐春光又午衙初報往來飛採得花香兩翅歸微物亦蒙歸睿思君臣誼重識天機謝賜睿書清思臨池白晝長金箋揮灑染龍香侍臣得賜琳琅字奕世相傳被寵光鸞翔鳳翥精神異虎卧龍驤氣勢雄若候藏書占太史九天光焰貫長虹詠馬房星天駟夜凝神光照祥雲散滿身十二間中知第一草豐沙苑早回春龍馬由來産渥窪驕思顧影自矜誇太平天子東封日五色成羣雲作花奉賦清曉詩日色曈曨曉氣寒風生仙仗露華乾封章啓讀清朝早身在蓬萊玉笋班謝賜睿翰神妙變化逺法鍾王臣子儀不勝欣躍賦詩以進睿思筆力掃千軍寫遍金箋五色紋墨沼鸞飛光掣電天門龍跳勢騰雲又清興間書筆陳圖妙窺八法不須摹鍾王墨迹何堪數摘得驪龍頷下珠又臨池清思日初長龍劑香生玉楮光八法精深入神品侍臣蒙賜永珍藏奉賦秋涼詩和陸長史韻金井梧飄早報秋星流大火暑全收人間爽氣清如水涼滿山家十二樓奉賦對月詩和陸長史韻風掃浮雲淨碧空秋蟾皎潔出天東賢王心鏡清如水一照光明萬里同雜體送張守正歸句容故鄉啼烏行慈烏啼聲何悲聲悲情慘風凄凄昔時孤雄引雛飛雛飛逺去羽翼齊可憐流落天之涯孤雄摧折嗟命違天荒地老歸無期雛生未報返哺慈霜寒水夜長相思慈烏啼聲何悲爾何不往故林栖中有喬木連雲低願因晨風送爾歸空巢補葺哺其兒不受風雨漂搖危鳴鴈篇鴈鳴嘹唳穿雲飛秋風吹老黃蘆枝江南江北九月時水田菰米食可肥平沙漠漠羅網稀年年飲啄忘禍機南天月色無光暉孤鴻行斷摧翅垂翩翩不下洲渚非思鄉旅客情依依幾回緘書煩寄之鴈雙欲來胡不來今年與客同春歸茆山歌茆山三峯瘦於削拔地劖天起巖崿茆家兄弟已成仙翩然欲下騎丹鶴瓊宫琳宇相參差靈芝瑞草何葳蕤羽衣或跨黑虎降玉印曾獲白兔窺可憐桑田變滄海依舊三峯森翠靄山中有客久出遊孟浪不歸今幾載昨朝青鳥傳雲書招邀好覔煙霞居白石炊香凝雪粒黃精釀熟浮玉蛆飈車忽乘歸興速茆山之歌已終曲殷勤為我謝茆仙丹臺許注長生籙洞天曲天下洞天三十六茆家兄弟來句曲至今虹光貫斗牛藥爐九轉還丹伏三峯直走如驚龍落日倒射青芙蓉剛風吹老瓊花折書傳雲錦來金童功成寄語逺遊客好訪山中一區宅歸來管領舊煙霞長嘯數聲秋月白黃山謡黃山之髙髙倚天三十六峯含紫煙秋空浸月開金蓮浮邱容成久飛仙至今尚湧硃砂泉二仙一笑三千年海枯石爛陵谷遷蓬瀛嬉戲何時還丹室空閟青瑶編猿吟啾啾鶴翩翩山靈誰主空凄然句曲有客拋塵緣卧雲嵗久志益堅御風復返三茅巔下視齊州九點煙送鮑仲嘉省親詩望雲篇朝登崇山言䇿其馬白雲孤飛親舍在下望彼白雲悠悠其思思親云逺曷能來歸浮雲在空變態無迹吁嗟季子滯于行役昔之未返憂心孔殷今爾既還笑語欣欣有斑其衣有白其髮再瞻再拜慰爾契濶躋彼堂矣稱彼觴矣親之康矣樂無疆矣遊子吟朝為遊子吟暮懷遊子悲遊子去日逺慈母將儔依母髮白如雪子心皎如月但得子心如月圓照母白髮髙堂前彩衣曲彩衣兮般般遊子歸兮慈母歡彩衣兮楚楚遊子去兮母心苦遊子去兮離憂多母心苦兮將奈何樹萱吟樹萱北堂戺翠葉何葳㽔深沾雨露恩恐遭霜雪萎昔年初種時短短根在土今年已著花蕊擘金叉股花開僅十日親夀期千春常懷嵗月邁未報鞠育仁誰言可忘憂離憂轉如積臨行繞萱叢露濡彩衣濕占鵲辭北堂靈鵲聲喳喳下階自銜萱草花慈母倚門每占喜定想行人歸到家昔時苦被鵲聲誤臆對含愁如欲訴今日鵲聲知有凖驚去回翔仍返顧東家郎君不出庭别離那識過平生縱使今朝競喧噪有耳何曽為爾聽西家農夫在田野恬熙生長茅簷下幾回著意送清音聒亂生憎遭唾罵惟有慈闈白髮親屢卜佳聲秋復春溫凊疏違甘旨缺而今喜見逺歸人丁寧靈鵲莫飛去深栖只向堂前樹上無鷹鸇下彈丸每聽流聲慰愁緒行人既歸爾相宜行人又去爾不知但當愛身慎飲啄他年再報歸來期烏夜啼和韻繞樹三匝烏擇栖風清月白咿喔啼閨中惱殺無家女時時臆對含愁語拋針倦繡減蘭燈臉褪鉛花墮紅雨關山月秋月生寒山照妾空幃間忽起逺道思良人守秦關近聞更移戍舟上瀘河灣迢迢各千里相望何時還盛年嘆零落覽鏡凋朱顔妾心徒自悲月色長自間樹中草野草附樹青蟠根空穴裏雖蒙雨露濡柔葉易枯死嗟爾亦何情失地猶貪生不如培厚土芊芊自欣榮短歌行日月苦短短倐忽百年滿古今浩茫茫慷慨萬感長不如飲美酒驅愁消鬢霜勞勞塵世內沉醉知幾場有子力耕稼有婦供蠶桑口吟白紵詞手把黃金觴哂彼輕薄兒車騎誇輝光陌上花陌上花開春日遲臨安女兒緩緩歸花開容易辭故枝緩歸只恐恩愛違人生幾何成老醜勸君且盡一杯酒願君善保千金夀夾馬祥光蕩牛斗滿目江山復何有緑水曲緑水不見底水深情更深中有比目魚同目復同心洛陽陌看花洛陽陌春色上衣來但使花長好不肻放春回靜夜思舉頭見明月萬古月不老月圓人亦圓人月應同好相逢行相逢不道逺相見即言歸髙堂春晝永好待舞斑衣玉階怨夜深白玉階露下寒侵骨娉婷不敢行恐踏團圓月上東門行上東門在何所河陽城南瀍河滸舊時豪華今已空惟有當年一抔土聞説漢家全盛秋門前列第皆王侯朱輪翠轂日來往凝笳疊鼓長喧啾畫簷雕拱接宫觀十里香塵飛不斷天上頻頒丹詔過民間屢免田租半白髮老人不識兵閭閻小兒歌太平鬬雞走馬尋常事豈有紛紛愁嘆聲二疏乞歸章初上公卿曾此盛供帳道傍觀者如雲屯雜彩從車幾千輛韶華轉眼流星過倐忽荆棘埋銅駝逢萌挂冠固已矣石勒倚嘯將如何往事傷心不能道惆悵東門何足保君不見北邙山頭四五陵玉匣珠襦總荒草七星石歌永樂年間取歸禁苑不周山崩天柱折天傾西北形露缺混沌已分元氣裂女媧補之毋乃拙煉石五色生紫煙雲粘霞綴恐未堅列宿參差自環繞璇杓耀芒安次躔後來星隕化為石少陽少剛同氣質沉思應是媧皇遺暈映珠聨猶玓瓅何年下墜新安城砥平瑩滑常晶熒六丁呵護神鬼守肻與人世鐫碑銘移來獨在萬山頂妥置琳宫秋月冷步虛聲歇剛風吹瀛海神遊夢初醒揚州道士騎鶴仙幾回朗誦黃庭篇簮冠佩劍爽思襲澄空浸水光相連土花莫蝕埃塵淨劫火難燃離斧刃寧戚扣角那能歌秦人施鞭安敢運非産廬阜非太湖赤瑛為骨瓊為膚煌煌耿耿三四點如此至寶寰區無好共兹山鎮悠久夜夜祥光照穹垕不磨不泐千萬年留向瑶壇長禮斗聨句洪武三年十二月草又三日喜文虎長兄受丞江安之命自京便道歸省是夕張燈酌酒父母在堂五兄弟次坐家嚴首倡二句相與聨詩以紀家庭一時聚樂之情耳秃頭憐父白老眼為兒青父山顯因人傑才超覺地靈兄東湖徐稚宅西蜀子雲亭文鳳世守寒氊物家傳古硯銘父三年忘窈窕隻影顧娉婷兄今日來儀鳳當時拾聚螢鳳胡床知坐穩羌笛不須聽父世事風中燭人情水上萍兄清名推善政舊業守遺經鳳莫壓陳驚座猶思鯉過庭父恢恢存晚節落落嘆晨星兄蘇子歸巴國申公出漢廷鳳便須花作縣莫戀肉為屏父書信憑鴻雁原情相鶺鴒兄公門有桃李藥籠備蔘苓鳳村號浣花曲橋題駟馬駉父無兒堪授業有女待歸寧兄故里雲連屋長江雪滿汀鳳流光已健子種德必添丁父飲酒思吞海為文學建瓴兄親情膠固漆時俗渭同涇鳳栖鳥巢南越神鯤化北溟父家音報烏鵲燈喜綴蜻蜓兄寡和成孤唱沉酣恥獨醒鳳羲和稱逺馭日月肻雙停父奉養違甘旨棲遲感莢蓂兄龍顔瞻近侍鶴髮享修齡鳳草長康成里松髙御史廳父誰憐心似鐵自嘆口如瓶兄栁眼春煙潤梅腮凍雨零金陵方返斾鄱水乂揚舲鸞瑟難膠柱牛刀試發硎闕文鳳遭家多難凶禍相仍今春二月聞長兄訃音秋九月又不幸先妣傾棄文麟弟留滯廣西三載未歸久絶音耗未知存亡偶閲故篋得此詩舊藁不忍遺棄追思曩昔父母俱存兄弟無故一時倡酬之樂不可復矣嗚呼昔日未知為難遇今而履此始知其為難遇曽子所謂孝有不及悌有不時信哉斯言因録於此涕淚危迸悲痛不能禁耳時洪武十二年臘月九日文鳳謹跋梧岡集卷四

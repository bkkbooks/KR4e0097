body:
  text: 梧岡集卷八明唐文鳯撰行狀明故耀州同知尚褧鮑公行狀刻入新安文獻志公姓鮑氏諱熲字尚褧歙西之棠樾里人也其上世自青齊來歙凡再遷至棠樾世以儒宦顯曾祖諱周字景文以子貴贈從仕郎徽州府路黟縣尹景文之父壽孫當至元丙子之變里中盜起賊執其父欲兵之壽孫出願代父死父願代子死賊哀憐之不忍殺父子俱得釋人稱為慈孝鮑家事載宋史孝義傳祖諱同仁字國良以右語出身五轉至會昌州同知致其事考諱深字伯原講學鄭子美待制之門為構師山書院以延鄉里學徒遂領府檄攝山長事公幼聰敏不凡甫成童讀書知大義能詩文精歐陽字法遒徑方整旁攻篆𨽻皆臻其妙及長從遊於張子經胡孟成鄭彥昭諸先輩山長公築耕讀堂以延賢士大夫而楓林朱允升白雲唐仲實石泉周彥明日夕過從相與講求誦習由是見益明識益髙值壬辰淆亂世家大族俱被剽掠劫奪而公之故居悉遭􅀈燬無遺丁酉我天兵東下克復徽城而主將鄧愈索鄭待制待制以嘗受元官遁去公遂代係於獄索之愈急度不獲免待制乃挺身而出見主將抗辭不屈主將禮之釋公待制語於衆曰吾得死所矣山長公與弟以仁受業師山最久不忍其死公奮然進曰先生既受前朝待制之名雖不食其祿而受其爵豈可屈辱臣異代乎待制曰熲之言是矣吾計已決明日衣冠北面再拜自縊死異時待制得登名於元史忠義傳雖其平生學力所至公亦可謂賢弟子矣已而世運平定詔求民間有才德賢良者太守王公以公名聞公以親老辭不允逼迫就道賦啼烏行以見志至京吏部引見上於西苑詔公與晉王傳桂公彥良十人同舍尚賔館編史傳進呈畢賜白金五十兩帽履衣各一襲授博士廳典籖明年春監築太社太稷壇成時初立翰林國史院改除編修官洪武改元學士陶公主敬稱公質實有文升翰林修撰承直郎同知制誥兼國史院編修官上嘗御謹身殿親䇿問廷臣曰北平建都可以控制四方比南京何如公對曰元主起自沙漠立國在燕今百年地氣天運已盡不可因也今南京興王之地宫殿已完不必改圖傳曰在德不在險也上又嘗䇿問久任之法公以借冦故事對皆稱善一日上登鍾山命詞臣扈從上御擁翠亭給筆札即景賦詩公與翰林朱升張以寧秦裕伯起居單友中李某鐵冠道人俱應制上親倡和逰崇福寺錫宴而還時尚書張復初以吏疾儒適陜西內附遂出公為耀州同知州兵戈之後飢饉屢年流民未復乃披荆棘以臨政嵗大飢朝廷發粟以賑公親領縣民赴孟津給粟宣上德意至秋方稔一新官廨民爭趨事不待程督旬月落成博士金華王公子充記而刻之張氏偽官許玉者結黨害民有王寅罹其害公不避危險率弓手盡擒之以送行省右承耿公大加稱賞境內獲安淳化縣與州鄰縣有姦吏逼民虗增田土頃畝以媚上父老訴於會府委公核實乃履畝而徵去虗增糧萬五十石同官縣民偽左丞趙某掠平陸縣民張氏女年十三訴於縣不能直公執諸廷歸其女洪武四年秋奉表上京欲順道省親九月十四日光祿錫宴越翌日赴禮部辭俄被拘送刑部轉送羽林衛乃知西安府經厯常達坐事誣指凡陜西一道官吏無虛實小大皆不免至十月十五日獄中上表陳情不報時從叔任留京不忍去為製衣饋膳及死買棺載骸歸其鄉公臨終寫遺文付其子宅相丁寧戒諭文辭明暢字畫嚴整不異平日其意若曰天其不可必乎吾為善胡為而罹此禍天其可必乎吾當昌吾後公先娶程氏宋丞相程公元鳯之曽孫女性柔順盡婦道年十九歸公為夫婦十六年臨蓐而沒繼娶宋氏甫一月而公有薦舉之行在耀州月下嘗相謂曰設若不幸汝肯守志乎宋泣曰婦人從一而終豈可事二姓公笑曰吾無憾矣聞公之訃哀慟號泣抱一嵗幼子匍匐走數千里見者莫不感動既抵家公姑康健在堂具甘旨輸孝敬經紀其家政公姑安之視前室之子不異所生子亦奉之如親母凡事必咨稟而後行時户役煩多支費不給宋之父母憫其蚤寡欲奪其志曰曩吾在耀州月下已許吾夫矣可以死背其言乎終不聽公姑俱以天年歿宋營喪事盡禮宗族姻戚咸稱之里耆老以貞節聞得旌表其門程氏生子一人即宅相女一人適某宋氏生子一人曰長安七嵗而率宅相有子三人長玄英次玄寧三玄復曽孫男若干人公得年四十以永樂某年葬績溪縣之株木嶺嗚呼天道難諶善惡之報禍福之降何其不以類應耶豈囿於氣數而值於命運歟將詰諸司造物者其然乎其不然乎申包胥曰天定能勝人人定亦能勝天其果然乎公之罹非辜亦可悲矣三孫念公嘗踵門而請曰先祖行實未有紀述當時儕輩俱已澌盡無一在者惟先生獨存巋然猶魯靈光也非先生其誰宜為先祖棄世垂四十載矣非敢後也若有待焉敢請豫諾之老淚危迸哀思填胸每一執筆悲不自已侵尋嵗月弗克成文乃忍慟而書之尚干當代名公矜憫而銘之庶貽於不朽謹狀故白雲處士吳公行述公姓吳氏諱奫字萬頃號白雲處士徽之休寧人也吳自泰伯受封因以為氏其後延陵季子繼泰伯之德而以三讓稱故郡望以延陵著至秦吳芮為番令得江湖間民心號番君今大江東南皆其苗裔徽之與番壤地聯接支派蔓延土著於徽分徙於休寧之萬安吳田始祖諱超唐興元年間任本邑令族益大五世祖諱某仕蜀閬州倅擇故鄉山水之勝遂卜築焉即今所居之地曽大父諱某字某邃於儒肄舉子業以易經魁鄉試宋季監桐城稅階成忠即大父諱某字某號屏山克繼家學以文章擅名至元授太平繁昌縣尹有政績階承直郎考諱某字某號松所學行卓卓可述蔭授良禾嶺巡徼未老納祿而歸公承纍世培植之厚田園邸第幾有一鄉能以富盛自處而不屑於裒聚名仁厚儒宦家公幼天姿頴悟德性凝重年甫弱冠身幹魁岸意氣豪宕未幾斂華就實勵志古學益以聖賢為法當是時風俗淳美人慕士君子之行而徽為紫陽朱夫子之闕里宗工遺老倡明性理若雲峯先生胡公定宇先生陳公皆執經師承而朱公允升汪公德輔友道尤篤則公問學淵源有自矣絶口不談仕進延經明行修之士尊禮而館穀焉姻戚俊茂若趙方子常鄭潛彥昭皆招置家孰飲食訓督無異已子後二公知名趙以篤學師黃楚望虞文靖著書立言而學者以東山先生稱鄭以才術文翰受知宰輔厯任正字御史薦登清要蓋出於公之誘掖而成也公甘隱山林以道自樂經生學子質其疑難達官巨人資其謀謨以暨韋布之秀方伎之流莫不願挹談笑仰風裁得公青矚則人人飫德有以自慊公平生好周人急里中有孤嫠貧乏者飢則餔之寒則衣之病則藥之沒則轊而葬之直嵗大侵出所積粟廉價售之而邑之求糴者日踵接於門皆飯之而去嘗有一里氓齎父鏹若干緡詣公啓廩尋失其鏹涕泣欲無生公知其故遂如所失數豫以粟氓感德戒飭諸子每曰吾以安遺汝而不遺汝以危汝其慎之人咸擬之龎德公晚年謝棄俗紛家政悉委諸冡嗣一不以縈其心每適意有所得則疾書之為文貫穿經史為詩陶冶性情積之逺發之𢎞不自知其多也有白雲集五十卷藏於家重罹兵燹燬而不存娶江氏歙望族貞柔孝敬姑程氏宋故相程元鳯之姪女感疾沉痼醫藥百方弗效江禱北辰刲股肉和糜以進疾遂瘳以孝婦聞子男三人長玉林字伯岡才識文學欲有以自見入國朝帥閫知其賢辟贊軍務嘗謂功名可以戾契至卒齎志以沒次甡字仲生工詩文為徽郡儒學正後擢將仕郎主山東之寧陽縣簿終於官次薰字季南晦迹隴畝女二人長蘭適程仁澤次和適謝均美孫男五􅀈樵牧圭月德牧蚤遊邑庠由紀善今授從仕郎户科給事中兼司經局校書公生於前元丙申七月草五日沒於癸卯八月某日享年六十有八以某年某月某日葬於霹靂嶺江氏後公八年卒享年八十以洪武庚戌冬十有一月某日葬於弄坑之原余成童時親拜公之絇屨知三世締交於公父子間俯仰四十餘年而死生變故有無窮之悲公三子四孫俱已相繼傾背所餘惟牧方膺爵祿駸駸嚮用殆天所以昌其後而食其報於前也耶牧纍以公之行實屬豫述之平昔遊從斯文無一在者獨余侍公之久知公之深通家契誼有不得而辭也故敢托其梗概書之以俟當世之秉大手筆者采擇焉故處士吳公伯岡行狀公姓吳氏諱玉林字伯岡按吳自泰伯居勾吳而子孫遂以為氏漢長沙王芮四男分居新安至唐有諱少微者仕為御史曽孫瑶自休寧徙歙富饒瑶生叔臻叔臻生明明生超超生春春生天推天推生琇愛休寧金竹山之勝復徙家焉第四子依舒通守閬州始居吳田依舒生子志子志生泉湧泉湧生士雋士雋生積積生道傳道傳生琬琬生逄辰逄辰生梓榮宋吉州泰和縣簿梓榮生彥松彥松生邦吕厯官成忠郎邦吕生柔遇柔遇生賁龍元太平路繁昌縣尹號屏山生之泰之泰生奫字萬頃號白雲是為伯岡之父鄉稱長者公幼性敏鋭甫六嵗就外傳日記數千百言能通大義成童有詩聲年十七習舉子業文理蔚然儕輩服其精緻屢試場屋不利恬然不以得失介意而學益篤鄉先逹子常趙公彥昭鄭公嘗同受業於家孰當是時倡明理學遡子朱子之淵源者朱公允升汪公德輔倪公士毅鄭公子美及我先人三峯先生也皆與公為斯文友故公德行之懿問學之博操守之端識見之卓逈異庸常天兵東下歙版圖入職方氏公始就辟參謀軍機無何棄去竟以隱終方元季劻勷之秋公總家政內外整肅事親盡孝撫二弟克篤友愛賦重役繁身任之而親與弟不知也蘄黃冦起入饒歙境羣小鴟張狼噬巨室葅醢公外戚歙程氏乃宋故相家闔門逃匿憸人利其資蹤迹得之欲覆其宗俾無遺胤公盡出已財以足其求程獲免難里氓有韓姓者抱疾危迫公憂形於色延良醫藥之而愈收養孤遺賑恤窮乏常如不及里中所居之田平衍宜稼而農苦旱公乃相地形捐私帑堰溪為堨鏟山錐石引水為渠既成旱不為災鄉人利之建義莊積粟贍族凡祀先上塜少長咸集所以敘尊卑合親疏而重敦睦之意也公剛直豪爽閭里攻訐鬬狼之忿不之公府而折中於公得公一言而止有松蘿吟藁二十卷藏於家公生於前元延祐二年丙辰五月十有七日沒於大明洪武三年庚戌十有一月四日享年五十有五後十五年葬於音干之原配程氏柔順真靜孝敬舅姑宜於家族後公草又六年卒得年八十一子男二人長樵蚤世次牧字彥守以俊茂選充邑庠弟子員用勞績擢紀善今升授户科給事中兼司經局教書階從仕郎女一人珈適歙士族江士翔孫男二冀善功逺孫女一遵厚適江彥華嗚呼公有志而弗獲伸有才有學而弗克試存心律已可概見者如此人謂天道玄默難諶以豫觀之豈其然乎嗇其父於前所以豐其子於後也豫自童丱托交於公父子間今與彥守會京師敘騤違感今思昔未嘗不長慨也豫既述白雲處士行實而彥守以故交無存非豫莫能知公之詳復俾狀之以乞銘於太史氏用發潛德之幽光焉謹狀明故和齋唐公墓志銘公姓唐氏諱中字伯和號和齋世為新安文獻家始祖諱承昈京兆人從宋髙宗南渡録勳勞授新安太守在官嵗久子孫因居之遂為土著世逺譜軼弗可稽其詳譜自新安始蓋本於承昈公也髙祖諱廷雋字君選階登仕郎曽祖諱虞字常道號梅癯繇星源嚴田李氏出紹於唐有二子長諱元字長孺博學雄文為東南學者師以將仕佐郎徽州路儒學教授致其仕公之伯祖也次諱輝字清之號雙清以父之號梅癯故永慕而志之由儒試吏業任廣東肅政廉訪司書吏公之祖也當時以昆季聮輝嫓美一稱名儒一稱良吏鄉邦榮之考諱德潤字潤甫號晚翠繇水陽倉副使轉授饒之餘干州吏目享年六十妣俞氏晦庵書院山長俞魏卿女子男三人長伯友次伯恭次即公也公自幼隨其考宦遊饒郡年稍長從鄉先進汪彥修先生授學讀經史通大義癸巳適丁戈鋋搶攘之秋而不幸先考棄背公侍養扶疾竭試攄孝以道途修阻未能歸葬藁􅓖於宣之灘頭寺側時平遷柩返於故鄉竁歙之一都吳山壬寅總兵大將何公文輝開幕府起公參謀軍政甲辰除官吏目克復廬州朝廷論功褒賞升授經厯移戍西江之南昌撫士卒以恩處僚友以信植弱持危賙貧恤匱大率以仁恕存心其事上遇下煦之以和接之以敬人無間言庚戌以疾還家甲寅府縣復以懷才抱德舉薦徵辟赴京擢黃之楊厯湖官其地産蘭故名蘭溪蘇長公東坡嘗吟咏嘯歌登臨遊眺之所至今遺迹猶可尋訪而赤壁之景日接於目公每餘暇裴回弔古見於詩章因自號蘭溪漁者在任將及三載課額弗虧民力弗困煢獨者賑惠以安之逋負者申請以蠲之己未解印綬乞歸田里杜門訓子講道於表城門內學徒甚衆後卜築東關倚山帶郭雖鄰闤闠而不雜市喧清敻幽邃嘉葩異卉扶疏蔥蒨復繞屋種松闢小軒仍扁以晚翠殆將終老焉有詩文雜著十卷藏於家乙酉正月已亥嬰心氣之疾攻以藥餌罔效至十四日辛亥夜呼諸子環侍明燈熾火指以取喻言人生命之修短委之於天生猶寄也死猶歸也若燈火然明盡則滅理之常也遂瞑目奄然而逝春秋七十有五生於前元至順二年辛未三月二十四日歿於大明永樂三年乙酉正月十四日配孺人丁氏惠秀饒之餘干世家昔在乙未嵗兵陷宣城公病危丁氏潛刲左股肉烹糜粥籲天而進遂病愈孺人性柔惠和順孝以奉舅姑睦以待姻戚恩以御婢媵婦儀母德可謂備矣先公十年卒夀六十有四有男五人長希善次希赳次豫章皆讀書次吉祥充郡庠弟子員以詩經中庚辰科進士第授永州府祁陽縣令仁以恤民廉以律已九載通考無毫忽過奉旨命禮部特錫恩宴以勞之寵榮所被同時秩滿者皆莫及也再除河南南陽縣令次夢祖孫男九人孫女二人以是年十二月二十二日甲申葬於問政山齋堂前嗚呼公之為人儀觀甚偉廣顙豐頥身幹修聳而氣宇和平性天明徹而心地坦夷與人交洞見肺腑略無涯岸值賔客宴會談機娓娓嬉笑滿容是以人人親之有如飲醇酎不覺心醉其平生見於設施不得久於其位蓋弗獲展其才以究於用其所可稱道者僅僅如斯而已使公得盡其所藴又當何如哉嗚呼天之理賦於人人之理契於天天人之理相為倚伏未嘗懸隔也故嗇於前者豐於後微於始者盛於終此天人之理宜然也觀公之子孫昌茂其豐而盛者必矣而吉祥仕途方開等而上之未可量也徵於此而益信豫與公羣從兄弟以愚昧忝侍藩府留寓北京踰十載矣而次姪希赳屢移書欲干豫求當代之名能文辭者顯揚之久未有所述今來南京次姪豫章復申前請及觀吉祥之榮寵故拜録之此歐陽子志其先公瀧江之表而曰非敢後也蓋有待也而豫有待於吉祥而敢後於公也庸是姑為之志以賁於玄壤以紓豫之悲也明故處士存誠汪公墓志銘公姓汪名仁字景榮號存誠歙人也其先出潁川隋末有諱華者當四海鼎沸奮臂一呼保禦六州民不識干戈唐室龍興乃奉籍納欵詔褒美之沒竁雲朗山至今廟食曽祖諱文焕祖諱繼祖考諱祺俱隱德不仕公狀貌清癯性姿敏悟望之而容舒即之而氣和其持身也謹願而不肆其處心也平易而不欺其居家也孝友而不違其在鄉也謙恭而不傲臨財以寬制事以義此公之素履若此也元季淆亂舉室潛避山谷間鄉之郡小橫梃剽掠遭之而不加害時漸寧乃攻廢舉之業而諸子皆成立家業日益饒裕初公父遊淮北安於異土二十餘年至正中原兵起公俾弟景原領家政而自往淮迎請父意堅不為動凡往返者三父感其誠趣裝擕妾及子以歸洪武乙丑嵗府吏張均道繫京獄誣公以自脫公被逮坐重法張乃悔悟以死爭尋蒙特恩寧家其於岐黃之經針灸之籍以至隂陽地理之學皆精擇而詳究之嘗闢一室居善藥凡逺近疾病者求之注以劑液攻以針砭咸得脫去所苦故人人德之逺方藝術之士過其門必善遇之蓋其天性如此暮年耳聰目明細字可書舍輿而徒亦弗杖也娶黃氏性柔淑繼閔氏得婦道嘗自卜葬塋於本里秋堨干虛其中穴以自窆而竁其二室公生前元泰定丁卯沒於大明永樂庚寅享年八十有四子男三長致和先公二十年卒次致賢致達女二長原適程克恭次添適陳文紹俱黃出孫男八助澤尊晟新亨森閏孫女七俱適名族嗚呼觀古今之人物惟篤厚者常得福而暴橫者常嬰禍是禍福無不自已求之也公之得福皆自忠厚以延之而能享其全豈幸致哉豫弱冠識公始終相與五十餘年今聞訃而不得哭聞葬而不得執紼其於交好之情何如哉豫留京師致賢走書録星源俞季實事狀來求銘豫讀之淚下不能禁雖欲已於言其能已乎遂按狀據實而書之銘曰稽諸姓氏始侯汪也食采潁川世澤長也桓桓越國興於唐也四海鼎沸時攘搶也六州保禦樂安康也遙遙後裔茂而昌也猗歟處士何才良也質性美粹德彌彰也心存誠厚藹慈祥也多能多藝攻岐黃也堪輿是精惟隂陽也針砭是嗜祛膏盲也善積培植德澤滂也嗚呼嚞人乃允臧也天不憗遺遽云亡也少微星殞黯無光也卜吉佳城雲茫茫也秋堨斯干氣聚藏也有流其水環其岡也是竁是窆封斧堂也虹光夜燭常煌煌也墓門有石垂琳琅也紀述不泯示銘章也後千百載久不忘也前給事中約齋先生吳公生塋銘老友約齋吳公訪豫三峯精舍掃榻留宿清談竟夕語豫曰死生者晝夜也知生之理則知死之理陶淵明自作生挽詩杜牧之自撰生墓志至今以為賢吾欲效之子其為吾序而銘焉沒而刻之曷若存而讀之之為愈也幸毋吝豫重世交誼不獲讓序曰公姓吳氏名牧字彥守號約齋世居休寧之吳田地以姓傳志其久也髙祖諱賁龍元太平路繁昌縣尹曽祖諱之泰號松所蔭授良和巡檢祖諱淵字萬頃嗜學能詩考諱玉林字伯岡襟度慷慨工辭翰公弱不好弄口授詩文記誦不忘甫成童伯岡逝哀毁柴立制終選充邑庠生弱冠長兄樵棄世形單影隻俄為憸人所誣謫戍冀北母程恭人訃至伏地痛哭絶而復蘇洪武二十二年冬皇上六師駐塗陽公奮身效忠隨駕回京叩閽上疏察天時人心之所宜厯陳十事允合聖心由是日侍左右訪問機務賜以華宴賚以楮幣遂擢王府紀善大駕臨南京録功著勞升户科給事中兼司經校書在東宫同大臣於經筵進講義理貫徹剖析詳明睿顔喜恱居無何以母喪未葬陳情上哀其孝誠允之歸而卜地於霹靂嶺葬母恭人及祖母二喪竣事復任再升工科左給事中永樂辛丑秋八月公年六十有六上念其老優賜歸田誠盛典也公之厯仕拱侍彤庭翊贊青宫出入禁闥二十年餘規諌匡輔確守臣節中外倚賴翕然歸美而處身剛介亮直不愧清流功成志遂保躬全名勇退而歸天之道也公家食時養母以孝祀先以誠睦族以禮處鄉里恤孤賑乏有汪姓者産豐年老恐豪橫侵漁之乃立偽劵以囑公其人未幾歿公不以死生異其心即取劵以歸其妻在兵中有棄小兒於道公收而育之在官有功則推人有過則歸已門無私謁歸嵗餘所居窗前地産靈芝數本人以為賀公曰穀粟世所珍斯草奚足異耶嘗繪小像自題曰爾貌清􅋯爾性恬淡金闕侍臣蓬萊仙伴亦可以見公之素志也娶江氏歙之舊族婦道母儀為閨閫則側室李亦淑慎子男二人長冀善字思齊次功逺字思勉有孝行孫男四人俱俊茂嗚呼公際九五龍飛式符昌運而宣忠效力攀鱗附翼屢遷清要晚節承恩而歸以盡天年可謂克保始終而為全人矣豫故序其梗槩復系之以銘銘曰猗與厥家延陵之裔泰伯季子先後繼志惟德之讓惟德之至以亢爾宗以綿爾世吳田之區山環水聚育秀鍾英篤生才器乃祖乃父豪邁精粹吁嗟約齋善述善嗣為剛介士為清白吏榮登王門長裾日曳兩遷給事寵居近侍三擢校書司經啓祕以贊密謀以膺大事出入禁闥小心寅畏守正惟艱任重匪易引年告休聖心恱豫優遊田里保身明智晚節康寧寡欲絶嗜人生穹壤有形必敝乃營夀藏用卜佳地世澤弗泯公侯復始刻銘豐碑終古毋愧梧岡集卷八

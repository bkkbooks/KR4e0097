body:
  text: 梧岡集巻三明唐文鳳撰五言律詩進臘日詩大蜡逢嘉節陽和暖欲回人間恩惠溥天上早春來臘意風催栁寒香雪沁梅梁園應預宴授簡效鄒枚又臘日饒佳景乾坤萬里同三農方報祀八蜡已成功鶴禁春光早龍庭喜氣濃太平端有像願勿效東封洪武庚辰八月一日為撫安人民至衣錦鄉訪安湖書院拜先聖殿謁先賢祠棟宇傾撓廊廡荒茀顧瞻感嘆念欲興修兹焉經始以俟畢工厯初十日夜坐挈矩堂新月滿庭謾爾興懷成五言近體十首時儒生鍾民敬亦次余韻以紀一時之清興也凉夜坐長廡披衣酒半醒月涵雙沼白雲去萬山青遺老猶文物前修尚典刑我來勤撫字短髪故星星又昔號懷珍士今游衣錦鄉三程祠尚在二謝塚應荒儀範崇昭代功勲銘太常自慚居邑宰弔古意何長又天地有否泰山川無古今相傳舊時政應慕昔賢心三獻曽悲玉四知常畏金平生無寸術一念恤民深又三桂雪霜古孤槐風雨黄昔賢祀宇在先聖殿庭荒壁刺藤枝小墻垂草蔓長愧予同政教感慨意徬徨又夜坐庭前月娟娟影倍清眼看前代迹心切故鄉情積水魚龍起空林鳥鵲驚靈槎如可覔吾欲上蓬瀛又昨日又今日千山復萬山道途常畏險身世每思閒有役吟情澁無憂酒量寛一官聊自慰未必悞儒冠又問月月不荅留雲雲自行江山應有待天地豈無情蒼狗形須變青鸞影更明一杯聊復爾漫聽浩歌聲又不盡吟詩趣徘徊欲二更亂星浮酒甕孤月煑茶鐺此夜朋徒興他鄉兄弟情平生仗忠信撫事不須驚又得酒曉仍飲尋思夜更哦人心應復爾吾道竟如何蟾影一池靜蛩聲四壁多百年斯道重未用歎蹉跎又問俗經村落周行途路難端嚴元有道澹泊若無官報國寸心赤憂民兩鬢斑位卑才更拙誰為達朝端和游新吳寺詩韻有小序雲幢海上人來自西昌手新吳寺詩文一帙有杭府通判楊自立所作小序同游諸文士分韻賦詩以黄葉前朝寺為韻成五言體五首囑余和之愧不自揆勉短續貂以繼楊公諸游士之清興云時洪武壬午冬十一月也歩屧響迴廊庭虛月一方栴檀雲弄影薝蔔夜吹香禪定猿窺鉢經殘鶴護房明朝覔歸路滿地葉飛黄右黃字招提境清幽小徑縈曲折登髙目可舒攬秀意猶愜石壇花雨飄琴室松風歇向晚偶題詩冩遍寒蕉葉右葉字䭾經白馬寺創額赤烏年宗續雲門法心參雪竇禪松髙留鶴語樹老蛻龍懸長日繙經罷蒲團禮佛前右前字倚杖閒尋寺吟詩忽過橋晚山含雨暗秋水共天遥自媿花封治難從桂隠招婆婆遊世界鐘鼓樂清朝右朝字涯洲地幽深尋僧聊小憇名山在寰區勝境異人世澗寒龍已歸村深虎初逝上方鐘磬聲疑是雲門寺右寺字萬安縣小小萬安縣潺潺惶恐灘江流章貢水地接吉筠山産薄賦應少民稀政自閒為言趙大尹解任幾時還時趙彦剛為本縣令考滿永和鎮宋丞相益國公必大家是鎮有窰塲燒磁器公生後器不能成猶存讀書䑓永和古名市益國是家鄉窰變胚胎器街存瓦礫墻山川奪秀色天地啟珍藏寂寞書䑓在茫茫春草長螺子山山名螺子小蒼翠欲參天勢壓崆峒外形凝混沌前琳宫浮紫氣梵宇出青蓮吾欲投簮紱歸耕老石田吉水縣邑號古西昌相傳文物鄉栽花令尹宅擢桂狀元坊江㵼吉文字山凝秀色蒼曉來春兩霽新緑栁絲長清江鎮鎮市清江上居民棟宇連淮鹽堆客肆廣貨集商船草色春迷地波光暖浸天凌晨征棹發萬竈起炊烟豐城縣小縣枕江濵人家栁色新斗牛空紫氣天地已青春士俗猶追古民風頗化淳文安今寂寞千古老儒臣元學士揭文公曼卿故鄉徐孺子亭遺趾在東湖髙士亭今廢遺基俯碧流聲名著東漢人物重南州友致生芻奠賔延下榻留平生惟食力禄仕豈曽謀望湖亭一上望湖亭湖山四面青天開浮碧落水濶接滄溟蛟窟人懷懼龍祠客乞靈老年思補報短髪恁星星落星石女媧曽煉石上補列星躔遺質傳千古流光下九天龍文猶照日虹氣欲生烟水落年年在西風幾泊船湖口縣萬里長江逺扁舟一葉孤山連彭澤縣水接洞庭湖客市魚堪買人家酒可沽丹心頻念闕指日到皇都湖口觀音閣傑閣枕江滸登臨為落㠶天開兠率境波浸補陀巖僧設伊蒲供經翻貝葉函村醪澆旅况吾欲典春衫彭澤縣欲問柴桑里來尋陶令家菊香無舊蝶栁色有新鴉雲淨浮青嶂潮回擁白沙縣街今寂寞酒貴不堪賖馬當峽夜泊夜泊馬當峽潮歸龍起風徃來千里外辛苦五年中每歎零丁客多慚矍鑠公天空明月出故故照孤篷佛指峽阻風佛指喜名峽客心驚阻風江山應有待天地更能容民俗思遺愛臣心秉至公老年頻念闕矯首五雲東再留佛指峽昨日雨猶少今朝風更多江吞大信水峽束小孤波萬事古如此百年今若何明當發征棹沽酒一髙歌佛指峽舟中見月有感長江夜景沈風急掃頑隂鳥鵲髙枝穏魚龍積水深月藏萬古魄人老百年心抱膝閒吟罷羈懷苦不禁又去縣離百日思鄉隔萬山民心應久望月色自長閒江隠蛟螭窟天開虎豹關姮娥如有意清影照蒼顔又阻風愁不柰見月喜何如蟾影涵蘇魄龍光燭太虛斗間覘紫氣頷下現丹書桂闕羣仙降天香拂袖裾又三日留孤峽風狂濁浪髙寸心馳去楫微命托輕舠阿閣來儀鳳神山載巨鰲五雲天闕近朝罷謁銓曹又來日當殘臘歸期及暮春眼看今夜月心切故鄉人浪息煩風伯舟安托水神馮唐何用嘆未悞百年身離佛指峽空傳佛指現不念佛心慈怒浪排空猛驚風入夜癡峽青花雨墜江碧栁烟垂此地稽留苦王程敢後期泊雷港有作大江風浪急雷港暫停舟桅直黏雲立㠶輕帶雨收葦蒲連浦溆楊栁暗汀洲每羨漁家樂謀生不外求又雷港沙堆浦春江浪拍空一時潮信雨三月石尤風飛退無來鷁歸遲有去鴻故鄉朋舊在何日酒尊同又昨日又今日百年能幾年暮雲青峽雨春水白鷗天寗戚歌牛下昌黎拜馬前平生恁流止志氣肻祈憐又晚泊豁吟懷行行步渚沙雨添新栁耳水減嫩蒲芽烏鬼來漁艇青蚨付酒家微風吹短褐倚杖數歸鴉又舟子行舟緩淹留十月程人心誰㑹意王事我關情風暖江波定雲晴浦月生故鄉何處是迢逓望徽城横石磯横石倚漁磯狂風浪激飛山頭雲覆帽地骨草成衣城繞江三面天連水四維人家栁汀上沽酒賣魚肥吉陽鎮吉陽傳舊鎮廵徼復新司燒劵不我責棄繻當自期江空雲冪冪天濶雨絲絲肻謂吾衰矣心猶少壯時雁汊小河流雁汊巨浸接龍灣碧㵼九江水青迎兩縣山老添新白髪愁減舊紅顔酒助詩神壯揮毫思不慳長楓峽篙師用力健㠶駛拂雲低浪湧長楓峽沙平短栁堤雨輕魚性熟風暖鳥聲齊酒醒詩成後蠻箋手自題拏檛石亂石累堆小嶄巖髙丈尋一拳浮水面千古鎮江心鸛鶴棲巢穏蛟龍宅窟深晚來閒極目獨獨自長吟馬踏石何年天馬下踏碎石紛紛跡印滎河種蹄奔沙苑羣深涵三月浪亂㸃一江雲晚泊維舟處微風酒半醺池口鎮迫暮宿池口維舟艤渡頭城依孤嶂聳水入大江流市小無鹽肆年飢有米艘人生忙底事閒殺羨沙鷗又驗劵廵司下停舟水驛前逺山常隱霧巨浸欲吞天小市魚蝦集長汀鷗鷺眠旅情何太苦搔首意茫然梅根市寂寞梅根市潮回岸擁沙栁邉維客艇樹底著人家山暝雲含雨江晴水映霞曉來篷下坐開鏡整烏紗六百丈地長六百丈江濶一千尋章亥足曽歩𤣥夷夢未臨禹祭衡山夢𤣥夷蒼水使者得金簡玉字乃得治水之要出吳越春秋山川古域在嵗月逝波深自是操吳語何煩效越吟銅陵縣五世祖唐廷瑞宋理宗朝登科仕銅見説銅陵縣相傳我祖風抱經曽擢桂授職已哦松水木情何極江山興不窮文孫事尋訪父老指遺蹤舟過銅陵得風累日逢狂浪凌晨得順風舟輕如駛馬㠶快若征鴻鼻祖政猶在文孫道未窮南京天闕近王氣鬱葱葱晚泊神福鎮鎮有將軍廟徐君幾代孫操戈忠更切挂劍誼尤尊雖享千年祀難招百戰魂神靈頻錫福落日大江吞又古鎮名神福將軍有廟庭水光浮日白山色隔江青魚化長生浪鷗驚不下汀丁寜一盃酒此地慰漂零又生居治平世老遇聖明時日月無私照江山有後期潮痕添雨見花信得春知晚泊吟眸豁微風颺鬢絲又水暖沙堆浦江深浪激磯栁花黏燕薄蘆笋薦魚肥事業方從拙生涯計任非懷忠慚食禄應笑泣牛衣荻港小港紆平岸長江捲怒濤人心䑕投穴我志鶴鳴臯陰靄村墟隠悲風日夜號持衡頻考績清裁屬東曹版子磯分港殺波急突磯攅石多天寒吼犀兕浪暖鬭蛟鼉東海鞭難塞南山叩更歌年年形勝在人世幾經過月子河天近星姑渚黄姑織女星也星名黄姑故曰星姑蜀有黄姑渚江分月子河磯頭蹲虎石沙觜漾鷗波白水連淮濶青山入楚多徃來無阻險鼓枻一長歌月子河午泊河口初停楫江心又挂㠶水光揺去斾雨氣襲征衫薄俗空騰謗清朝肻畏䜛神祠千古壯髙倚石嶄巖三山鎮鎮挹三山聳江通二水流驚濤捲地起怒吹挾雲浮投檄昌黎伯乘槎博望侯平生逺遊志何日到瀛洲三山順風渡江三山離鎮逺一棹渡江來月出鮫人泣潮歸龍子回持心絶思慮撫事去驚猜向晚情何適詩成句穏裁螃蠏磯小小鸕鷀艇團團螃蠏磯客㠶朝落影漁火夜藏輝圩濶稻梁熟汀長蘆葉稀江鄉如可隠吾欲問東歸和尚港人傳和尚港春水没漁磯不見浮盃渡空聞飛錫歸鰣魚三月美螃蠏九秋肥惆悵𤣥真隠衰年與願違魯港魯港停舟處相逢故老談河魚時潑剌江燕又呢喃帶雨張㠶腹臨風拂劍鐔百年董狐筆憤死木綿菴梟磯宣城誌載廟祠昭烈夫人孫權妹拳石聳江中波流四面同今傳神顯異昔詫女英雄巴蜀經營逺荆吳割據通魂歸思故國不祀永安宫蕪湖縣蕪湖舊名邑官廨幾經年鼓響來祠下舟行到縣前江花寒泣露浦樹暖浮煙遥憶祁陽尹同宗賴汝賢姪彦禎登洪武己卯科進士第授湖廣永州府祁陽縣知縣東廊山山聳號東廊蜿蜒龍勢長地連春水白天入曉雲蒼日月經旋遶乾坤接混茫欲尋謝安樂著屐此徜徉西廊山髙聳遥相並東西勢自分常飛兩山雨只隔一江雲韓子登長慟愚公移未勤舟中幾回首蒼翠倚斜曛晚泊大信大信維舟泊炊烟暝色迷水光連上下山勢隔東西江接淮淝近天分吳楚低人家多賣酒旅客醉如泥贈蕭飛霞老道士白髪保修齡神全體自寜上清留紫府内景誦黄庭佩劍龍來仗吹笙鶴下聽旌陽傳秘術符篆亦通靈贈栢仲芳弟子昔承教先生今隠居白頭在閨閫彩服立庭除千里形神隔三年音問疎相思函丈側凉月夜晴初又相思長北望相别近南遊京國鶯花雨江湖蘆雁秋李生師説在栢子隠居幽安得陪清講爐香細細浮書示次兒禎七載從遊宦勤劬孝念深關山千里月父子一生心老驥思長道啼烏戀故林鄉書何日到遥望白雲岑又老作王門客栖遲兩鬢霜長孫憐稚弱慈母喜康强寒沼魚堪膾春罌酒可嘗昔年新種樹别後過人長又吾家五兄弟僂指恰三人骨肉生兼死光隂秋復春家山千日酒宦海百年身幾度思先壠寒風淚洒巾又我去驅車北兒歸返斾南頭寒宜戴帽髪短不勝簮詩律吟餘穏羈懷飲後酣平安數行字一劄手初緘又父老已如此子歸將若何乾坤饒雨露風雪阻關河花縣民情切楓宸聖澤多涓埃期補報吾道肻蹉跎又弟昆心自切父子誼尤真日月千年曉乾坤萬物春角聲催去斾㠶影候歸人送汝京華道澆愁酒味醇又去馬䇿未數行舟櫂莫停客愁雙髩白家學一燈青肻嘆彈新鋏何憂守舊經嚴城寒柝夜殘酒夢初醒又瘦妻飲憂恨弱女憶嬌癡旅况天難管愁心客自知鴈賔來北渚菊老醉東籬惆悵陶彭澤田園有所思又嗜慾心如水文章氣比虹青衫䝉帝澤彩筆奪天工肻嘆龍鍾叟猶誇矍鑠翁時明當際遇道在豈終窮又北雪馬如蝟南人貂作裘自諳為
理白彦竒賦乾坤如此好溪山獨歩髙人自徃還龍駐盡時蒼石露牛眠深處白雲閒邱原遊覽情何極風月吟哦興不慳他日汝川川上路青鞋布襪訪松關安隠堂為秦遵道老人賦安隠堂中七十翁龎眉鶴髪古人風髙名不減韓康伯厚澤應同龐徳公稚子趨庭鳩杖出嘉賔滿坐蟻尊空賜歸得遂桑榆暖擊壤堯民樂嵗豐和伴讀鍾啟晦贈劉淵然髙道詩韻乘風欲訪羽人邱道骨仙姿第一流壇上熒光宵禮斗匣中劍影曉横秋姓名久達黃金闕品籍應居白玉樓聖代只今崇教典何煩紫氣出關浮送僉憲武本大之官閩南拜命新除被寵光觀風持節鎮炎方三山恩煦繡衣日八郡威凝白簡霜冰盌沉紅嘗荔子曉盤摘緑薦㯽榔聖朝求治蘇民瘼肻讓澄清説范滂送大尹之官房縣房陵山水繞郊墟令尹新除甫下車耆舊好尋髙士傳交遊為寄故人書千家桃李春風後百里桑麻夜雨餘共説㢘平宣治化細詢民瘼定何如和伴讀鍾啟晦雪中景春指揮留飲詩韻東風一夜散瓊花春滿皇都貴戚家簌􅉡寒聲蠶食葉瀟瀟細響蟹行沙飲餘醇酎顔常渥吟得新詩髩欲華晚跨驕驄歸甲第開尊宴客泛流霞題古鄞湯潤珉菊庄東籬處士舊開徑東澗先生新作庄白髪自憐今世老黄花猶惜昔時香百年清興留詩句九日髙情付酒觴我欲賦歸歸未得秋風吹夢故園荒題畫馬房星墮地夜流光却向滎河産驌驦雲霧氣蒸疑鳳翥風雷勢激若龍驤九千道里來神異十二天閑得俊良好語奚官勤洗刷鸞輿穏駕御堦長一駿能空萬馬羣貳師窮逺豈曽聞影孤不踏瑶池月氣逸將陵玉宇雲首買千金來駿骨隊分五色雜龍文同州沙苑春風早豐草烟青牧養勤驕姿不肻向人嘶逸氣稜稜迅歩遲寳勒緩牽芳草雨錦韀輕汚落花泥九衢風掉青絲尾萬里雲生碧玉蹄妙畫只今神變化龍光夜夜貫文奎寄四弟子彰巖溪溪上吕家林廬墓年來宰木深雲冷九原今古恨月明千里弟兄心白鷗眠渚閒馴性黄鳥迎風送好音為問東籬叢菊在相思幾度動清吟程母朱氏亢節守志夀躋百嵗李雪菴為書夀樂堂崇節堂六大字以昭山窓先生之遺澤二子白玉君玉復扁其樓曰朝陽曰拂雲其孫成得請予記之乃詠次四詩云夀樂堂夀樂堂中白髪親生存强健百年身嫠居月苦青帷夜笑語風和綵服春諼草欣榮衛國詠大椿憔悴漆園人雪庵字畫題華扁射斗虹光筆有神崇節堂崇節堂中婦徳全豈期偕老不齊年蕭蕭白髪青霜肅耿耿丹心白日懸身比瓊瑶應共粹志如金石自同堅玉堂肻與書貞節史筆當今繼馬遷朝陽樓朝陽樓外楚天東霞捧曈曈曉日紅弱木金雞飛翐翐茂梧丹鳳語雝雝闗弓后羿留孤轂緩轡羲和御六龍下土小臣仰餘照四時佳景駐春融拂雲樓拂雲樓外萬竿齊直榦森森接漢低春雨百年龍未化秋風五夜鳳來棲渭川波漾清隂轉蔣逕雲拖翠色迷昔日凭闌今逺去詩成幾度寄留題九日遊慶夀寺出遊九日訪招提歩屧秋風信杖藜聞有紫㽔芝産秀想多黄蕋菊開齊閒官真隠陶彭澤内史清名王㑹稽老衲已無心跡累自慚待漏聽朝鷄偕胡伴讀訪繼上人偶逢嘉節試同遊古刹黄花九月秋蓮社陶潜應有約茰囊桓景不須求乾坤容我襟懐壯光景催人嵗月流為問麟經家學在相期二老紹前修為訪髙僧浣俗縁黄花香寂晚秋天杜公詩句稱支遁韓子書辭慕大顛嗜酒許開彭澤戒喫茶應悟趙州禪法華讀罷心如水方丈香浮一篆烟二月二十日得家書喜得平安一紙書欣然頓覺客愁除四千道路雲山逺六十年華雪髩踈肻羨腰錢騎有鶴不須彈鋏食無魚丹心報國忠誠在老我王門日曳裾三月一日夜夢歸家十年宦寓在天涯此夜徐徐夢到家形幻春風輕栁絮神清寒雪瘦梅花歸心未逐河邉棹旅思頻驚塞上笳依舊黄山千丈月遽遽飛蝶悞南華憶二弟愚兄文學人皆似二季才華世共推旅思何如鄉思好少年那比老年衰江南春雨青燈夜塞北寒雲白雪時杳杳空傳鴻鴈字悠悠長賦鶺鴒詩寄萬松道士程宗吉少年卜築棲稠樹老境投閒隠萬松月白黄山騎獨鶴風清紫府佩雙龍平生物外交情厚異土人間旅思濃何日歸田共還徃秋雲步穏一枝笻春菴楊紀善見子之喜有詩次韻奉賀三首乏嗣承宗亦可羞掌珠喜見瑞光浮家聲有紹惟楊震天道無知只鄧攸賀客每傳詩志喜誇人不用酒消憂他年好紹箕裘業才俊當推第一流津津喜色上眉頭賔主持盃互勸酬有酒何煩説罍恥無錢安用效囊羞應門豈比李泰伯生子當如孫仲謀欲驗寸心窺造化百年春雨長松楸意令與國助租丁自是承宗徳澤馨祥鳯已知生鸑鷟小蟲何必負螟蛉陽回氣候生鄒律春藹芝蘭滿謝庭父子祖孫傳百代此心安用測沈㝠五言排律和吕徳昭春日遊問政二十韻仙家白雲裏水複更山重已化雙飛舄空傳九節笻石函藏秘訣寳劍瘞銛鋒境勝華陽洞形髙天柱峰尋真何處問學隠此情鍾阮肇留遺事劉晨覔舊蹤珮懸青玉鏤丹熟紫金鎔呪法能馴虎輕身可跨龍蟠桃開蓓蕾芝草長丰茸日月同駒隙乾坤等蟻封蓬萊知路永閬苑得春濃鶴老應摧羽魚潜不露喁唐詩存古碣秦爵授枯松樹穴穿飛䑕巖空集稚蜂生涯從澹泊景物自從容頗覺遊多趣何煩悶少悰石香炊飰軟泉冽釀醅醲自有逃名志寜無學古胸踈狂李太白風致郭林宗羨子能行樂來歸日下舂和劉通判贈人刻圖書印韻剪刀知漢篆符刻是秦書磨礪形模小雕鎪字畫踈絶憐新製巧豈識古文餘印白纎痕滅涵朱淡色除售求増貴重貽贈感勤渠素璞剜難就黄金鑄不如傳家稱舊物好古屬貧居經史煩明證篇章任巻舒牙籖標李泌藻翰記盧琚㩦貢玉堂署相隨賦子虛七言排律題醫士朱士良紫陽讀書巻結屋紫陽山下村承家今喜見文孫方抄已積三千巻書讀須窮十萬言緗帙芸香蒸雨潤石爐藥氣散烟昏杏林手種隂功茂雲谷心傳道脉存龍虎煉成能自衛蟲魚註就許重論莫辭此日辛勤力要使他年學術尊又流水淙淙撼石梁紫陽當戸挹嵐光何殊講習居長白自説流傳屬太倉藥品君臣儲滿籠書籖今古積連床螢囊照眼能供讀龍化為人欲問方坐愛茅簷隨月色病思橘井湧泉香良醫良相真何異好拯生民濟世康梧岡集巻三

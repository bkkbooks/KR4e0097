body:
  text: 梧岡集别集類五明提要臣等謹案梧岡集十巻明唐文鳳撰文鳳字子儀號夢鶴桂芳次子少而穎異長益自奮以文學授江西贑州府興國縣知縣改趙府紀善卒年八十有六文鳳宰興國著有政績泰和劉鴻嘗為作賢令祠記見程敏政所編唐氏三先生集附録中文鳳與祖元父桂芳俱以文學擅名時號小三蘇其詩文豐縟深厚刋落纎浮猶為不失家法其五世孫澤撰墓表云先生著述在鄉校者曰朝陽類稿在興國者曰政餘類稿又曰章貢文稿在藩府者曰進忠類稿在洛陽者曰洛陽文稿歸田後曰老學文稿今此編所存者止詩四巻文六巻蓋不逮十之三四矣乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:570bb9cf8f6bfb8491903bfb19c67d49d1172a4ccdb1178d4cd6863d9bc5ba71

body:
  text: 梧岡集卷五明唐文鳯撰序送張都司移鎮大同序永樂二年春滁州衛指揮同知鳯陽張公大器移鎮大同瀕行一時僚屬以公平昔教閲經厯之地曰環滁皆山曰琅琊深秀繪為圖以餞復千豫言豫曰公之才略器識誠無愧於古之名將矣然記曰擬人必於其倫豫嘗觀公之世系而得一人焉宋之張魏公始官熙河遍行邉壘覽山川形勢詢守邊舊法由是悉知邊事又嘗視師江上屯兵淮泗忠君愛國始終一念功烈之盛為中興名臣首今而較之大器淮泗之與滁陽何其地之接也熙河之與大同何其境之聨也督府之與都司何其職之近也茍因其迹而求其心則清河之宗繼魏公之遺躅非公其誰也豫故期公以逺者大者略圖餞而詳魏公豈泛於擬倫哉武夷圖序衡陽為南嶽南方諸山皆其支脈而閩之武夷雖神剜鬼鑿有不得其巧山皆石少浮土其色蒼紺或如登豆或如盂盆或上鋭而中小或面正而背欹嵌嶔而為巖空虛而為洞深為潭為淵髙為峯為巒靈淑之氣物産不足以専之必泄而為英賢乃可當也我齊國文公嘗愛兹山之勝而卜築焉雲谷有草堂滄洲有精舍棹歌聞乎九曲注易存乎一爐遐想平生過化之所一草一木被其光華一泉一石沐其膏馥其留也山雲亦為之喜其去也猿鶴亦為之怨非文公之幸也乃兹山之幸也公七世孫朱公伯善結屋於山麓今官新安去鄉日久浮嵐濕翠不得目挹而手攬之乃為圖裝演成軸以釋其故居之思間俾豫敘於左方豫曰公之圖非慕山也蓋思祖也文公之道與山同久文公之名與山俱存觀山則儼乎若厥祖之著存於心也然則公不惟觀乎山而惟思乎祖乎詩曰無念爾祖聿修厥德公當持身修德以繼其家聲圖畫云乎哉遂書而敘之吳氏族譜序氏族者古史官之所紀録故司馬遷父子約世本修史記因周譜明世家厥後唐太宗詔髙士亷等作氏族志宋歐陽文忠公依漢年表為世譜姓氏之所出其來逺矣家之有譜猶國之有史也史立法簡嚴非殊勳偉績穹爵盛名則略而弗書譜載事詳明為子若孫茍其祖父一言一行之懿惟恐或遺然則家譜者所以佐國史之不及也嗚呼譜牒之不修也久矣汾陽四世而冒認黃渥七世而復合則知姓氏之所自出皆係於譜而不可以不修也星源富坡吳氏為泰伯之裔傳世八十有九粲然如珠之就貫整然若鴈之列行先後有倫小大有序昭穆之名支派之衍可指而易見也蓋由梅巖翁用心之篤能因其舊譜而重加訂正詢諸耆舊稽諸載籍旁搜逺引上接下基無所漏失可謂勤矣昔梅巖之長子尚友常徵我先君白雲翁序之今尚恭又能因其父梅巖之所修而求儒林名筆以繼父之志以顯祖之德而傳示於無窮者亦可尚矣嗟夫世之人肯構不能肯堂前橋不能後梓矧若吾尚恭父子同志而能以尊祖敬宗之心為心俾後之子孫知祖訓之是式祖德之是徵則修身慎行無沗所生豈不由兹譜之存歟詩曰無念爾祖聿修厥德序以辨於卷端云龕巖十景詩序龕巖去治之東十里許按越國公家傳即公講學所也山亘石無土少草木間有小木垂羅雜草一皆托根石罅而生冬夏亦不枯地氣稍寒日光所不照雖盛暑隂風凄然巖形穹窿谽谺中空洞可容數十人兩山開列橫濶五尺許澗水中出清徹寒碧近巖底水激射深不可測自源口披灌莽小徑縈紆回折至是以小舟筏渡乃可到巖前有石坡二鐫鑿纍級若階梯然登坡至巖架以危橋步之搖兀下視深壑無底使人目眩心悸巖下有石形覆而長類舫有潭形圓而泓類甕有泉交互流注若索有峯森鋭特出若笋飛流直瀉者瀑布危峯排列者筆架神鯉帶鐶令公所放生刳石試劒令公所遺迹供佛有剎讀書有巖此東龕之十景也豫嘗讀唐史列傳宰相世系表越國公名紹京魏太傳鍾繇十七葉孫多蓄墨迹工書唐之宫殿明堂九鼎皆公筆也後以平內難功拜中書令封越國公迄今七百餘祀其苗裔蕃盛遍溢於江右郡邑嗟夫公立志之髙嗜學之篤乃能探幽處獨違世絶俗故得抗其志成其學收其駿功流其令聞蓋一代偉人也豫宰興國三年景慕前修嘗欲一逰而未果今丁秩滿事隙公裔孫耆儒鍾子常重飾公遺像留庋巖中請豫尋訪復干賦十景詩以傳於後豫喜而賦之同逰者長史張彥通也靈山二十景詩序南嶽衡山在古荆州之域周回二千餘里屹然七十二峯而江南之山皆祖於衡嶽也騰踔起伏盤旋拱揖如龍形之矯矯蟲足之跂跂虎踞而蛇行鳯飛而鵠立千態萬狀竒勢異蹤莫可窮詰延袤綿亘突起而為崆洞之山在古虔之封為江右諸山之祖也聚而為府治散而為屬邑支縣脈貫乍隱而復見欲斷而更連踴躍走五舍駐於興國縣羣山外環平川中豁據震艮之位有靈山焉兩崖壁立夾水為澗小徑縈紆羊腸九曲俯卑而窺髙穿深而度密是以層峯疊嶂其勢嵳峩而嵌嶔頑石懸崖其色蒼紺而黯黝怪特詭祕神剜鬼鑿心駭目眩並難名狀也尤難摹寫也不知天造地設鍾英孕秀於是厯幾千百載矣山多勝景莫能殫述而擇其顯著者得二十景自山之麓至其隩沿途多松清隂覆苔類引行人曰引路松於半坡翼以一危亭白雲吞吐隘若關險榜曰雲關亭入源口當寬夷處峯回水繞原田古木題曰碧環亭傍隂崖下纍石為龕厭世長逝火浴風化號曰化僧亭近寺有橋橫澗有屋庇橋夜月姢潔秋波澄徹名曰水月亭竒峯五各以形肖名左蹲伏獅子草生石面風吹冉冉猶毛披然右峙垂象鼻煙抹崖頭霏霏漠漠猶氣噓然圓而仰者香爐圓而覆者鉢盂鋭而長者石笋玉珠有泉懸流點滴如珠在貫疑鮫人之泣也仙女有潭竅石空通如壺注水知龍公之宅也有二巖虛洞類屋範金為觀音像庋置其中危峭百尋必釣繩以引則人可到也劓然欲睡隱然欲伸石曰伏虎使李廣卒遇之則射而沒羽也偭規而就矩稟地像之形扶疏蔥蒨為方竹林厭紅而棄青鍾商皓之色秀異姢淨為白蓮池𢎞敞其門不二於道揭以歸一隂翳其洞不褻於暑名以芭蕉阽危架險有橋幽幽浮光㴠影有池湛湛此勝景之得名而可詠可述也豫叨承上命出宰斯邑庶務叢脞臨政無暇固不可效昔人逰山飲酒賦詩而廢事也嘗聞韓子留華隂登山陘而覽眺栁子居永州記山水而逰適然則古之賢達未嘗不寄情於山水景物攄幽發粹搜竒抉隱見於文章以傳於後世豫雖不敢繼韓栁之聲光至於吟倡記著亦竊有志呫呫然動其喙矣奉陪府判周公同逰命豫即席賦二十景尋陪知事黃公再逰亦有題詠三年春南安大庾邑庠生蔣文學留斯邑知其勝特欣往焉豫不與俱而録豫詩囑工畫者圖之復徵言以序之誠愛兹山之勝兹逰之樂欲久而弗忘也故不辭而書之息馬觀書圖序古之名將息馬論道投戈講藝故能立功勳而銘彛鼎留聲譽以書竹帛若萬人敵百夫勇固足以叱吒風雲戰勝攻取而赫然一時矣然不學無術或利心勝而不知所以慎其始或驕心生而不知所以善其終往往取顯戮以為天下笑幸而免焉亦君子所羞稱嗚呼道義不明尚功利而矜詐力知此者鮮矣新安衛鎮撫王君仲禧性敏好學蒞職以來簡閲士卒融之以恩臨之以政糧餱充足鎧仗鮮明時論稱之嘗於暇日闢小軒蓄書畫數會賔友討論經史探研韜略玩理以養其心集義以養其氣乃命寫所居之景為息馬觀書圖謁儒林之士吟咏之屢徵一言以序其端遂告之曰文武豈殊途也自薑武成王著書立言世以隂謀目之然未嘗不以仁義道德為説丹書之訓凜然王者之師其垂名宇宙而百代尊崇者不獨為兵家之祖實以敬怠義欲之戒允為心學之宗也張留侯之所授受李衛公之所問對皆得其糟粕耳亦足以開漢而興唐至於綸巾羽扇指麾三軍如武侯者靜學之妙超然心得則庶乎近之矣此所以為三代以上人物也嗚呼夾谷之會吾夫子謂有文事者必有武備然則介胄之士固當以仁義為干盾而章縫之儒亦豈可諉軍旅於未學而遂厭之哉今仲禧息馬觀書作圖自礪將見造詣日髙涵養日粹才略日充事至而不惑功成而不居詩書謀帥者必不能舍之矣故序以歸之俾書於圖之左方以俟題端孝思草書引往年豫成童時常造棠樾鮑氏之南軒石泉周先生講道於是執經坐上座者有端氏二子焉其尊府君以善公為徽郡幕賔以方正亷能稱愛子使之勵志於學長孝友純粹篤厚次孝思聰明才俊豫雖未解事心竊識之矣弟昆嫓美殆猶機雲入洛璩㻛在魏也厥後侍宦遊江西留南京一時諸閣老相與磨切學益進名益髙信乎其為儒林之英也邇來寓清江杜門息慮肆志翰墨人購其片紙隻字藏以為寶豫友汪致達伏謁門下求得是卷豫屢觀之有存筋藏鋒之妙有驚蛇迅鳥之勢體備諸家筆兼衆長闖芝靖之庭入羲獻之室至於旭之顛素之放可以嗤笑也翰林危公太朴嘗評之曰端孝思書如謝家子弟自是芝蘭玉樹光彩照人懸腕之法世能者稀俯仰古今不覺専擅其相推重如此亦可謂知言矣昔陳無已送蘇長公有一代不數人百年能幾見之嘆矧豫與孝思幼雖心知長則契濶相隔千里莫獲一見而草法為當今名筆捨吾孝思幾何人哉宜區區之嘆有甚於無已也其慕藺之心益增耿耿耳豫故厯敘其概畀於卷首俾永葆之以傳示於無窮也御製歙人鮑夀孫孝順詩序臣聞孝為百行之原天之經地之義民之行也是以通三才序五倫孝之道大矣上古帝王惟虞舜稱為大孝以聖哲之德化頑嚚之親下至武王周公以達孝稱洪惟我聖朝太祖髙皇帝膺龍飛九五之運臨御華夏以孝動臣民俾家為孝子人為忠臣比屋可封蓋所以移孝為忠以盡臣子之職分而無愧唐虞三代之治矣欽惟太宗文皇帝應天順人紹承正統能以太祖之心為心克篤純李而聖德神功巍巍赫赫極天所覆極地所載洋溢周遍浹洽寰區乃於孝陵建立穹碑國史纂修實録皆孝誠之大者也萬機之暇博采古今孝順事實親書宸翰撰為詩章得二百七十人版行於世頒賜臣民以為昭鑑示天下取法焉而歙人鮑夀孫亦蒙褒寵臣按宋史孝義傳所載鮑夀孫與父宗巖當丙子之變盜起里中父子俱被執願相代死賊猶豫未忍殺俄有風起叢薄間若車馬聲賊疑官軍至皆走散父子俱得免人以為孝感之報遂稱為慈孝鮑家今大明聖朝又沐御製頒示四海臣民以為矜式猗歟盛哉光賁泉壤澤及九原抑何幸歟嗚呼天人之理報施之道猶合符節無毫髮爽當其父子爭相為死一念之萌動天地感神明而秉彛好德之心古今一揆是以承兩朝之恩寵百世之光榮為不可及矣昔其曽祖鮑仲安翁於元時宋史新成厚資購之裝演成帙以遺其祖南季藏為家寶今其孫榮相又抄録御詩成集以貽永久亦可謂能紹祖宗之傳而不忘先德矣嗚呼賢哉臣以四朝遺老賜歸田里恭覩朝廷之盛典由是不揆愚昧而效揄揚頌美之萬一云贈進士童孟韜興復朱文公家廟序道之大原出於天天不愛道而賦於人任斯道者寥寥數千載幾何人哉自孔孟歿而斯道不傳至宋周子出不由師傳而獨得於天二程子承緒而倡明之一傳於羅豫章再傳於李延平三傳而至我朱子集諸儒之大成繼往開來大有功於斯道也徽婺源有方山繡水之勝乾坤清淑之氣所鍾篤生賢哲而為朱子桑梓之邦昔韋齋吏部尉尤溪而生朱子于尉廨遂家於閩婺源故居鄉人敬慕久而不忘乃為立家廟於遺址而祀其父子焉由宋逮今興廢不常當元盛時干侯為州飾廟宇虔祀事而歙人鮑仲安捐資贖田歸之廟虞文靖公記之此一興也洪武間豫與其裔孫汝達勸率闔郡官僚士庶捐資重修此再興也洪熙乙已朝廷以纂修實録選差進士童公孟韜採訪永樂事迹以成國史之紀述公厯婺源謁拜家廟棟宇橈折瓦甓解散上漏旁穿不蔽風雨顧瞻傍惶乃謂衆曰朱子之道如日行天後之人誦其詩讀其書可不知其人乎於是邑之長佐耆老儒士感發趨事撤而新之規制踰舊跂翼翬飛城市改觀溪山出色而朱子在天之靈神遊故國必當隂翊默相而文運之興可待也其有功於名教何如哉豫雖老於公之行也竊為吾黨致謝私焉是為序東臯十景詩後序晉陶淵明為一代清節之士嘗曰登東臯以舒嘯又曰種苗在東臯夫東春方也臯春澤也大抵人情樂氣候之融和景物之明媚故適興者必於是力本者必於是而淵明之清趣則殆超塵寰而獨立矣廬陵郡城東北之地有東臯焉負山而瀕水峯巒之峙列林木之薈蔚洲渚之縈回湖江之浩溔春秋朝暮之異時風日雨雪之變候仙宫釋廬之雜處寒花涼瀑之分秀誠幽人逸士之所擇而棲樂而逰隱而耕者也好事者從而名之以十景焉張思恆氏築圃結樓以攬其勝於是賔客之宴會士友之遊息殆無虛日而所謂十景者可眺可玩可歌可咏徜徉容與寓興其間而心與造化謀蓋將遊廣漠之野而之無何有之鄉天壤之內有此真樂而思恆獨得之矣嗟乎有此宇宙則有此山川有此山川則有此人物浩乎已往茫乎未來茍不托諸文章形諸篇什則何以彰今而垂後耶淵明諸作迄今令人歆美即其地感其景讀其詩思其人裴徊俯仰有不可及之嘆昔蘇長公以東坡自號而盡和陶詩識者謂淵明千載人東坡百世士出處雖不同氣味乃相似思恆振遺音而紹絶響使二公之髙風不落莫於千載下而東臯之景益增其勝顧非山川之幸歟豫因思恆請既序其槩復書十景詩以綴於後竹坡詩序海寧之東有地曰首村環山外拱平原衍沃朱氏廬聚於斯其彥德升甫新闢一軒以為藏修之所軒前有坡隆然而昻偃然而伏種竹數十百箇因以竹坡自號其子澤童以俊茂充弟子員從豫姻友吕德昭遊德昭為致其父命以徵豫言豫曰竹草木類耳天地間萬彚藝藝可喜可玩者非一而何獨竹是嗜德昭曰吾嘗登坡而飲刻竹而吟與聞其略矣時雨沐之萬枝翠色則四時皆春曉風吹之萬葉清聲則四時皆秋天地之春成功已去而一坡之春未嘗去也天地之秋循序已歸而一坡之秋未嘗歸也朱氏父子嗜之固宜豫曰春容可以寓目秋聲可以適耳不過耳目之娛而已更有進於此者乎德昭曰德升進學不倦而澤童日受庭訓以竹自警見其材而思何以達吾材見其直而思何以成吾直見其虛而思廓吾量以大其受見其操而思勵吾志以貞其德殆非徒為玩好也豫曰是可與言學矣衛風淇澳之章詩人形容武公之盛德必起興於菉竹之猗猗聖人取以為經而大學引以釋傳德升父子茍能切磋琢磨以進於瑟僴赫喧之美則竹坡之名一日聞天下而傳後世顧不偉歟澤童將求儒林善於比興者歌咏之豫為再歌此章一倡三嘆遂敘次所言以辨於卷端云城東許氏族譜序夫混沌既判而兩儀奠位人生其間參為三才以立人極當夫人文初開生齒未繁而姓氏猶簡惟有六姓伏羲姓風倉頡姓髙祝融姓龔神農姓薑黃帝姓姬太子雷姓方繇三代以降人文日宣生齒日繁天子建德因生以賜姓胙土以命氏有以帝王名號為氏有以王父字為氏有以土為氏有以國為氏有以邑為氏有以官爵為氏有以鄉亭為氏有以伎物為氏有以因功而賜姓有以外域部落而為姓有因過因事因刑而改有避諱避仇避難避嫌而改其區分類别不可勝紀而所謂以姓以氏以族者蓋有不可不究者焉夫姓之為言生也氏之為言示也族之為言聚也生者原其所出也示者别其所同祖也聚者會其所同類也厯三五以降至於漢之西京金張許史四大姓為貴戚而許氏居其一也下逮唐太宗貞觀年間命髙士亷等定天下姓氏為族氏志合九百七十三姓及唐玄宗敕定四海望族永徽六年乾封元年考定十姓為國柱十六姓為國梁而髙陽許氏又為國梁之一也逮我皇明太祖髙皇帝時翰林編修金華吳沉進千家姓凡為一千九百六十有八頒行於世而許之為氏蓋自許由始傳至周武王封炎帝之後文叔子孫以國為姓至唐太子少師敬宗開郡髙陽傳十一世規公嘗羈旅宣歙間始置歙城東基宇往來寓焉其孫會公因家於是卒葬歙南浦口金叉塢其曽孫賔公遷歙北寧泰鄉因名之曰許村厯九世孫七公宣義諱暹復居城東故址又傳七世孫淑明公才行卓犖鄉里推尊郡人以八百年故家稱之其孫永亨永禎二昆季克紹先志乃取舊譜質諸懿親東源張本立重加録集蘇明允所謂詳吾所自出也一日永亨來徵豫序豫聞周禮周官小史定世系辨昭穆後世譜牒之學以為專門古者大宗小宗之法立則世系明昭穆敘自宗法廢始有不明不敘而先王之制盡矣嗚呼此有識君子嘗痛惜於斯焉今永亨之編尊祖敬宗而有志於睦族不忘水木本源之誼亦可謂賢矣使其子若孫知祖德而景慕之心油然以生益思修身慎行以迓先世之遺澤則所以增光此編者固有在哉詩曰毋念爾祖聿修厥德惟許氏子孫有焉故序其古今姓氏之始及本宗之世緒以綴於編端溪居圖序歙西堨川其山自靈山之麓踴躍騰踔危坡伏隴舒而為平原衍而為平疇前㵼大溪水漲則洪濤噴薄水縮則微波縈紆春則鷗渚瀰漫秋則鴈洲呈露紅蓼白蘋之掩映青莎翠蓧之扶疏白魚跳雨翻藻而遊泳黃鳥囀風擲栁以下上天光雲影之徘徊嵐氣山色之杳靄輕颷旋而練帶皺霽月浸而氷壺空樵艇之迹相交漁歌之響互答坐苔磯而垂釣臨清流以賦詩此溪居之景可吟可咏可圖可畫天然之趣也豫老友朱士澤居之専兹溪之勝而樂其樂焉司訓鄭以孝寫圖以遺之王維之輞川莊李麟之龍眠莊殆相為伯仲也暇日士澤訪豫三峯精舍擕卷請敘豫聞古之髙人逸客逃名遁迹必擇幽邃之地竒絶之境而托處殆將出寰中而超物外忘身忘世忘人忘我不知千古之在前萬古之在後如生鴻蒙之世而居逍遙之天無懷氏之民歟葛天氏之民歟嗟夫杜子美之浣花溪嚴武載酒戴安道之剡曲溪子猷乘舟張玄真青箬緑蓑林和靖寒梅白鶴若士澤其神交四子而異世同心也歟豫乃為之歌曰天髙兮蒼蒼地厚兮茫茫俯仰兮中處嗟若人兮壽且康娛心目兮引興長溪居之樂兮樂未央無不足兮奚所望溪流兮湯湯溪花兮幽芳朝夕兮尚羊栖吾身兮水雲鄉悠然一醉兮傾壺觴叩舷髙歌兮鏗清商鷗瞑鷺下兮機心忘忽驚起兮競飛揚蓬底夢熟兮秋夜涼夢覺白鶴兮方南翔皎皎月明兮生東方歌竟士澤撫掌大笑曰蘇仙騎鯨其音久絶響矣餘風未泯復得再聞遺韻遂俾豫揮筆書為序以附於卷云宣德四年巳酉夏五月朔八十三翁唐子儀書梧岡集卷五

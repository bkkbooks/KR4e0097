body:
  text: 梧岡集巻六明唐文鳯撰記大牛山龍湫記歙北距城可二十里有山曰大牛或曰大人其形類人踞坐而首欹側重岡複隴騰踔起伏而兹山獨巍然髙以大山之半去麓二里許有石巖空洞深杳泉㳙㳙自中出冬夏不竭巖之東百歩有澂湫水寒紺清澈龍實居之每遇久晴則龍現鱗甲光彩耀日或掛樹或蟠石須臾雲氣勃起如翻海濤羃於山頂則降雨值積隂滛潦暝雲乍收山色蒼然則歛霽以故居民常以候晴雨凡嵗旱則官民致禱輙應無愆期洪武紀元之三十年夏歙土久不雨亢陽為虐禾甚枯瘁農告病於是坊廂之耆老呉仲逺金得逺等以祈禱故實白於府若縣縣令李公彦初憫農之罹灾迺與僚佐謀達於府通守楊公永傳謀克恊諏日走詣羣祀縣令李公率僧道徒歩登陟詣龍湫焚香掲䖍撇水盛以瓦罌俄有物肖蝘蜓投罌中以皷吹導抵壇所則涼風瀟然微雨隨至厯三日大雨滂沛逺邇沾足甦稿為榮易荒為稔農以有秋慶咸以為聖恩溥𫝊而亦感神龍之嘉惠也不可以無述俾綴文以記之余曰夫山川之能興雲雨其神必靈而祀典當祀之兹山之神既靈而又有龍神托處於是則其神異靈顯可知矣故變化不測茫洋乎兩間雨下土而澤萬物其功普矣而利及吾歙之民厯年滋久而祀以報之亦宜所以刻文匪干禁而美政也俾後之人知龍湫之神而且靈永而勿替庶有可徵此記之所以作也巖谿書舍記歙西之山多秀拔而竒峭其支壠餘阜亦皆騰踔起伏萃英凝粹扶輿磅礴之氣鍾於人焉其諸山之可名者黄羅金紫若馬鞍若筆架若飛蛾若平几又溢其秀獻其竒為古巖石屋空洞神剜鬼鑿不能殫其巧為巖谿源泉淵深練澂鏡净不能比其清當巖之左谿之右中延通衢直修而廣夷坦而袤編氓托處連甍接棟工藝居於是器用之精緻商賈集於是財貨之委輸鎮市立焉稅司在焉而文獻之宗詩書之家有左史竹坡吕公午伯以文章行義大顯於宋理宗朝而其後裔有名旭字徳昭以儒術世其業幼從予先君子白雲翁逰工詩能文以郡庠司訓授陜西延長縣學教諭予第四弟文奎字子彰幼贅于吕氏之門而徳昭愛之甚以其能讀父書性警敏而嗜學也予以宦逰南北奔走踰十有八載矣甲午夏子彰以能書徵赴吏部而予亦旅寓於秦淮之上始得㑹晤少慰暌離之懐間語予曰弟也有豚犬六人俾長穉留吕家林之居而於巖谿之濵買地卜築為屋六楹迺於宴休之所扁曰巖谿書屋願干吾兄一言以記之予喜而語之曰予宗自始祖諱承昈扈從宋髙宗南渡因官於歙至登仕公來世守忠貞家傳清白以仕宦稱以文學顯而書燈相續十有五世矣至今餘燼未滅後必有以接其光而煒然燁然者也而予弟之書屋經史子集庋置其中法書名畫陳列於前暇日則授徒訓子從容乎禮法沉潜乎仁義明周孔顔孟之統尋濂洛闗閩之緒探性命道徳之奥窮天人事物之理究古今治亂之原學必實學知必真知行必力行然後毋負於家學而稱世儒也況生於子朱子之邦涵濡其遺澤浸潤其流波而予祖筠軒翁講貫其學服行其道而予父白雲翁纉承而繼述之鑚䃺而瞻仰之自有以得其要領者矣愧予衰老猶駕㫁航而泛巨海望洋而不知其涘予弟年尚壯力尚健其於朱子之道祖父之學當升堂而嚌臠也則書屋之名必顯於時也而晉昌之子孫葢有徴者矣用書以為記而置諸堂之壁文㑹堂記夫在天之文曰月星辰也在地之文山川草木也在人之文禮樂刑政也貫三才而不息亘萬古而不窮彌綸乎宇宙炳耀乎古今文之與道三極並存於逺矣故曰言之不文何以行逺是以人心之精微動而宣於言言之精者為文文之精者為詩夫六經載道之文其理醇而正諸子翊道之文其理駁而雜孔子曰君子以文會友朋友之際盍簮之頃非文無以輔友道之益也予家世居表城門内以儒業顯翻學海之波瀾傾詞源之浩瀚而予先祖筠軒翁以博學有重名於世當世若虛谷方萬里杏庭洪潜夫一時輩行相為師友彼我推敬日月刮磨以講聖賢之道此前時之文㑹也先考白雲翁掌教崇安當時寓公諸老若左丞烏古孫良禎幹卿侍講杜本清碧秘書彭炳元亮朝夕㳺從相與議論古今盛衰人物賢否政治得失清流之士咸歸譽之此後時之文會也予叨薦剡授縣令之職考滿欽選改除王府宫講得與在朝諸名公碩儒締交若翰林學士王達善楊榮王景彰國子祭酒徐旭侍講楊士竒狀元曽棨輩詩文徃復𢋫酬倡和殆無虛日此今時之文㑹也予留滯潞陽近䝉天㤙賜歸田里而從姪彦清得翰林編修李真為篆文㑹堂三字装演成軸求予文以記之予追思吾祖考以來暨予厯三世将及百年皆名其堂矣而彦清不忘先徳復取舊名以扁其新居亦可謂有志於繼述矣予故詳記三世交逰文㑹之盛録其姓名俾後之人知所聞見而家學之傳淵源有自矣彦清之子道生頗聦敏好問學暇日編集筠軒白雲朝陽祖父及孫文集以傳於家庶使先世精神心術遺澤不泯亦云賢者矣迺併及之而書以為記重建大和社記古昔帝顓頊之子勾龍氏能平水土九州奠安祀以為社周祖后稷教民稼穡萬姓粒食祀以為稷禮所謂有功於民則祀之此其大者也歙之棠川鮑氏之宗居之風俗淳厚談詩書恱禮義人人有士君子之行當宋季之俶擾盗起里中執鮑氏之父曰宗巖者將兵之其子夀孫出而救之子願代父死父願代子死賊義而兩釋之人稱慈孝鮑氏事載宋史里以慈孝稱亦由是焉鮑氏嘗率里人建社於髙塘充地形散漫風氣䟽泄民居弗靖洪武壬申衆謀移建於棠川之村口而其地則慈孝之四世孫汝欽五世孫必成兩家之已業也族衆於是踵門告曰子之先世嘗有功於民子誠不忘先徳以已地為社神之居俾里民徼其餘福可乎汝欽必成咸諾之於是繚之以垣墻峩之以屋宇風氣完固居民阜康衆悉宜之且以其族之鄉先生曰仲安曰伯原曰伯尚者昔嘗立社倉以濟貧乏保民於患難者其功為多又嘗舉鄉飲酒禮以孝弟禮讓化率鄉人足以垂訓因附祀焉於是其族之人有字尚賔者遷居北鄉有年矣覩兹而有感焉乃以其故鄉遺田一畆半俾宗人均其稅而收其入禆祭祀之用以表不忘所出越今四十年屋壊壇圯無以稱報祀之意其宗人有曰文紹者復率族衆經營斯宇規模壯觀視舊有加焉僉謂事之顛末弗刻堅珉何以示後乃礱石徵予文以記之昔唐韓愈有曰願為同社人鷄豚宴春秋又曰古之鄉先生歿而祀於社何昔人之存歿皆注意於斯豈非盛典所繫為衆姓之所慕歟所以後之君天下者立國社國稷推而至於鄉里或千家或百家或三五十家共立社稷以祀享之春有祈焉秋有報焉當事之際必備牲醴列庶饈􅅹誠掲䖍以致敬於神毋敢怠忽葢為民生之敬仰出於至誠此天理民彛不待勸勉有不期然而然者矣今鮑氏代不乏人乃能始終追念於斯既有以崇報功之典又不忘鄉先生之徳俾後人知所法式是可尚已乃不辭而書之西溪漁隱記新安之為郡據兩浙上㳺而練溪環繞郡城㴑其源分為𣲖者三一始於揚之水經硃砂崖匯於績之油潭直瀉如練而抵於城東一濫觴於篛嶺流為昉溪潴為釣潭而任公釣臺在焉縈紆曲折横於沙溪而過城之北一湧於湯泉之池迤邐注為曹阮二溪淵澂於昌堨潄石漾沙道石門嶺聚為龍王潭蕩潏於城西門三派合流平衍渟􅀈是為西溪土人謂之河西伴月之灘導其前披雲之峯矗其右漁梁横截於下雉堞峙立於上此西溪之勝槩也而巴永昇氏世居之永昇為人性識聰敏雅好山水而躭於畫嘗得李唐所寫溪景装演成巻題曰西溪漁隱徵予記之予考李唐為馬逺師其畫蒼古渾樸無纎巧態迹簡而意淡葢名筆也永昇固宜心其法造其妙以進於髙明之域而西溪之景則天然之畫有不待毫素可知矣風晨月夕駕一葉之舟青篛緑蓑筆床茶竈舉以自隨或吮墨以畫或鼓枻而歌天壤之間有此真樂而為永昇得之其托於漁豈暫隱乎抑終隱乎予以為人才之生也以有用之才置之不用之地不可方今文明至治之世有起渭濵有召嚴灘而為國家之用豈徒若志和魯望之老於煙波者而後為可尚哉然則吾永昇其得終隱西溪歟菊軒記天台之山其竒秀甲天下而臨海之在天台為壯邑其地有丹邱而林氏世聚族居焉有字宗誠性聰敏雅好墨菊每當風日晴美臨池清興揮毫㸃染輒為菊寫生如坐東籬俯幽叢把踈枝而餐落英對酒長哦悠然見南山之秋色也嘗寓居潞陽留十載矣構小屋三楹偃仰宴休於其間焚香静坐心與神融意隨景適老圃秋容寒香晩節而丹邱之人猶彭澤之士也間與予胥晤於旅舍知予業觚翰欲干一言以書於軒楹予聞濂溪周子謂菊花之隱逸者也當其秋景揺落百卉憔悴而菊猶浥露傲霜踈花冷蕊精神恬澹香色清雅不媚於陽和寂然而孤芳誠有似於隱逸不衒於俗而遺於世也宗誠寓意於菊殆猶相馬於驪黃牡牝之外聽琴於髙山流水之間不以形色求當出於筆墨畦疃之表而觀其思致風韻耳昔人有號菊庄者有號墨庄者今宗誠以墨庄而處菊庄也則菊之佳趣墨之清致俱得之矣遂書以為記梅雪軒記新安衞百户侯安莊存敬卜築東城之隅髙明爽塏市喧不雜雖闤闠而有山林之氣象迺營小軒扁曰梅雪徵言記之不獲辭迺告之曰天地間萬物並育莫非隂陽二氣之所為然得其濁者恒多得其清者恒少在天而有雪之清在地而有梅之清在人而有心之清故心清則理明理明則義精義精則仁熟而施於為政也何有想存敬居是軒閲武之暇解鞍下馬裵回容與雅歌投壺所謂詩書之帥也時當嚴冬老梅著花霏雪呈瑞素色寒香溢目逆鼻恍如氷壺之秋月金莖之玉露憑軒一玩乾坤清氣沁入詩脾不知人之與梅雪梅雪之與人孤標雅趣果有二乎哉反而求之觀梅可以畫卦映雪可以讀書吾儒心學具有成法如吾存敬出其緒餘則當効梅林之止渇雪夜之平蔡追蹤古之名將銘彛鼎而書竹帛也顧不偉歟是為記永和堂記歙之檀墅黃氏世居之其彦士逺甫貲甲於鄉而能以善自處憲副胡公永成為大書永和以名其堂君次子文定介張生惟達徵文以記之予留滯南北踰三十載歸而故鄉老成凋謝殆盡士逺雅與予善亦不可作矣俯仰今昔䀌傷懐抱誼不獲辭迺繹名堂之義而語之曰天地和則萬物育朝廷和則百職理家庭和則五倫序和之義大矣哉君子之徳猶太和元氣煦燠融盎春意藹然盖必永久而不渝則形和聲和理和氣和而天地之和應矣嗟乎士逺已矣二子文器文定友恭怡愉家聲益振蘭茁三孫俱清俊可喜雅稱其家兒如海上三珠樹河東三鳯雛人咸愛慕之和氣薫蒸將見木生連理地産靈芝以表瑞慶而黃氏之隆盛未有涯也豈非永和之所致而能然歟遂書以為記觀瀾軒記歙西之沙溪雙橋鄭氏世居之有字彦徵者讀書君子也其上世從髙祖鄭安子寧當元初有全城功民徳之為立祠及元季其從曽祖鄭玉字子美構師山書院講明道學以翰林待制徵辭不起國初主將要致不屈而死事載元史節義傳此其世徳之懿有自來矣彦徵隱居授徒訓子優㳺卒嵗以樂其樂其暇日危坐於沙溪之上有橋幽幽然有舟泛泛然静觀流水之湍激而悟夫聖人之道大而有本也以其自得之趣而扁其讀誦進修之室曰觀瀾軒嘗俾予友趙永敬氏徵予記予躍然以喜作而言曰孟軻氏謂仲尼亟稱於水水哉水哉何取於水也川上之嘆言道體之無窮也源泉之論言道體之不息也瀾雖為水湍急處然大波洄旋小波縈紆而紋生焉大則如怒蛟之騰身小則如閑龍之蹙麟飛濤則如傾驟雨噴沫則如㵼驪珠千態萬狀不可形容至其平波漫流如横練帶如鋪織紋乃天下之至文也予想夫彦徵之於是時静而縱觀閑而細玩心地虚明必有所感悟而為進學之助也察聖道之精微闡人文之要妙不亦美歟易曰山下出泉䝉風行水上渙當合於此而觀之可也故書以歸之而置於軒之楣是為記槐隂堂記昔宋元之交也予大父由城南遷居槐里而故相程公元鳯之子孫遺老毎叙文㑹之樂焉人物之純龎禮儀之古雅衣冠之俊偉葢非他里所及迨予之長也其餘芳流澤猶有存者予故見之矣永樂庚子夏予留寓潞陽丞相之族孫有曰辛童者予孫婿也晉謁旅邸再拜告曰愚侍祖父於遺基創屋數楹以為奉先裕後計而扁其堂曰槐隂公邃於文學兹行茍不得公一言以暢厥㫖何以詔後人而傳於永永幸毋吝予不果固辭嘗聞蘓子之銘三槐堂有歸視其家槐隂滿庭之句子之名堂殆祖述於此也歟姑舍王氏以程氏論之二太師之為祖為父丞相之為子為孫與王晉公之祖父子孫時世勲業葢有不盡同者然世徳之相承忠孝仁厚之流衍其心未嘗不同也嗟夫種槐者非槐也乃種徳也以一寸之根荄委之於地而欲責報於天其可必乎心之藴仁者深植徳者厚而天報之以福也必矣槐之蓊然欝然猶吾徳之油然沛然徳有類於槐槐有徵於徳所以槐隂滿庭則可以知其徳之盛也夫嗚呼程氏之世徳當培而延之如土地之益厚如雨露之益潤則久而益榮矣茍不本於徳則槐之榮瘁於人何與焉詩曰無念爾祖聿修厥徳辛童勉之則名堂之義得矣而天之復興程氏子必有望焉是為記臨清軒記予倩汪宗純謁予於秦淮寓舍告曰不肖祖居之左偏喬木蓊然清池湛然新搆小軒以為宴坐之所而扁其楣曰臨清願吾翁丐之以言俾朝夕讀之如親受教予喜而語之曰夫天一生水為氣之始自質柔而生也及其䝉泉在山静而清也節澤有水過而溢也静則止溢則流其止也為坎為澤為沼為池止斯清矣其流也為湖為河為江為海流斯濁矣嗚呼塞則止疏則流水之為物者然也流而動則黃流蕩潏濤浪以激之泥沙以汨之失水之本性外感之也止而静則澂波浄澈風雨以洗之星月以涵之得水之本性内有之也雖然此觀乎水也曷若觀人焉人之有心淵淵乎如止水其静也無不清性之真也其動也欲誘之濁斯形焉此君子所以觀感而化也今宗純開是軒以臨泓水之小見性天之大有非一池之所鍳一軒之所容也而體驗之於身心之間必悟夫觀瀾之術原泉之㫖也夫嗚呼在知道者黙識之若夫王右軍之清流激湍陶彭澤之清流賦詩不過流連光景適一時之興而已宗純當有所擇焉遂書以為臨清軒記學易齋記南陽邑庠教諭蘓欽克敬氏年壯而質美貌温而氣和振教鐸於兹已五載矣誘掖啟迪剖析疑義諸生有所悟入暇則取羲經而紬繹之觀象玩辭研精覃思以䆒四聖人之心而窮其理焉予以公委留南陽克敬謁而告曰欽也竊有志於學譬泛海望洋而不知其涯涘願借龍驤萬斛舟而順風以航之先生得無意也乎予乃為篆學易齋俾歸掲於室之楣而為之説曰莊周有言易以道隂陽盈天地間莫非隂陽竒耦之理在知道者黙而識之朱子嘗謂萬物各具一太極程子有謂觀兎可以畫卦朱子又謂一草一木皆有竒耦而周子倡明道統見於通書邵子探躡巽復見於觀物詩張子精思静坐見於正䝉書是皆顯微闡幽而有功於易也其可不致思乎大抵易之為道理與象數而已理寓於象數之中而非求之於象數之外也以故程子専主於理朱子専主於象邵子専主於數葢可相有而不可相無也嗟夫吾孔聖尚以五十而學易讀之韋編三絶况在於後之學者乎克敬於風櫺月牖之間焚香拭几凝神静慮收視返聽如顔之坐忘靈臺烱然虛室生白而心涵太極觸處洞澈八卦縱橫衍而為六十四卦散而為三百八十四爻則一部之全易具於胸中大而天地微而萬物無一不備於我而非可以他求也克敬作而謝曰命之矣因遂書為學易齋記陳敬所白雲山房記白雲山天台之佳山也陳君敬所居之且以榜其修讀之室曰白雲山房故於户牖几席盤盂琴書悉得是名所以志其好尚也且為余言曰珠璣大寳人皆好之然必深探不測之淵㡬蹈乎蛟鰐之橫而後幸得之惟可以富人則亦可以禍人圭組簮紱人皆泰之然必疲汗馬之勞甚而有揺尾乞憐之詬而後幸得之惟可以為身榮亦可以為身辱其説何也家有至寳則暴客在門故珠玉不易保而有富禍之殊爵位愈崇而刀鋸愈迫故圭組不易保而有榮辱之變孰若吾雲焉日行乎太空之中而縈帶乎松石之表其動也周流無常其歛也寂乎無情朝而出吾山房也勢不得而要之暮而入吾山房也勢不得而狎之盎如其若盈也茫如其若虛也使吾日忘乎富貴榮辱之境而與天者逰其吾雲乎其取之甚易而用之至足乎子何以教我唐子曰噫嘻觀君之言而審君之心吾尚何言哉於是廣君之志而歌之曰雲乎在山漭乎其為墻為藩雲乎在房溢乎其守一方雲之上下蒸而為澤顧行止之有時兮子無専乎白雲之白庶以無心而遇物兮求吾之安宅敬所樂聞吾之言請書為白雲山房記西山後記大江之西有西山焉巍然髙以大自南嶽衡山分支走脈延袤數千里綿跨數十州由南而轉折於西峯巒巖壑千態萬狀剜竒削巧不知其㡬何而蹲駐為是山也山於方為西地之清也於行為金於時為秋氣之清也裘氏重實世居山麓人之清也豈非西山清秀之所鍾與裘氏之先自㑹稽徙居於是已十世矣七世祖從龍號西麓髙祖興仁號西峯今而重實亦扁其軒居曰西山非特樂山也盖所以不忘二祖之徳也耕焉而憩其下西麓在焉㳺焉而渉其巔西峯在焉如見羮墻如覩河洛則為雲仍者安得忘水木本源之理哉而重實之居是軒也肅然而敬悠然而想琴瑟書冊祖之手澤存也花木竹石祖之遺植存也翠微蒼壁祖之神魂游也雲氣嵐光祖之容顔寓也若是二祖之徳無時而不致其思也吾重實曷能専美於西山哉予又讀余安道記在縣西四十里巖岫四出千峯特起髙二千丈屬連三百里下有天寳洞天載於酈道元水經若夫景物之勝見於羅縣令余修撰二公之文既詳且美矣予知不能出其右姑為後記以玷巻末云仁和堂記歙之堨田有譙國之裔朱氏世居之其始祖諱宣饒州番陽縣朱家村人也職萬户侯戍歙子孫遂為土著其後衣冠蟬聯欝為望族下逮叔廣君隱居授徒二子長士信次士澤彬彬競爽俱業於儒而士澤訓子以義方嘗扁其所居之堂曰仁和暇日謁予徵文以記之予與叔廣締文字交不獲讓迺語之曰大哉乾元運行不息故在天為四時之春氣之和也在人為四端之仁徳之和也君子以仁存心仁施於一身則一身和而百善備焉仁施於一家則一家和而五倫叙焉仁施於一國則一國和而百職理焉仁施於天下則天下和而萬民安焉此仁和之功用推致其極而馴致乎位育也歟嗟乎士澤敦徳勵行循禮守道以為君子之歸則上承於祖考下迪於子孫前後一心始終一徳登於是堂之上熈熈然愉愉然父慈而子孝兄友而弟恭夫唱而婦隨閨庭輯睦和氣如春藹然蘭堦之風馥盎然黍谷之陽回是能集福臻祥延慶表瑞仁和之効不既多乎予於士澤有望焉故樂書之以寘於堂壁孝思堂記孝思堂者鮑子永懐思親之堂也永懐世居郡西鮑潭以姓名地蕃且久也永懐尊甫君仲斌母孺人洪氏合徳媲美仲斌性誠實而貌質樸家貧嗜學隱居教授硯田筆耒伏臘弗給而洪孺人輔之以勤儉仲斌安貧樂道甘於恬静介然不易其守固其造詣之深亦洪孺人内助之力也年將五十始生永懐永和二子洪武辛未朝廷宣召老人而仲斌以年髙有徳推舉赴京宴賚而歸閭里有不平者質之咸得其直戊寅春有司復以講讀大誥舉率學徒考試禮闈重膺恩賜而歸晚年二子受過庭之訓亦能授徒以養親而箕裘之業有紹矣永樂庚寅春里中疫癘甚熾人皆憚之杜門絶火仲斌偶亦遘疾而永懐兄弟朝夕不離側寢食幾廢疫平越六月仲斌復得疾而終享年七十有二嗣嵗冬十二月母洪氏亦病卒享年六十有二迺卜地合葬於里之下梅村焉永懐抱風木之恨哀慕不已其友觀瀾鄭君乃名其所居之堂曰孝思而鹵谿漁隐之孫士隱為書孝思堂三大字掲於堂之中具其事走書京師徵言記之予曰人子於親生事盡力死事盡思書曰奉先思孝詩曰永言孝思此之謂也夫人有心而思出焉故心之官則思身之所處目之所睹必經之於心心之所思隨所在而出泯泯棼棼紛紜萬絲思則得之不思則不得也所謂得者得其理也五倫之道而父子之親攸重其所思者盡乎孝也予觀永懐之為子其幼也服訓成學其壯也攄誠奉養其終也致思盡孝此其孝之純至非暫而不可久也殆將有終身之慕焉予故喜鄉邑之後進克篤孝行庶毋負生於我子朱子父母之邦也是為記梧岡集巻六

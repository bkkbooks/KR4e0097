body:
  text: 梧岡集巻七明唐文鳯撰跋跋呉伯剛詩後予童丱時嘗侍先君子白雲翁一日閑適偕休陽呉公伯剛先輩同㳺宋故相程訥齋石池寺祠堂相與劇談今古酒半酣吟咏以暢其情醉墨淋漓雪色素壁揮洒迨遍予雖未解事心竊識之今而追思曩昔巳六十年矣鄉郡前脩俱已凋喪猶晨星落落耳予寓京師侵尋四載而公之令子彦守給事中過予秦淮旅舍手公之遺墨開巻宛然如生而字畫詩句皆其平生精神心術之所寓捧誦再四不覺為之一泫悲夫公之二詩其一為程仲庸題愛日軒乃徽州府程經厯子也好學工詩見稱於時才名藉甚授縣丞職其一為胡子微賦春暉堂乃歙縣縣丞也有政聲㢘潔之操衆所推服然程胡二公居官養親克盡孝敬無愧士行故公詩以美之匪虛譽也公親書上以呈二親下以示二弟而公孝友之誠藹然溢於言意之表非特為人賦也實所以述已志也嗚呼公今已矣九京不作誰與論斯事耶而彦守克振家聲能紹繼祖父之業登庸顯宦榮膺近侍思公之志意樂嗜故寳藏其詩以貽悠久俾後之子孫如見羮墻焉遂跋以歸之晩翠亭跋歐陽子曰為善無不報而遲速有時予常三復此言而知其㫖矣盖觀世之人未有不修之於已而能蘄之於天天人之理感孚之妙若桴皷影響而善惡之報無毫髪爽故積之厚者本必固濬之久者流必長譬諸水與木焉委派之滔汨始由於濫觴枝葉之暢茂盖自於萌蘖溢乎四海凌乎九霄進之而必至成之而必巨理勢然也人之修徳為善亦由是也然而獲報於天有遲速之不同故不在其身而在其子孫者則天道之福善禍滛潜施黙寓於𡨕㝠之中人雖不知而天實知之斯天定也久矣予宗自始祖諱承昈京兆人因仕新安太守遂留家焉至五世祖諱大有豐貲好施周貧恤匱四世祖諱廷瑞登進士第擢遂安簿遷銅陵丞曽祖諱虞號梅癯清修苦節祖諱元號筠軒仕徽郡文掾博學雄文為江東學者宗師叔祖諱清字清之髙才偉識厯兩廣憲史先伯父諱潤字潤甫調宣饒郡曹掾先父諱桂芳號白雲先生詩文瑰偉卓冠時流任南雄路儒學正兄名中字伯和蚤登士版叅賛戎幕今歸老於家康强無恙子孫詵詵以謹孝養而姪吉祥字彦禎中庚辰科進士第授永州府祁陽縣令三載考績朝京循例復任持先父所述晩翠亭記讀之俛仰今昔不覺痛淚之交頥追思甲申伯父暨父胥㑹芝山時委文而未果作至丙午文成而伯父已謝世矣初兄宦寓湖廣録文逺遺逮於永樂二年甲申偻指計之己六十一年烏乎予亦侵尋老境恨不能迓續先世之遺休竊禄晩仕先職縣令今特除趙府紀善而與彦禎同於一時俱䝉國恩當精白一心世守忠真志秉㢘潔期無負於祖宗也予故厯著之俾讀者知予宗之所由來固有自矣嗚呼若予叔姪之際遇聖朝榮膺寵數其亦食報於祖宗也歟則晩翠之文有所待而不為虛言矣為善之報遲速有時豈欺我哉盍徵於予宗而益騐夫天定也遂涕泣而書之跋山水畫自史皇作畫創制立法下逮秦漢間混朴未散古質尚存唐以下則人文日滋新巧雜出所謂上古之畫迹簡而意澹中古之畫細宻而精㣲也至唐王潑墨輩出掃去筆墨畦疃乃發新意隨賦形迹畧加㸃染不待經營而神㑹天然自成一家矣宋李唐得其不傳之妙為馬逺父子師及逺又出新意極簡澹之趣號馬半邊今此幅得李唐法世人以肉眼觀之則無足取也若以道眼觀之則形不足而意有餘矣贑庠廣文王潜齋俾予鑒定故書是說以歸之跋唐人臨鍾繇戎路帖魏鍾元常以能書擅名當世専備於七體而尤善行押其真楷瀟散飄逸若宣示諸帖皆二王所祖今觀戎路帖蓋元常在軍報㨗而書其用筆意氣雄豪凌厲有奬率三軍之志齊郡張士行謂有一段鐵馬金戈氣亦可謂善言者矣趙魏公謂真唐人所鉤臨無疑巻中題名若鄭明德陸友仁諸先輩皆先君子白雲先生友也洪武己夘春予有薦舉之命來京得衡山賀彦昭同選赴任又同舟累日出示此巻故跋而歸之俛仰古今不覺三嘆跋李忠定公遺墨右故相宋李忠定公答李提刑帳緑亭詩而其後裔今承事郎知呉縣事曰煥者之所藏也演飾成巻請某言識之弗敢以無文為解因詩之所及䟽而歸焉其云昔我列中著識君自南方蓋公自政和間由進士累官起居郎兼國史編脩宣和初言水烖責監沙縣稅則時論可知矣靖康初除右丞親征行營使責授保静軍節度副使髙宗即位首召為相時金人方熾在廷之臣爭為割地請和之說公獨不然以必守中原必還二聖為計而髙宗畏懦恇怯正不勝邪由是讒間蠭起公在位甫七十五日罷為觀文殿學士提舉洞霄宫再論鄂州居住移灃州論責單州團練副使移萬安軍次瓊州放還自便此帳緑亭所由作邪其云蒼官儼成列青史立欲僵則公雖託興松竹而媮安非所志故開新帳緑克嫓舊藂香又不以貴賤得喪貳其心亦可知矣方其宴安之時在常人之情孰不私便其身圗而公乃有立國歎邾小仰闗畏秦强之言烏乎愛君憂國之心公蓋不忍忘於一飯使思陵能用其言則中原必復二帝必還不共戴天之讐必報夫豈使大業偏安於海陬而為茍活之計哉讀公之詩求公之心忠義猶凛凛不待讀樂毅書賈誼䇿而後掩巻太息也其稱提刑院判者宋制諸路提㸃刑獄公事以朝臣充而六院判皆得轉對故例為察官之選即詩而觀則其人才故非泛泛者卒章翺翔將壇之意所以擬之亦所以自慨之也且公之書别見鳯墅續法帖中為世所稱重而此幅體勢剛方韻度深穏如檜栢崢嶸氣凌霜雪公之心畫於是乎著至若公之始末具信史固不待贅然公歿不數年國勢日蹙以至社屋而此紙獨存於三百年後筆墨如新不失為李氏故物豈非天相忠良而有以詒其後人乎則凡後之閲是巻者又當感奮思慕為臣盡忠為子盡孝砥礪名節以不沗前人毋徒視為寶玩而已也止足亭老氏云知止不辱知足不殆盖為我之學也猶未免乎孟氏之譏嗟夫天下之理有得必有失得於此者失於彼得於前者失於後審夫得失之㡬而能不失其正者其吾聖賢之道乎聖賢之道明德為體新民為用體用兼備物我無間則知止於至善以自快足於已也嗟夫吾儒體用之學非老氏為我之學吾儒聖賢之學明體以適用體無不備故用無不周則可以措之於天下行之於後世以致隆平之盛雍熈之和而唐虞之化三代之治將可復也今歙南朱永迪氏世居環溪之上不墜家聲其先嘗以止足名其亭儒林之士咸歌詠之復求予言諸老之文已盡乎山水之趣余何說焉夫止足之義不在乎彼而在乎此也彼者山水之樂泉石之美而此者身心之間意趣之際固有内外之殊當知其要而審處之則止足自得而無殆辱之患矣余故以是說復于永迪俾知自警遂書歸之蘭谿漁者詩跋洪武九年先君白雲翁為兄伯和述蘭谿漁者序時伯和以人才舉銓蘭谿湖官其地據黄州上游荆湘之滙郡志以地産蘭故名蘇文忠公居黄時嘗遊覽于是則其溪山之勝景物之美皆見於吟咏矣吾兄公務之隙觀烟波之溔浩舟䑺之出沒持竿以釣月披簑以罾雪聞滄浪之歌皷枻而和之不知身之在宦海而心己結於鷗鷺之盟矣故號蘭溪漁者姑因其所寓之地托以是名殆為他日歸隠之先兆也後四年得返故鄉以遂初志結屋表城門内或風日清爽則擕童子具絲綸坐練溪苔磯而漁尚羊容與翛然而有出塵之想昔之蘭溪心迹未忘於漁也今之練溪心迹俱忘於漁也地無逺邇之殊心有彼此之異漁者之號謂之蘭溪可也謂之練溪亦可也其張志和陸魯望之徒歟儒林碩士為文為詩聯成巻帖文鳯才譾學膚未敢有所著姑僣書于後跋諸葛武侯像賛予聞蘓長公稱武侯出師表與說命相表裏自三代以後巋然王佐才惟武侯一人而已侯之平生出處大節諸先正論之詳矣後學豈能容喙於其間哉今觀此像丰姿神俊意氣閑雅手把如意肘支圜枕綸巾垂帶氅衣披袂欹坐匡床脫履露足注目凝想而游心於祁山褒邪之逺猶若指麾三軍時也傳者謂宋劉子駒家藏為唐閻立本筆而臨摹出於盧謐之手巻題張南軒先生之賛而我紫陽朱夫子跋之蓋南軒為宋中興名臣張忠宣公子也蚤聞濓洛之緒論功在王室名播强鄰實開家學之傳其於忠武侯之遺畧或有得其二三者而其成功雖不可侔亦當時之傑也而朱子與南軒同時倡明理學以續道脈大有功於名教故其心之同而道之同不自知其情誼之相孚意氣之相合也故朱子於著書立言凡用南軒之語一則曰亡友張敬夫二則曰張敬夫蓋不沒其善而推重者如此嗚呼朋友道喪安得起二公而論斯文也哉朱子以謂敬夫語簡意到聞者嘆服非深知武侯心事者不能道也又謂王齊賢俾之題賛後二十九年齊賢諸子出示俯仰疇昔三君子皆不可見為之嘆息而朱夫子之所感者深矣悲夫然而武侯之事業朱張之道德蓋不可尚已而閻盧之手筆亦不可復得也其賛跋乃紫陽鮮于必仁書元鮮于郎中伯機遺腹子也字法亦得家傳之妙并識于後觀者庶知其詳幸恕予之僣也書上歙尹程公德芳書後洪武三年吏部符下令天下府縣開設學校是嵗正月同知何公翔卿知縣程公德芳舉薦家君充歙縣儒學教諭時抱患未痊逼迫就道文鳯慮奔走千里舊患愈加將有不測之憂是以哀號縣庭通書於程公又匍匐府㕔再陳情于何公二公感而憐之遂已于行鄉先生周石泉謂文鳯曰昔原誠在前元至正間潘擇可縣尹舉充學職得月米四十餘石予辭不受師山鄭先生聞之詣門告曰衆皆競求月米而不可得爾獨當得而固辭可謂有光于儒林矣玉敢不下拜於是使人掖原誠坐先生四拜訖今三十五年矣爾辭父之薦使得居家養病而免道途之苦可謂孝且賢矣原誠亦以鄭先生之拜而拜吾友焉後程公復舉先生及文鳯同職訓導居嵗餘縣例設二名先生以疾辭洪武四年起赴京中途以疾篤免是嵗先生卒洪武十四年先君亦卒檢閱故篋得此書舊藁因思先生汲引後進之言并述其始末命次兒家禎錄之一時父師俱已澌盡不覺清涕之交頥也題墨竹圖墨竹始於唐蕭悦因觀竹影遂為冩真其後王維益臻其妙至今鳯翔石刻為世珎玩迨宋盛朝文與可得乎天趣胸中有渭川千畆遺墨流滋人間不啻拱璧同時若蘓子瞻極意模倣雖不得湖州之矩範而儋耳道中見風竹急歸命官奴秉燭冩之亦可以發一時之竒思耳前元趙子昻李仲實柯敬仲輩皆稱名筆寥寥千古文物凋謝繼今以往擅能者誰歟大尹劉公得歙人鄭子明為作是圖暇日示予俾綴語于其端大抵古人文章圖畫非特玩好而已今觀夫九疑之遺迹足以壯公弔古之懐有虞之至治足以廣公愛民之政竹之勁節不渝足以勵公確守之操竹之虛中自持足以表公精白之心公所以寓目而警者意有在矣豈畫之云乎哉予故歴叙其説以復命覽者知不徒貴于畫以為玩好而已也題錢舜舉𤓰圖呉興錢舜舉鍾苕霅之秀寓意于丹青凡天地間品彚形肖之類皆為冩生而能逼真葢深有得於沒骨圖之遺法其視黄筌趙昌相伯仲宜世人與松雪公翰墨並稱為湖州之絶也此圖植南園之竹蔓西域之𤓰有圑其實有燁其花于以見造化生物之巧同里汪彦章氏購得之俾予綴語觀其所尚可以知其為人也當永葆之題鄭斗菴墨蹟後歙西長林之鄭為衣冠望族世有文人鄭君彦斌號斗菴為教授希賢公之子雩都縣尹之從子御史彦昭公之從弟幼服禮義之訓侍父兄間耳濡目染固有異于庸常者前朝至正中登參政全公子仁之門以儒雅推敬使之親炙于左右給文墨之役一時省府僚佐尊而嚴憚之詩詞翰墨人爭寶蓄遭壬辰兵變隠居故鄉慕子真之髙致無何駙馬都尉王公子敬鎮徽禮羅為館賓執師道甚不以威怵不以貴謟甘淡薄而樂道義與六安鄭士恒篤交友之契吟哦紬繹反復論難知其學之有得而才之有成也及王公移戍紹興又鎮撫南閩嘗掖以自隨而不忍朝夕舎其好之宻脗合無間古道之僅見於今焉以病痿弱不能久客異土歸嵗餘卒于家嗚呼惜哉君之才學宜用于時而弗克有所施設使如馬周之遇常何條疏而薦于朝曰臣客馬周之筆也則其見用為何如哉豈不重可惕也夫君之次子詢早失所天而長兄謙相繼傾棄凡君之墨蹟放失不存詢拳拳求訪而未得予毎聞之先君子白雲翁而知締交于彦斌之祖父殆若李唐通家也猶記辛丑嵗江西權伯文都事留歙君與之偕詣先君於槐塘三峯精舎讀天台丁仲容秋江送别圖長句喜而和之君亦欣然揮筆僂指歴數已廿又七年矣檢閲故篋偶獲此紙君之手澤尚新雖字畫之㣲而生平精神心術之所寓流風遺韻有足觀者為子若孫一注目之頃孝思之心豈不油然而動于中起敬起慕惡可已也予故叙君履歴之詳以跋于後而歸于詢俾珎襲之以傳永久詢謹飭好學今讀書邑庠將有以昌阜其宗而無愧于顯揚也跋張小山所書樂府前元全盛之時海内昇平㡬八十餘禩人才蝟興比隆唐宋休明之運淳龎之氣見于文章散于篇什率皆光華俊偉一掃衰世委靡之習當時所尚樂府新聲至于文士才子講治正學之餘往往嗜好矢口而成揮筆而就於瓊筵綺席間度以歌喉協以聲律亦可謂快意矣昔之所稱者北有闗漢卿馬九臯輩語意雄渾殊乏纎巧態南有張小山自呉鹽集一出流傳京師寵書于奎章膾炙人口珠璣璀燦錦襭青紅新竒而工緻豔麗以清腴論渾厚之氣則有間矣小山張公聰明過人博聞廣記推其才究其所藴殆不止于是惜乎以樂府之名掩其所長今汪景榮氏購得此巻乃生平親洒字畫雖不拘于草法筆勢翩翩自成一家也展玩之餘輙題其末當永葆之跋葉宗懋訓子詩後右葉使君所作訓子詩一篇時使君謫寓京口當丙午之中秋日也後二十年乙丑使君之季子大同示予俾跋于右方予曰古人之詩皆所以述其志也非特流連光景而已身雖有窮達之殊而志則無以異也方使君脫離亂之厄而躋榮顯復竄謫以居覉旅而此志不為之變其詩大㫖首言弟兄之友愛而欲其勤學事親次言祖業之艱難而欲其謹身保家蓋思祖所以知本務學所以成業養親所以致孝皆惇德勵行之言也流離顛沛之中尚拳拳於訓誡以淑其子而不變此志可謂守道之士矣後使君役版築工巨長子大年上書叩天閽獲免今大同亦不忘父訓思立身以光大其宗又知使君之化素行于家子能盡其孝父能成其教庻不戾此詩之諄切矣予故不辭遂書以歸之跋朱大同草書昔風林先生講道于棠樾予嘗侍先君白雲先生過從之極談經史子志百家之說至于字學謂自篆𨽻分楷之後變而為草趨簡便之極甚少於其即多於卿無復存六書之遺法學者何必劬心以求之及觀歐陽文忠公跋懐素帖以魏晉諸賢逸筆餘興初非用意後人迺棄百事以學書為務蓋與先生之意合矣大同先生嗣子也聰明才俊而多藝能雖異于家學然臨池清趣筆勢縱逸亦可少發胸中之竒思耳同里沈彦華得此幅如蛇驚鳥迅初無定跡猶可想其揮洒時也嗚呼大同往矣惜其才而推其學感歎久之遂以聞先生之言疏于端非故異論于父子間也俾覽者慎所擇焉跋從兄伯和刺股詩後右絶句二首從兄伯和所作也始兄􅂒疾甚亟嫂丁氏刺股以進既而疾愈誠心所發感格異夢逮今忽忽二十有餘禩恐久而無聞故述其事以貽子若孫洪武丙寅冬吾兄袖詩過槐瀕俾識其概予嘗讀先祖遺文知先伯諱徐卿第二女真一名佛奴年十一遇先祖患鼻衂潜禱北辰刺左臂肉和饘粥以供由是疾愈當時為之詠歌今而聞嫂氏之事則有以徵誠孝世德振於前繼於後雖閨闔之懿亦能服訓被化一見而再見焉雖然儒先以刺股為傷親之遺體率罕見錄而春秋書許世子以不嘗藥而受弑逆之名則世之庸放者不以親之疾為謹其取譏於聖人當何如哉故刺股出於為子為婦一時迫切之至情雖未合禮殆亦可以義許也嗚呼世稱孝婦烈女制行不同孝則有仁愛之心烈則有敢勇之氣未有仁而不勇勇而不仁者論是以往則抉目以示夫冒刃以護姑者皆此心推之耳可少之哉謹跋跋白雲呉公詩休歙相距百里而近山水環拱村墟聨絡棟宇宻比在在若城邑歙槐里之程休呉田之呉皆代以儒宦顯連姻締好氣味相投呉之望有諱奫字萬頃號白雲翁者身幹魁梧美髭髯善譚吐渾然莫測其際浩然莫禦其鋒程之先輩毎值春秋嘉㑹必汛掃涼臺燠館風亭月榭以候翁至至則肩輿軋軋僕從導引子姓扶掖延欵謁問起居畢則三肅坐上座少長凝立凛弗敢譁酒數行㣲醺興發豪談娓娓每傾座客或遇倡酬才思泉涌吟詠未出口吻則振筆著紙揮灑迅疾颯颯類風雨聲俄頃盡數十幅咸争傳看諷誦以相樂復引滿終宴而止率以為常時予先祖長孺筠軒先生以髙年耆德講道故相家翁師事之執弟子禮甚恭情孚而志合先父仲實三峯先生自崇安校官歸與翁問學相資頡頏輩行詩筒往復不輟嘗記壬寅之嵗翁留槐里宣城劉仲脩授鄱陽同知寓于歙土暇日訪先父于三峯精舎有詩云平生毎媿劉公榦晚嵗忽逢唐子西頗怪卧龍淹世用不辭騎馬訪巖棲酒清定是松花釀詩就閒拈柿葉題他日卜鄰何處是黄山髙與白雲齊從遊文儒和之者聨為巨帙而翁乃三用韻回視之予年始十六侍翁杖屨不以穉弱童子鄙之亦俾賡韻僂指迄今四十三載矣所藏翁之翰墨猶新宦遊南北緘以小櫝挈之自隨永樂元年夏予授趙府紀善二年春翁之孫彦守亦由紀善陞户科給事中兼司經局校書一日規訪予於秦淮官舎相與道故舊因出示此幅再拜伏讀執手涕泣良久予追憶疇昔兩家祖父文章道德當世推重而遺風餘韻承繼不冺者在予與彦守耳敢不思自砥礪名節以期顯揚耶遂剟其詩三章裝演巻軸而跋其後以歸彦守俾永藏之以為家寶也夏六月十一日書跋宋景濓杜叔循所撰書前太常丞吕仲善祖父墓銘後余聞諸儒先自宋以來江東文學之盛首稱金華邃於經者名性理之學精於史者號經制之學東萊吕成公稽經以該物理訂史以叅事情又得紫陽朱子商確印正於是合經史之學而一之矣厥後許公益之承朱吕之傳屹為儒宗至元之黄公溍卿栁公道傳其授受實有源委而景濓宋先生踵其後含咀英華嚅嚌竒雋六經羣史諸子百氏以至釋老方技莫不抉摘其菁翹鈎剔其藴奥發為文章精緻清新明暢雅健紹述諸儒之緒餘而獨步乎江東暨我皇明徴入翰林超授學士凡典册制詔敷闡皇猷鋪張帝載述作潤色多出其手誠一代之大老學者仰如山斗焉先生嘗譔太常丞吕仲善祖父誌銘而杜君叔循書之叔循名環金陵人字畫雄偉歐虞之規矩顔栁之筋骨亦名筆也仲善之子叔素出以相示辭翰並妙其可傳也必矣嗚呼前脩淪落後進不繼叔素當如良金粹玉珍愛寶藏磨貞珉而鑱之垂休光於無窮予昔侍先生於師山鄭待制之門親聞誨益今因叔素之請故悉論之俾讀者知先生之學有所自云跋唐人臨王子敬洛神賦魏鍾繇作行押書世傳戎路等帖即其體也王子敬洛神賦迺效繇法然揮灑此賦時清思飄飄髣髴與神女遇賦中語所謂翩若驚鴻婉若游龍殆類是歟今觀此幅風韻瀟散勢態縱逸得子敬之遺意真唐人所臨無疑亦名筆也後人得此當永葆之跋鮮于伯機草書草法自史游作急就凡將等章猶有渾朴氣備篆𨽻體至張芝皇象索靖鍾繇輩雖稍變史法遺意猶未泯也王羲之獻之父子變化神竒謂之新草此草法一變也降而唐之張旭懐素之儔縱筆快逸連綿游絲無復古意此草法又一變也宋之蘓子瞻黄魯直米芾諸老任意所適蛇蚓蟠結潤燥間錯縱横顛倒㡬不可辨此草法又一大變也元之趙子昻鮮于伯機幼相友善居西湖同學書十年後鮮于公以草書擅名于時雄健端嚴趙公草書媚婉可愛而乏遒勁之氣嘗讀跋鮮于書後有云僕與伯機兄同學書世人以僕能書然伯機兄過僕甚所謂無佛處稱尊耳其相推許如此贛之李思善寶藏公墨蹟暇日介鍾子常氏徴予書其後予故叙草法之變而識二公書法之大槩以復之跋姜堯章趙子固所書定武本蘭亭帖後唐太宗寶藏王右軍蘭亭真蹟嘗命虞永興歐陽率更褚河南輩摹榻以賜近臣厥後真本殉葬昭陵世傳墨本皆虞歐褚諸公所臨筆也今之所見真贗混淆必具眼始識之定武有肥瘦二本平川鍾子常氏所藏盖定武肥本也巻有姜堯章趙子固二公親書跋語二公論書法深有合於予心經其鑒定佳本無疑堯章云此本有黄山谷題字山谷之孫字子邁今為農丞過余見後題欲乞去余不忍與以亡此題則蘭亭廢矣知此本出於堯章家藏而靳於山谷之題字亦知蘭亭借重於太史相與流傳於永永也然巻後之題今不復見惜哉予令興國二載藏書之家寥寂無聞而子常獨寶此巻觀其所好可以知其人矣故喜而跋之跋道士康雪坡風􅀈吟詩集興國邑治之西郭有琳宫額以治平乃洞隂福地也昔晉仙翁葛洪稚川留居煉丹有丹池丹井今丹池湮塞而丹井猶存嘗留題云洞隂泠泠風􅀈清清仙居浩刼花木長榮想仙翁至此豈游空同之山而為勾漏令問丹之時乎宋季元興之際有道士康文俊字煥翁號雪坡讀儒道書能詩裒集平生吟詠聨為巨帙鋟梓以傳好事者取仙翁語名曰風􅀈吟集當時名儒鉅卿若劉湏溪辰翁董左丞慎齋元郎中明善滕學士玉霄俱有詩文推許不少置今讀其集清新瀏亮如聞羣仙玉佩珊珊而歌步虛之詞也經兵火後詩版不存世罕有傳之者一日其徒孫康自成得之於藏書之家語予跋語時予考績不暇秉筆而自成勤懇侍舟東下抵贛之寶臺觀特為書之俾風晨月夕令童子叩靈璈而歌一章則雪坡當陪仙翁鞭鸞笞鳯神游雲間冉冉而下聴也跋楊彦華書虞文靖公蘓武慢詞後余嘗讀虞文靖公道園集觀其高文大䇿醇辭雅論知公所學愽洽淹貫而究極本原研精探㣲心解神㑹故經緯彌綸之妙臻古作者之域真一代大手筆也推其緒餘字畫之偉歌詞之麗亦皆超詣而不凡今按調寄蘓武慢詞十二闋葢和馮尊師所作其自序經閲累嵗而成飄飄然有出塵想如在九霄之上下視世紛膠擾曾不足以入其靈臺丹府所謂不喫烟火食所道迺神仙中人語也史稱南獄真人降生豈其然乎余僚友楊春菴酷嗜此詞喜而書之聨為巨軸字體蕭散俊逸有晉唐人氣或遇風清月霽之夕馮虞二公有知當乘雲御風而來尋歌審音玩書留跡亦復絶倒也故跋以歸之松雪趙公畫梅跋三代以還梅之實載於詩書禮而不言花南朝以降梅之花見於詞人之吟詠而不言實豈世之所尚異宜而梅之所遇有時耶不然屈子騷經下至蘭茞蕭艾靡不采錄而獨遺於梅何耶林逋老仙隠居孤山為梅出色神交意㑹暗香疎影水邊籬落之句非特得梅之標格而并得其風韻數千載不遇之幽憤一旦發之無遺矣今觀此圖一枝斜出猶可想像孤山吟餘之趣後有趙魏公題名嗚呼自逋仙後梅之知已㡬何人哉魏公以玉堂之清興侣茅舎之幽姿而特為冩生未為不知己也然公自號但有取於松雪而亦未遑於梅雪又何耶梅如有神當招老逋跨舊時雙鶴裴回於小橋流水間長空月明鐡笛三弄起魏公而一詰之梧岡集巻七
